<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía Interactiva · OCP Java SE 17 (1Z0-829)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0d1117;
    --panel: #12181f;
    --panel-2: #161d26;
    --line: #232b36;
    --text: #d5dce3;
    --text-dim: #8592a3;
    --java-orange: #ED8B00;
    --java-red: #E4712B;
    --accent-blue: #4FC1E9;
    --green: #3FB950;
    --red: #F0625A;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  ::selection{ background: rgba(237,139,0,0.35); }

  /* ---------- Shell layout ---------- */
  .app{
    display:flex;
    min-height:100vh;
  }
  .sidebar{
    width: 250px;
    flex-shrink:0;
    background: var(--panel);
    border-right: 1px solid var(--line);
    display:flex;
    flex-direction:column;
    position: sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
  }
  .brand{
    padding: 20px 18px 14px 18px;
    border-bottom: 1px solid var(--line);
  }
  .brand-title{
    font-family: var(--mono);
    font-weight:800;
    font-size: 15px;
    color:#fff;
    letter-spacing:0.3px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .brand-title .dot{ color: var(--java-orange); }
  .brand-sub{
    font-size:11.5px;
    color: var(--text-dim);
    margin-top:4px;
    font-family: var(--mono);
  }
  .mode-switch{
    display:flex;
    gap:6px;
    padding: 14px 14px 10px 14px;
  }
  .mode-btn{
    flex:1;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    padding: 8px 6px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 11px;
    cursor:pointer;
    transition: all .15s ease;
  }
  .mode-btn.active{
    background: rgba(237,139,0,0.12);
    border-color: var(--java-orange);
    color: #fff;
  }
  .nav-label{
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    padding: 12px 18px 6px 18px;
    font-family: var(--mono);
  }
  .nav-list{
    list-style:none;
    margin:0; padding: 0 8px 16px 8px;
    flex:1;
  }
  .nav-item{
    display:flex;
    align-items:center;
    gap:8px;
    padding: 9px 10px;
    border-radius: 6px;
    font-size: 12.5px;
    color: var(--text-dim);
    cursor:pointer;
    line-height:1.3;
    margin-bottom:2px;
    transition: background .12s ease, color .12s ease;
  }
  .nav-item:hover{ background: var(--panel-2); color: var(--text); }
  .nav-item.active{
    background: rgba(237,139,0,0.10);
    color: #fff;
    box-shadow: inset 2px 0 0 var(--java-orange);
  }
  .nav-num{
    font-family: var(--mono);
    color: var(--java-orange);
    font-size: 11px;
    width: 18px;
    flex-shrink:0;
  }

  .main{
    flex:1;
    min-width:0;
    padding: 28px 40px 60px 40px;
  }
  .topbar{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap: 20px;
    margin-bottom: 22px;
    flex-wrap:wrap;
  }
  .topbar h1{
    font-family: var(--mono);
    font-size: 22px;
    color:#fff;
    margin:0;
    font-weight:700;
  }
  .topbar .sub{
    color: var(--text-dim);
    font-size: 13px;
  }

  /* ---------- terminal-style card ---------- */
  .term{
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow:hidden;
    margin-bottom: 22px;
  }
  .term-bar{
    display:flex;
    align-items:center;
    gap:6px;
    padding: 9px 12px;
    background: #10151c;
    border-bottom: 1px solid var(--line);
  }
  .term-dot{ width:9px; height:9px; border-radius:50%; }
  .term-bar .title{
    margin-left:8px;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text-dim);
  }
  .term-body{ padding: 18px 20px; }

  /* ---------- guide content ---------- */
  .concept-list{
    list-style:none;
    margin:0; padding:0;
  }
  .concept-list li{
    position:relative;
    padding: 8px 0 8px 22px;
    font-size: 14px;
    line-height:1.55;
    color: var(--text);
    border-bottom: 1px dashed var(--line);
  }
  .concept-list li:last-child{ border-bottom:none; }
  .concept-list li::before{
    content: '▸';
    position:absolute;
    left:0;
    top:8px;
    color: var(--java-orange);
    font-size:13px;
  }
  pre.code{
    background: #0a0e13;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 14px 16px;
    font-family: var(--mono);
    font-size: 12.6px;
    line-height:1.6;
    color: #c9d6e3;
    overflow-x:auto;
    margin: 0;
  }
  .kw{ color:#ED8B00; }
  .str{ color:#9CCC65; }
  .cmt{ color:#6b7686; font-style:italic; }
  .typ{ color:#4FC1E9; }

  /* ---------- quiz ---------- */
  .quiz-toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 16px;
    flex-wrap:wrap;
    margin-bottom:18px;
  }
  select#catFilter, select#countFilter{
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: var(--sans);
    font-size:13px;
  }
  .progress-wrap{
    flex:1;
    min-width:180px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .progress-bar{
    flex:1;
    height:8px;
    background: var(--line);
    border-radius: 4px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background: linear-gradient(90deg, var(--java-orange), var(--java-red));
    width:0%;
    transition: width .25s ease;
  }
  .progress-text{
    font-family: var(--mono);
    font-size:12px;
    color: var(--text-dim);
    white-space:nowrap;
  }
  .score-pill{
    font-family: var(--mono);
    font-size:12px;
    background: rgba(63,185,80,0.12);
    color: var(--green);
    border: 1px solid rgba(63,185,80,0.3);
    padding: 6px 12px;
    border-radius: 20px;
  }
  .q-tag{
    display:inline-block;
    font-family: var(--mono);
    font-size:10.5px;
    color: var(--java-orange);
    background: rgba(237,139,0,0.10);
    border: 1px solid rgba(237,139,0,0.25);
    padding: 3px 9px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .q-text{
    font-size: 16px;
    line-height:1.55;
    color: #fff;
    margin: 0 0 14px 0;
    font-weight:600;
  }
  .opt{
    display:flex;
    align-items:flex-start;
    gap:12px;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom:9px;
    cursor:pointer;
    font-size: 14px;
    line-height:1.5;
    transition: border-color .12s ease, background .12s ease;
    background: var(--panel);
  }
  .opt:hover{ border-color: var(--accent-blue); }
  .opt .letter{
    font-family: var(--mono);
    font-weight:700;
    color: var(--text-dim);
    width:20px;
    flex-shrink:0;
  }
  .opt.correct{
    border-color: var(--green);
    background: rgba(63,185,80,0.08);
  }
  .opt.correct .letter{ color: var(--green); }
  .opt.incorrect{
    border-color: var(--red);
    background: rgba(240,98,90,0.08);
  }
  .opt.incorrect .letter{ color: var(--red); }
  .opt.disabled{ cursor: default; }

  .explanation{
    margin-top: 14px;
    padding: 14px 16px;
    border-radius: 8px;
    background: #10151c;
    border-left: 3px solid var(--accent-blue);
    font-size: 13.5px;
    line-height:1.6;
    color: var(--text-dim);
    display:none;
  }
  .explanation.show{ display:block; }
  .explanation b{ color: var(--text); }

  .quiz-nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top: 18px;
  }
  .btn{
    font-family: var(--mono);
    font-size:12.5px;
    padding: 10px 18px;
    border-radius: 7px;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    cursor:pointer;
    transition: all .12s ease;
  }
  .btn:hover{ border-color: var(--java-orange); color:#fff; }
  .btn.primary{
    background: linear-gradient(135deg, var(--java-orange), var(--java-red));
    border:none;
    color:#0d1117;
    font-weight:700;
  }
  .btn:disabled{ opacity:.35; cursor:not-allowed; }
  .btn:disabled:hover{ border-color: var(--line); color: var(--text); }

  .results-card{
    text-align:center;
    padding: 40px 20px;
  }
  .results-score{
    font-family: var(--mono);
    font-size: 48px;
    font-weight:800;
    color: var(--java-orange);
    margin: 6px 0;
  }
  .hidden{ display:none !important; }

  @media (max-width: 860px){
    .sidebar{ position: static; height:auto; width:100%; }
    .app{ flex-direction:column; }
    .main{ padding: 20px; }
  }
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-title"><span class="dot">☕</span> OCP // Java SE 17</div>
      <div class="brand-sub">1Z0-829 · guía interactiva</div>
    </div>
    <div class="mode-switch">
      <button class="mode-btn active" data-mode="guia">Guía</button>
      <button class="mode-btn" data-mode="quiz">Cuestionario</button>
    </div>
    <div class="nav-label" id="navLabel">Dominios del examen</div>
    <ul class="nav-list" id="navList"></ul>
  </aside>

  <main class="main">

    <!-- ===== VISTA GUIA ===== -->
    <section id="viewGuia">
      <div class="topbar">
        <div>
          <h1 id="guiaTitulo">Guía de estudio</h1>
          <div class="sub" id="guiaSubtitulo">Conceptos clave para el examen 1Z0-829</div>
        </div>
      </div>
      <div id="guiaContent"></div>
    </section>

    <!-- ===== VISTA QUIZ ===== -->
    <section id="viewQuiz" class="hidden">
      <div class="topbar">
        <div>
          <h1>Cuestionario de práctica</h1>
          <div class="sub" id="quizSubtitle">Preguntas originales tipo test · elige una categoría o practica con todas</div>
        </div>
      </div>

      <div class="quiz-toolbar">
        <select id="catFilter"></select>
        <select id="countFilter">
          <option value="10">10 preguntas</option>
          <option value="20">20 preguntas</option>
          <option value="30">30 preguntas</option>
          <option value="50">50 preguntas</option>
          <option value="100">100 preguntas</option>
          <option value="all" selected>Todas las preguntas</option>
        </select>
        <button class="btn primary" id="startBtn" onclick="startQuiz()">Comenzar</button>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <span class="progress-text" id="progressText">0 / 0</span>
        </div>
        <span class="score-pill" id="scorePill">✔ 0 aciertos</span>
      </div>

      <div id="quizArea"></div>
      <div id="resultsArea" class="hidden"></div>
    </section>

  </main>
</div>

<script>
const QUIZ_DATA = [{"id": "fundamentos", "nombre": "1. Bloques básicos de Java (variables, tipos, texto)", "preguntas": [{"codigo": null, "enunciado": "¿Cuál de las siguientes es una declaración válida de una variable local usando inferencia de tipos?", "opciones": ["var x = 10;", "var x;", "final var x = null;", "var int x = 10;"], "correcta": 0, "explicacion": "'var' requiere un inicializador para poder inferir el tipo. 'var x;' es inválido porque no hay valor para inferir. 'var x = null;' también es inválido porque el compilador no puede determinar un tipo a partir de null."}, {"codigo": "String s = \"hola\";\ns.concat(\" mundo\");\nSystem.out.println(s);", "enunciado": "¿Qué imprime el código anterior?", "opciones": ["hola mundo", "hola", "mundo", "No compila"], "correcta": 1, "explicacion": "String es inmutable. concat() devuelve un nuevo String, pero como no se asigna a ninguna variable, el valor original de 's' no cambia."}, {"codigo": null, "enunciado": "¿Cuál es el resultado de: var texto = \"\"\"\\n    Hola\\n    Mundo\\n    \"\"\"; (bloque de texto / text block)?", "opciones": ["Se genera un String multilínea respetando la sangría mínima común", "Error de compilación porque var no admite text blocks", "El texto se guarda como una sola línea sin saltos", "Error porque los text blocks requieren comillas simples"], "correcta": 0, "explicacion": "Los text blocks (JEP 378) permiten literales de String multilínea delimitados por triple comilla doble, y el compilador recorta la sangría incidental común a todas las líneas."}, {"codigo": "byte b = 127;\nb++;\nSystem.out.println(b);", "enunciado": "¿Qué imprime este código?", "opciones": ["128", "-128", "127", "No compila"], "correcta": 1, "explicacion": "byte es un tipo de 8 bits con rango -128 a 127. Al incrementar 127 se produce overflow y el valor da la vuelta a -128 (el operador ++ hace un cast implícito)."}, {"codigo": null, "enunciado": "¿Cuál de las siguientes NO es una palabra reservada de Java?", "opciones": ["record", "var", "sealed", "assert"], "correcta": 1, "explicacion": "'var', 'yield' y 'record' son 'nombres reservados contextuales', no palabras clave completas; se pueden usar como identificadores en ciertos contextos. Sin embargo, en este listado, 'var' es la única que NO es palabra reservada tradicional (assert sí lo es desde Java 1.4, y sealed/record son contextuales pero suelen listarse aparte). La respuesta correcta según el examen es 'var'."}, {"codigo": "double d = 5 / 2;\nSystem.out.println(d);", "enunciado": "¿Qué imprime este código?", "opciones": ["2.5", "2.0", "2", "No compila"], "correcta": 1, "explicacion": "5 y 2 son ambos int, por lo que la división se realiza como división entera (resultado 2) ANTES de asignarse/convertirse a double. El resultado final es 2.0."}, {"codigo": null, "enunciado": "¿Cuál es el propósito principal de StringBuilder frente a String?", "opciones": ["Permitir mutabilidad y evitar la creación de múltiples objetos al concatenar", "Hacer que las cadenas sean thread-safe automáticamente", "Reducir el tamaño en memoria de una cadena inmutable", "Permitir comparar cadenas con =="], "correcta": 0, "explicacion": "StringBuilder es mutable, lo que evita crear múltiples objetos intermedios al hacer concatenaciones repetidas, mejorando el rendimiento."}, {"codigo": "var lista = List.of(1, 2, 3);\nlista.add(4);", "enunciado": "¿Qué ocurre al ejecutar este código?", "opciones": ["Se lanza UnsupportedOperationException en tiempo de ejecución", "Se agrega correctamente el elemento 4", "No compila", "Se lanza ClassCastException"], "correcta": 0, "explicacion": "List.of() crea una lista inmutable. Cualquier intento de modificarla (add, remove, set) lanza UnsupportedOperationException en tiempo de ejecución."}, {"codigo": null, "enunciado": "¿Cuál es el valor por defecto de una variable de instancia de tipo boolean?", "opciones": ["true", "false", "null", "0"], "correcta": 1, "explicacion": "Las variables de instancia (campos) numéricas se inicializan a 0, boolean a false, y las de tipo referencia a null, si no se inicializan explícitamente."}, {"codigo": "int x = 10_000;\nint y = 1_0_0;\nSystem.out.println(x + y);", "enunciado": "¿Qué imprime este código?", "opciones": ["10100", "No compila", "10_100", "Error en tiempo de ejecución"], "correcta": 0, "explicacion": "Los guiones bajos en literales numéricos (desde Java 7) solo son separadores visuales y se ignoran; 10_000 es 10000 y 1_0_0 es 100. El resultado es 10100."}, {"codigo": "Integer a = 127;\nInteger b = 127;\nInteger c = 200;\nInteger d = 200;\nSystem.out.println((a == b) + \" \" + (c == d));", "enunciado": "¿Qué imprime este código?", "opciones": ["true true", "true false", "false true", "false false"], "correcta": 1, "explicacion": "Java cachea instancias de Integer entre -128 y 127. Para 127, a y b apuntan al mismo objeto cacheado (true). Para 200, fuera del rango del caché, se crean objetos distintos (false)."}, {"codigo": "char c = 'A';\nc = (char) (c + 1);\nSystem.out.println(c);", "enunciado": "¿Qué imprime este código?", "opciones": ["B", "A", "66", "No compila"], "correcta": 0, "explicacion": "En una expresión aritmética, char se promueve a int. 'A' equivale a 65, +1 es 66, y el cast (char) lo convierte de nuevo al carácter correspondiente: 'B'."}, {"codigo": "Integer valor = null;\nint x = valor;", "enunciado": "¿Qué ocurre al ejecutar esta línea?", "opciones": ["x vale 0", "Se lanza NullPointerException al intentar desempaquetar (unboxing) el valor null", "No compila", "x vale null"], "correcta": 1, "explicacion": "Al asignar un Integer null a un int primitivo, Java intenta desempaquetarlo automáticamente (unboxing), lo cual lanza NullPointerException porque no hay un valor int equivalente a null."}, {"codigo": "int x = 5;\ndouble y = 10.0;\nSystem.out.println(true ? x : y);", "enunciado": "¿Qué imprime este código?", "opciones": ["5", "5.0", "10.0", "No compila"], "correcta": 1, "explicacion": "En el operador ternario, si las dos ramas tienen tipos numéricos distintos (int y double), el resultado se promueve al tipo más amplio (double), sin importar cuál rama se elija en tiempo de ejecución. Por eso se imprime 5.0."}, {"codigo": "String a = \"hola\";\nString b = new String(\"hola\");\nSystem.out.println(a == b);\nSystem.out.println(a.equals(b));", "enunciado": "¿Qué imprime este código?", "opciones": ["true true", "true false", "false true", "false false"], "correcta": 2, "explicacion": "new String(\"hola\") crea un objeto nuevo fuera del pool de Strings, por lo que == (comparación de referencias) da false. equals() compara el contenido, que sí es igual, dando true."}, {"codigo": "String s = String.format(\"%05d\", 42);\nSystem.out.println(s);", "enunciado": "¿Qué imprime este código?", "opciones": ["00042", "42000", "42", "No compila"], "correcta": 0, "explicacion": "El formato %05d indica un entero con ancho mínimo de 5 caracteres, rellenado con ceros a la izquierda: '00042'."}, {"codigo": null, "enunciado": "¿Cuál de las siguientes líneas NO compila?", "opciones": ["int x = 5; if (x instanceof Integer) { }", "Object o = 5; if (o instanceof Integer) { }", "String s = \"a\"; if (s instanceof CharSequence) { }", "Number n = 5; if (n instanceof Integer) { }"], "correcta": 0, "explicacion": "'instanceof' solo puede aplicarse sobre tipos de referencia. 'x' es de tipo primitivo int, por lo que esa línea produce un error de compilación."}, {"codigo": "int i = 5;\nint j = i++ + ++i;\nSystem.out.println(j);", "enunciado": "¿Qué imprime este código?", "opciones": ["10", "11", "12", "13"], "correcta": 2, "explicacion": "i++ (postfijo) devuelve 5 y luego incrementa i a 6. ++i (prefijo) incrementa i a 7 y devuelve 7. La suma es 5 + 7 = 12."}, {"codigo": "int a = 5;  // 0101\nint b = 3;  // 0011\nSystem.out.println(a & b);\nSystem.out.println(a | b);", "enunciado": "¿Qué imprime este código?", "opciones": ["1 7", "7 1", "1 1", "7 7"], "correcta": 0, "explicacion": "El AND bit a bit (0101 & 0011 = 0001 = 1) y el OR bit a bit (0101 | 0011 = 0111 = 7) operan sobre la representación binaria de los enteros."}, {"codigo": "var arr = new int[]{1, 2, 3};\nSystem.out.println(arr.length);", "enunciado": "¿Qué imprime este código?", "opciones": ["3", "0", "No compila", "Error en tiempo de ejecución"], "correcta": 0, "explicacion": "'var' puede inferir perfectamente tipos de array (aquí int[]) a partir del inicializador, sin ninguna restricción especial."}, {"codigo": "Object[] objetos = new String[3];\nobjetos[0] = 10;", "enunciado": "¿Qué ocurre al ejecutar esta línea?", "opciones": ["Compila y se ejecuta sin problema", "Se lanza ArrayStoreException en tiempo de ejecución", "No compila", "Se lanza ClassCastException"], "correcta": 1, "explicacion": "Los arrays en Java son covariantes: se permite asignar un String[] a una referencia Object[]. Pero el array conserva su tipo REAL (String[]) en tiempo de ejecución, así que intentar guardar un Integer lanza ArrayStoreException."}, {"codigo": "System.out.println(Character.isDigit('7') + \" \" + Character.isLetter('7'));", "enunciado": "¿Qué imprime este código?", "opciones": ["true false", "false true", "true true", "false false"], "correcta": 0, "explicacion": "Character.isDigit('7') es true porque '7' es un dígito. Character.isLetter('7') es false porque un dígito no es una letra."}, {"codigo": "System.out.println(Math.max(3, Math.abs(-7)));", "enunciado": "¿Qué imprime este código?", "opciones": ["3", "7", "-7", "No compila"], "correcta": 1, "explicacion": "Math.abs(-7) devuelve 7, y Math.max(3, 7) devuelve el mayor de los dos: 7."}, {"codigo": "String s = \" Java \";\nSystem.out.println(\"[\" + s.trim() + \"]\");", "enunciado": "¿Qué imprime este código?", "opciones": ["[Java]", "[ Java ]", "[Java ]", "No compila"], "correcta": 0, "explicacion": "trim() elimina los espacios en blanco al inicio y al final de la cadena, dejando '[Java]'."}, {"codigo": "int[] arr = {1, 2, 3};\nfor (int n : arr) {\n    n = n * 10;\n}\nSystem.out.println(Arrays.toString(arr));", "enunciado": "¿Qué imprime este código?", "opciones": ["[1, 2, 3]", "[10, 20, 30]", "[10, 2, 3]", "No compila"], "correcta": 0, "explicacion": "En un for-each, la variable 'n' es una COPIA del valor de cada elemento; modificarla no afecta al array original. El array permanece [1, 2, 3]."}, {"codigo": null, "enunciado": "¿En cuál de los siguientes contextos NO se puede usar 'var'?", "opciones": ["Como tipo de un parámetro de un método regular (no lambda)", "En una variable local con inicializador", "Dentro de un bloque try-with-resources", "Como variable de control de un bucle for tradicional"], "correcta": 0, "explicacion": "'var' solo puede usarse para inferir el tipo de variables LOCALES con inicializador; no puede usarse en parámetros de métodos regulares, campos de clase ni tipos de retorno."}]}, {"id": "flujo", "nombre": "2. Control de flujo (if, switch, bucles, pattern matching)", "preguntas": [{"codigo": "int x = 2;\nString resultado = switch (x) {\n    case 1 -> \"uno\";\n    case 2 -> \"dos\";\n    default -> \"otro\";\n};\nSystem.out.println(resultado);", "enunciado": "¿Qué imprime el código anterior?", "opciones": ["uno", "dos", "otro", "No compila"], "correcta": 1, "explicacion": "La expresión switch con flechas (->) de Java 14+ evalúa el caso coincidente y no requiere 'break'; con x=2 se selecciona 'dos'."}, {"codigo": "Object obj = \"texto\";\nif (obj instanceof String s && s.length() > 3) {\n    System.out.println(s.toUpperCase());\n} else {\n    System.out.println(\"no aplica\");\n}", "enunciado": "¿Qué imprime este código (pattern matching for instanceof)?", "opciones": ["TEXTO", "no aplica", "texto", "No compila"], "correcta": 0, "explicacion": "Pattern matching for instanceof (Java 16+) permite declarar 's' dentro de la condición. 'texto' tiene longitud 5 (>3), por lo que se imprime en mayúsculas."}, {"codigo": "for (int i = 0; i < 3; i++) {\n    for (int j = 0; j < 3; j++) {\n        if (j == 1) continue;\n        System.out.print(i + \"\" + j);\n    }\n}", "enunciado": "¿Qué imprime este código?", "opciones": ["001122", "002021220", "0021 1122", "020212 22"], "correcta": 1, "explicacion": "Cuando j==1 se salta la impresión con continue, así que para cada i se imprimen j=0 y j=2: 00,02,10,12,20,22 -> '002021220' (concatenado sin separadores: 00 02 10 12 20 22 => '002021220')."}, {"codigo": "int y = 10;\nswitch (y) {\n    case 10:\n        System.out.println(\"diez\");\n    case 20:\n        System.out.println(\"veinte\");\n        break;\n    default:\n        System.out.println(\"otro\");\n}", "enunciado": "¿Qué imprime este switch clásico (con dos puntos)?", "opciones": ["diez", "diez\\nveinte", "veinte", "otro"], "correcta": 1, "explicacion": "El switch tradicional tiene 'fall-through': al no haber 'break' después de case 10, la ejecución continúa hacia case 20 e imprime ambos mensajes."}, {"codigo": null, "enunciado": "¿Cuál de las siguientes etiquetas de switch es válida para un patrón de tipo (type pattern) en Java 17 (preview / posterior)?", "opciones": ["case Integer i -> System.out.println(i);", "case int i -> System.out.println(i);", "case (Integer) i -> System.out.println(i);", "case Integer: i -> System.out.println(i);"], "correcta": 0, "explicacion": "El pattern matching en switch permite 'case TipoReferencia variable ->' para tipos de referencia; no aplica directamente a tipos primitivos como int."}, {"codigo": "outer:\nfor (int i = 0; i < 3; i++) {\n    for (int j = 0; j < 3; j++) {\n        if (j == 1) break outer;\n        System.out.print(i + \"\" + j + \" \");\n    }\n}", "enunciado": "¿Qué imprime este código con etiqueta (labeled break)?", "opciones": ["00 ", "00 01 ", "00 10 20 ", "No imprime nada"], "correcta": 0, "explicacion": "Cuando i=0, j=0 se imprime '00 '. En la siguiente iteración j=1, se cumple la condición y 'break outer' termina AMBOS bucles inmediatamente."}, {"codigo": "int n = 5;\ndo {\n    System.out.print(n + \" \");\n    n--;\n} while (n > 5);", "enunciado": "¿Qué imprime este bucle do-while?", "opciones": ["5 4 3 2 1", "5 ", "Bucle infinito", "No imprime nada"], "correcta": 1, "explicacion": "do-while ejecuta el cuerpo AL MENOS una vez antes de evaluar la condición. Se imprime '5', luego n=4, y la condición (4 > 5) es falsa, así que termina."}, {"codigo": null, "enunciado": "En un switch de tipo expresión (switch expression) que usa 'yield', ¿en qué contexto se utiliza?", "opciones": ["Dentro de un bloque { } de un case, para devolver el valor de la expresión switch", "Para pausar la ejecución del hilo actual", "Solo puede usarse en bucles for-each", "Es sinónimo de 'return' en cualquier método"], "correcta": 0, "explicacion": "'yield' se usa dentro de bloques de código en un switch expression cuando el case necesita lógica adicional antes de producir el valor resultante."}, {"codigo": "for (var i = 0; i < 5; i += 2) {\n    if (i == 4) break;\n    System.out.print(i);\n}", "enunciado": "¿Qué imprime este código?", "opciones": ["024", "02", "0246", "No compila"], "correcta": 1, "explicacion": "i toma los valores 0, 2, 4 (incrementando de 2 en 2). Cuando i llega a 4, el break detiene el bucle ANTES de imprimir ese valor. Se imprimen 0 y 2."}, {"codigo": null, "enunciado": "¿Qué sucede si un bloque switch expression con 'case ->' no cubre todos los valores posibles de un enum y no tiene 'default'?", "opciones": ["Compila sin problema siempre", "El compilador exige exhaustividad y puede dar error si faltan casos y no hay default", "Se lanza NullPointerException en tiempo de ejecución siempre", "Se ignora silenciosamente el caso faltante"], "correcta": 1, "explicacion": "Las switch expressions deben ser exhaustivas: si no cubren todos los valores del enum, el compilador exige un 'default' (o falla en tiempo de compilación)."}, {"codigo": "String dia = \"MAR\";\nswitch (dia) {\n    case \"LUN\": System.out.print(\"L\"); break;\n    case \"MAR\": System.out.print(\"M\"); break;\n    default: System.out.print(\"?\");\n}", "enunciado": "¿Qué imprime este código?", "opciones": ["L", "M", "?", "No compila"], "correcta": 1, "explicacion": "El switch clásico admite String como selector desde Java 7, comparando internamente con equals(). Como dia es 'MAR', se ejecuta ese case, imprimiendo 'M'."}, {"codigo": "int x = 5;\nString r = x > 10 ? \"grande\" : x > 3 ? \"medio\" : \"pequeño\";\nSystem.out.println(r);", "enunciado": "¿Qué imprime este código con ternarios anidados?", "opciones": ["grande", "medio", "pequeño", "No compila"], "correcta": 1, "explicacion": "x=5 no es mayor que 10, así que se evalúa la segunda condición: 5 > 3 es true, por lo tanto el resultado es 'medio'."}, {"codigo": "int x = switch(1) {\n    case 1: break 5;\n    default: yield 0;\n};", "enunciado": "¿Compila este código?", "opciones": ["Sí, sin problema", "No, 'break' no puede devolver un valor en un switch expression; se debe usar 'yield'", "No, falta un case adicional", "No, un switch expression no admite 'case:' con dos puntos"], "correcta": 1, "explicacion": "Cuando un switch expression usa bloques 'case:' con dos puntos, la forma correcta de producir el valor resultante es con 'yield valor;'. 'break valor' no es una sintaxis válida."}, {"codigo": "int i = 0;\nwhile (true) {\n    i++;\n    if (i == 3) break;\n}\nSystem.out.println(i);", "enunciado": "¿Qué imprime este código?", "opciones": ["3", "2", "4", "Bucle infinito"], "correcta": 0, "explicacion": "El bucle incrementa i hasta que llega a 3, momento en el cual 'break' detiene el bucle. Se imprime 3."}, {"codigo": "Map<String, Integer> m = new LinkedHashMap<>();\nm.put(\"a\", 1);\nm.put(\"b\", 2);\nfor (Map.Entry<String, Integer> e : m.entrySet()) {\n    System.out.print(e.getKey());\n}", "enunciado": "¿Qué imprime este código?", "opciones": ["ab", "ba", "{a=1, b=2}", "No compila"], "correcta": 0, "explicacion": "LinkedHashMap conserva el orden de inserción. El for-each sobre entrySet() recorre las entradas en ese orden, imprimiendo las claves 'a' y 'b'."}, {"codigo": "enum Color { ROJO, VERDE, AZUL }\n// suponiendo 'color' de tipo Color\nString s = switch (color) {\n    case ROJO -> \"r\";\n    case VERDE -> \"v\";\n};", "enunciado": "¿Compila este código si 'color' es de tipo Color?", "opciones": ["Sí, siempre", "No, falta cubrir AZUL o agregar un caso default", "Sí, pero falla en tiempo de ejecución", "No, switch expression no admite valores enum"], "correcta": 1, "explicacion": "Un switch expression debe ser exhaustivo. Como el enum Color tiene tres valores y solo se cubren dos (ROJO, VERDE), el compilador exige cubrir AZUL o agregar un 'default'."}, {"codigo": "int i = 0;\ndo\n    System.out.print(i);\nwhile (++i < 3);", "enunciado": "¿Qué imprime este código (do-while sin llaves)?", "opciones": ["012", "0123", "Bucle infinito", "No compila"], "correcta": 0, "explicacion": "do-while sin llaves aplica solo a la siguiente sentencia. Se imprime i (0), luego se evalúa ++i < 3 en cada iteración: imprime 0, 1, 2, y se detiene cuando i llega a 3."}, {"codigo": "int[] arr = null;\nif (arr != null && arr.length > 0) {\n    System.out.println(\"tiene elementos\");\n} else {\n    System.out.println(\"vacio o null\");\n}", "enunciado": "¿Qué imprime este código?", "opciones": ["tiene elementos", "vacio o null", "NullPointerException", "No compila"], "correcta": 1, "explicacion": "El operador && es de cortocircuito (short-circuit): como 'arr != null' es false, Java no evalúa 'arr.length', evitando un NullPointerException, y el resultado final es false, imprimiendo 'vacio o null'."}, {"codigo": "outer:\nfor (int i = 0; i < 3; i++) {\n    for (int j = 0; j < 3; j++) {\n        if (j == 1) continue outer;\n        System.out.print(i + \"\" + j);\n    }\n}", "enunciado": "¿Qué imprime este código con etiqueta (continue outer)?", "opciones": ["001020", "000102", "00 10 20", "Bucle infinito"], "correcta": 0, "explicacion": "Cuando j==1, 'continue outer' salta directamente a la siguiente iteración del bucle EXTERNO. Solo se imprime cuando j==0 para cada i: '00', '10', '20', concatenados: '001020'."}, {"codigo": "int x = 2;\nswitch (x) {\n    case 1:\n    case 2:\n        System.out.print(\"uno o dos\");\n        break;\n    default:\n        System.out.print(\"otro\");\n}", "enunciado": "¿Qué imprime este código con etiquetas de case agrupadas?", "opciones": ["uno o dos", "otro", "unodos", "No compila"], "correcta": 0, "explicacion": "Al no haber código entre 'case 1:' y 'case 2:', ambos casos comparten el mismo bloque gracias al fall-through, por lo que x=2 también ejecuta 'uno o dos'."}, {"codigo": "int i = 0;\nfor (; i < 5; ) {\n    System.out.print(i);\n    i += 2;\n}", "enunciado": "¿Qué imprime este bucle for con condición pero sin actualización explícita?", "opciones": ["024", "01234", "02 4", "Bucle infinito"], "correcta": 0, "explicacion": "El for solo requiere la condición; la actualización se hace manualmente dentro del cuerpo. i toma los valores 0, 2, 4 antes de que la condición (i<5) se vuelva falsa, imprimiendo '024'."}, {"codigo": "var resultado = switch (3) {\n    case 1, 2 -> \"bajo\";\n    case 3, 4 -> \"medio\";\n    default -> \"alto\";\n};\nSystem.out.println(resultado);", "enunciado": "¿Qué imprime este código?", "opciones": ["bajo", "medio", "alto", "No compila"], "correcta": 1, "explicacion": "El switch expression admite múltiples etiquetas separadas por coma en un mismo case. Como 3 coincide con 'case 3, 4', el resultado es 'medio'."}, {"codigo": "for (;;) {\n    System.out.print(\"x\");\n    break;\n}", "enunciado": "¿Qué imprime este bucle 'for' infinito con break inmediato?", "opciones": ["Bucle infinito, nunca termina", "x", "No compila", "Error en tiempo de compilación"], "correcta": 1, "explicacion": "'for(;;)' es una forma válida de crear un bucle sin condición de parada explícita, pero el 'break' dentro del cuerpo lo detiene inmediatamente tras imprimir 'x' una sola vez."}, {"codigo": "int x = 5;\nif (x > 0)\n    if (x > 10)\n        System.out.print(\"grande\");\n    else\n        System.out.print(\"pequeño\");", "enunciado": "¿Qué imprime este código (dangling else)?", "opciones": ["grande", "pequeño", "No imprime nada", "No compila"], "correcta": 1, "explicacion": "El 'else' siempre se asocia al 'if' más cercano sin llaves, es decir, a 'if (x > 10)', no al 'if (x > 0)' externo. Como x=5 no es mayor que 10, se ejecuta el else, imprimiendo 'pequeño'."}, {"codigo": "byte b = 10;\nb += 5;\nSystem.out.println(b);", "enunciado": "¿Qué imprime este código?", "opciones": ["15", "No compila", "Error en tiempo de ejecución", "10"], "correcta": 0, "explicacion": "Los operadores de asignación compuesta (+=) realizan un cast implícito al tipo original, a diferencia de escribir 'b = b + 5' directamente (que no compilaría sin cast explícito entre byte e int)."}, {"codigo": "Boolean flag = null;\nint x = flag ? 1 : 2;", "enunciado": "¿Qué ocurre al ejecutar esta línea?", "opciones": ["x vale 2", "Se lanza NullPointerException al desempaquetar flag", "No compila", "x vale 1"], "correcta": 1, "explicacion": "La condición del ternario requiere un boolean primitivo. Al desempaquetar (unboxing) el Boolean null, se lanza NullPointerException antes de poder evaluar la expresión."}, {"codigo": "String s = \"b\";\nswitch (s) {\n    default:\n        System.out.print(\"def-\");\n    case \"a\":\n        System.out.print(\"a\");\n        break;\n    case \"b\":\n        System.out.print(\"b\");\n}", "enunciado": "¿Qué imprime este código?", "opciones": ["b", "a", "def-a", "No compila"], "correcta": 0, "explicacion": "El 'default' puede colocarse en cualquier posición dentro del switch; solo se usa si ningún case coincide. Como s='b' coincide directamente con 'case \"b\":', se ejecuta ese bloque, imprimiendo 'b'."}]}, {"id": "poo", "nombre": "3. Programación orientada a objetos (clases, herencia, records, sealed)", "preguntas": [{"codigo": "public record Punto(int x, int y) {\n    public Punto {\n        if (x < 0) throw new IllegalArgumentException(\"x negativo\");\n    }\n}", "enunciado": "¿Qué tipo de constructor se ha definido dentro del record 'Punto'?", "opciones": ["Un constructor compacto (compact constructor)", "Un constructor sobrecargado normal", "Un constructor estático", "No compila porque falta la lista de parámetros"], "correcta": 0, "explicacion": "Los records permiten un 'constructor compacto' sin lista de parámetros explícita (se usan los mismos nombres definidos en el encabezado del record) para validar o normalizar valores antes de la asignación automática de los campos."}, {"codigo": "public sealed interface Figura permits Circulo, Cuadrado {}\npublic final class Circulo implements Figura {}\npublic final class Cuadrado implements Figura {}", "enunciado": "¿Qué garantiza el uso de 'sealed' e 'permits' en este código?", "opciones": ["Que solo las clases listadas pueden implementar la interfaz", "Que la interfaz no puede tener métodos abstractos", "Que las clases hijas deben ser todas abstractas", "Que se genera automáticamente un método equals()"], "correcta": 0, "explicacion": "Las interfaces/clases 'sealed' (Java 17) restringen qué clases pueden extenderlas o implementarlas, mediante la cláusula 'permits', permitiendo jerarquías cerradas y controladas."}, {"codigo": "class Animal {\n    void hacerSonido() { System.out.println(\"...\"); }\n}\nclass Perro extends Animal {\n    @Override\n    void hacerSonido() { System.out.println(\"Guau\"); }\n}\nAnimal a = new Perro();\na.hacerSonido();", "enunciado": "¿Qué imprime este código?", "opciones": ["...", "Guau", "No compila", "Error en tiempo de ejecución"], "correcta": 1, "explicacion": "Esto demuestra polimorfismo en tiempo de ejecución: aunque la referencia es de tipo Animal, el método invocado es el sobrescrito en Perro (dynamic dispatch)."}, {"codigo": null, "enunciado": "¿Cuál de las siguientes NO es una característica automática de un 'record'?", "opciones": ["Métodos de acceso (accessors) con el mismo nombre que los campos", "Implementación de equals() y hashCode() basada en los campos", "Un método toString() legible", "Posibilidad de heredar de otra clase concreta"], "correcta": 3, "explicacion": "Los records son implícitamente 'final' y siempre extienden java.lang.Record, por lo que NO pueden heredar de otra clase (aunque sí pueden implementar interfaces)."}, {"codigo": "abstract class Vehiculo {\n    abstract void mover();\n}\nclass Auto extends Vehiculo {\n    // sin implementar mover()\n}", "enunciado": "¿Qué ocurre al compilar este código?", "opciones": ["Compila correctamente", "No compila: Auto debe implementar mover() o ser declarada abstracta también", "Compila pero lanza excepción en tiempo de ejecución al instanciar Auto", "No compila porque Vehiculo no tiene constructor"], "correcta": 1, "explicacion": "Una clase concreta que extiende una clase abstracta debe implementar todos los métodos abstractos heredados, o de lo contrario debe declararse también como abstracta."}, {"codigo": null, "enunciado": "¿Qué modificador de acceso permite que un miembro sea visible solo dentro del mismo paquete y por subclases (incluso en otro paquete)?", "opciones": ["private", "protected", "default (sin modificador)", "public"], "correcta": 1, "explicacion": "'protected' permite acceso desde el mismo paquete y también desde subclases ubicadas en otros paquetes (a través de herencia). El acceso 'default' (sin modificador) solo permite acceso dentro del mismo paquete."}, {"codigo": "interface Saludo {\n    default String decir() { return \"Hola\"; }\n}\ninterface Despedida {\n    default String decir() { return \"Adiós\"; }\n}\nclass Mixto implements Saludo, Despedida {\n    // ¿Qué se necesita aquí?\n}", "enunciado": "¿Qué debe hacer la clase Mixto para compilar correctamente?", "opciones": ["Nada, Java elige automáticamente el método de Saludo", "Sobrescribir el método decir() para resolver el conflicto explícitamente", "No es posible implementar dos interfaces con métodos default con igual firma", "Usar 'super.decir()' sin sobrescribir el método"], "correcta": 1, "explicacion": "Cuando dos interfaces aportan métodos default con la misma firma, la clase implementadora DEBE sobrescribir el método para resolver la ambigüedad (puede invocar una versión específica con Interfaz.super.metodo())."}, {"codigo": null, "enunciado": "¿Cuál es el propósito de un bloque de inicialización de instancia (instance initializer block) en una clase?", "opciones": ["Ejecutar código antes de cada constructor, útil para lógica común de inicialización", "Reemplazar por completo la necesidad de constructores", "Ejecutarse solo una vez por clase, sin importar cuántas instancias se creen", "Definir métodos estáticos"], "correcta": 0, "explicacion": "Los bloques de inicialización de instancia (delimitados por { }) se ejecutan cada vez que se crea un objeto, justo antes del cuerpo del constructor, después de la inicialización de campos."}, {"codigo": "enum Dia {\n    LUNES, MARTES, MIERCOLES;\n    public String describir() {\n        return switch (this) {\n            case LUNES -> \"Inicio\";\n            case MARTES, MIERCOLES -> \"Medio\";\n        };\n    }\n}", "enunciado": "¿Este código compila correctamente?", "opciones": ["Sí, es exhaustivo porque cubre los tres valores del enum", "No, falta un caso default obligatorio", "No, un enum no puede tener métodos", "No, switch no admite múltiples etiquetas separadas por coma"], "correcta": 0, "explicacion": "El switch expression cubre los tres valores posibles del enum (LUNES, MARTES, MIERCOLES agrupados), por lo que es exhaustivo y no necesita 'default'."}, {"codigo": null, "enunciado": "¿Qué keyword se usa para permitir que una subclase de una clase 'sealed' sea extendida libremente por cualquier otra clase?", "opciones": ["open", "non-sealed", "unsealed", "extends-all"], "correcta": 1, "explicacion": "'non-sealed' es el modificador que se aplica a una subclase directa de una clase/interfaz sellada, para 'reabrir' la jerarquía y permitir que cualquier clase la extienda."}, {"codigo": "class Persona {\n    String nombre;\n    Persona(String n) { nombre = n; }\n}\nPersona p1 = new Persona(\"Ana\");\nPersona p2 = new Persona(\"Ana\");\nSystem.out.println(p1.equals(p2));", "enunciado": "¿Qué imprime este código?", "opciones": ["true", "false", "No compila", "Error en tiempo de ejecución"], "correcta": 1, "explicacion": "Sin sobrescribir equals(), se hereda la implementación de Object, que compara referencias de memoria. p1 y p2 son objetos distintos, así que el resultado es false."}, {"codigo": "class A { static String id() { return \"A\"; } }\nclass B extends A { static String id() { return \"B\"; } }\nA obj = new B();\nSystem.out.println(obj.id());", "enunciado": "¿Qué imprime este código?", "opciones": ["A", "B", "No compila", "Error en tiempo de ejecución"], "correcta": 0, "explicacion": "Los métodos estáticos no participan en polimorfismo de tiempo de ejecución. Se resuelven según el tipo de la referencia en tiempo de COMPILACIÓN (A), no el tipo real del objeto."}, {"codigo": "abstract class Figura {\n    Figura() { System.out.println(\"Figura creada\"); }\n}\nclass Circulo extends Figura {\n    Circulo() { super(); System.out.println(\"Circulo creado\"); }\n}\nnew Circulo();", "enunciado": "¿Qué imprime este código?", "opciones": ["Circulo creado", "Figura creada seguido de Circulo creado", "No compila porque Figura es abstracta", "Error en tiempo de ejecución"], "correcta": 1, "explicacion": "Aunque una clase abstracta no puede instanciarse directamente, sí puede tener constructores que se invocan desde las subclases mediante super(), en orden: primero el de la superclase, luego el de la subclase."}, {"codigo": "interface Utilidades {\n    static int doble(int x) { return x * 2; }\n}\nSystem.out.println(Utilidades.doble(5));", "enunciado": "¿Qué imprime este código?", "opciones": ["10", "No compila porque las interfaces no pueden tener métodos estáticos", "Error en tiempo de ejecución", "5"], "correcta": 0, "explicacion": "Desde Java 8, las interfaces pueden tener métodos estáticos, invocables directamente mediante NombreInterfaz.metodo(), sin necesidad de una implementación."}, {"codigo": "interface Calculadora {\n    private int ayuda() { return 1; }\n    default int calcular() { return ayuda() + 1; }\n}", "enunciado": "¿Es válido este código (Java 9+)?", "opciones": ["Sí, los métodos privados de interfaz permiten reutilizar lógica entre métodos default/estáticos", "No, las interfaces no pueden tener métodos privados", "No, los métodos default no pueden invocar métodos privados", "No compila porque falta 'abstract'"], "correcta": 0, "explicacion": "Desde Java 9, las interfaces pueden declarar métodos privados, usados internamente para compartir lógica entre sus métodos default y estáticos sin exponerla públicamente."}, {"codigo": "interface Nombrable { String nombre(); }\nrecord Persona(String nombre, int edad) implements Nombrable {}", "enunciado": "¿Es válido este código?", "opciones": ["Sí, compila correctamente: el accessor automático nombre() satisface el método de la interfaz", "No, los records no pueden implementar interfaces", "No, falta implementar el método edad()", "Error en tiempo de ejecución al crear una instancia"], "correcta": 0, "explicacion": "Los records SÍ pueden implementar interfaces. El accessor generado automáticamente (nombre()) cumple con el método abstracto declarado en Nombrable."}, {"codigo": "class Externa {\n    class Interna {}\n}\nExterna ext = new Externa();\nExterna.Interna in = ext.new Interna();", "enunciado": "¿Es correcta esta forma de instanciar la clase interna (no estática)?", "opciones": ["Sí, es la sintaxis correcta para una inner class no estática", "No, se debe usar new Externa.Interna()", "No, las inner classes no pueden instanciarse desde fuera", "No compila nunca"], "correcta": 0, "explicacion": "Una clase interna NO estática requiere una instancia de la clase externa para crearse, usando la sintaxis 'instanciaExterna.new Interna()'."}, {"codigo": "class Externa {\n    static class Nido {}\n}\nExterna.Nido n = new Externa.Nido();", "enunciado": "¿Qué característica tiene 'Nido' al ser una clase anidada estática?", "opciones": ["No necesita una instancia de Externa para ser creada", "Siempre requiere una instancia de Externa", "No puede tener métodos", "No puede ser pública"], "correcta": 0, "explicacion": "Una clase anidada estática (static nested class) no está ligada a una instancia particular de la clase externa, por lo que puede crearse directamente con 'new Externa.Nido()'."}, {"codigo": "interface Sonido { String emitir(); }\nenum Animal implements Sonido {\n    PERRO { public String emitir() { return \"Guau\"; } },\n    GATO { public String emitir() { return \"Miau\"; } };\n}\nSystem.out.println(Animal.GATO.emitir());", "enunciado": "¿Qué imprime este código?", "opciones": ["Miau", "Guau", "No compila", "GATO"], "correcta": 0, "explicacion": "Un enum puede implementar interfaces y cada constante puede tener su propio cuerpo con implementaciones específicas de los métodos. GATO.emitir() devuelve 'Miau'."}, {"codigo": "class A {\n    void metodo(int x) { System.out.println(\"int\"); }\n}\nclass B extends A {\n    void metodo(long x) { System.out.println(\"long\"); }\n}\nnew B().metodo(5);", "enunciado": "¿Qué imprime este código?", "opciones": ["int", "long", "No compila", "Ambos"], "correcta": 0, "explicacion": "metodo(long) en B es una SOBRECARGA, no una sobrescritura (los tipos de parámetro son distintos). Al llamar con el literal int 5, Java prefiere la coincidencia exacta heredada metodo(int) antes de ensanchar a long."}, {"codigo": "class A {\n    final void mostrar() { System.out.println(\"A\"); }\n}\nclass B extends A {\n    void mostrar() { System.out.println(\"B\"); }\n}", "enunciado": "¿Qué ocurre al intentar compilar la clase B?", "opciones": ["Compila y sobrescribe mostrar()", "No compila: no se puede sobrescribir un método final", "Error en tiempo de ejecución", "Compila, pero mostrar() de B nunca se ejecuta"], "correcta": 1, "explicacion": "Un método marcado como 'final' no puede ser sobrescrito por ninguna subclase; intentarlo produce un error de compilación."}, {"codigo": "class Punto {\n    int x, y;\n    Punto() { this(0, 0); }\n    Punto(int x, int y) { this.x = x; this.y = y; }\n}\nnew Punto();", "enunciado": "¿Qué principio demuestra el uso de 'this(0, 0)' en el constructor sin argumentos?", "opciones": ["Encadenamiento de constructores (constructor chaining) para reutilizar lógica de inicialización", "Sobrecarga de operadores", "Anulación de método (overriding)", "Inicialización estática"], "correcta": 0, "explicacion": "'this(...)' invoca a otro constructor de la misma clase, permitiendo reutilizar lógica de inicialización común sin duplicar código (constructor chaining)."}, {"codigo": "class Config {\n    static int valor;\n    static {\n        valor = 10;\n        System.out.println(\"bloque estático\");\n    }\n}\nnew Config();\nnew Config();", "enunciado": "¿Cuántas veces se imprime \"bloque estático\"?", "opciones": ["1", "2", "0", "Depende del recolector de basura"], "correcta": 0, "explicacion": "Los bloques de inicialización estática se ejecutan una única vez, cuando la clase se carga por primera vez en la JVM, sin importar cuántas instancias se creen después."}, {"codigo": "class Animal {\n    Animal reproducir() { return new Animal(); }\n}\nclass Perro extends Animal {\n    @Override\n    Perro reproducir() { return new Perro(); }\n}", "enunciado": "¿Por qué compila esta sobrescritura aunque el tipo de retorno sea distinto (Perro en vez de Animal)?", "opciones": ["Porque Java permite tipos de retorno covariantes: Perro es un subtipo de Animal", "Porque los tipos de retorno se ignoran al sobrescribir", "Porque @Override lo permite sin restricciones", "No debería compilar, es un error"], "correcta": 0, "explicacion": "Java permite 'tipos de retorno covariantes' en la sobrescritura: el método sobrescrito puede devolver un subtipo del tipo de retorno original, siempre que sea compatible."}, {"codigo": "class Producto {\n    String nombre;\n    Producto(String n) { nombre = n; }\n    @Override\n    public String toString() { return \"Producto[\" + nombre + \"]\"; }\n}\nSystem.out.println(new Producto(\"Mesa\"));", "enunciado": "¿Qué imprime este código?", "opciones": ["Producto[Mesa]", "Producto@hash", "Mesa", "No compila"], "correcta": 0, "explicacion": "System.out.println() invoca implícitamente toString() sobre el objeto. Al estar sobrescrito, se usa la implementación personalizada que devuelve 'Producto[Mesa]'."}, {"codigo": "class Cuenta {\n    private double saldo;\n    Cuenta(double s) { saldo = s; }\n    boolean tieneMasSaldoQue(Cuenta otra) {\n        return this.saldo > otra.saldo;\n    }\n}", "enunciado": "¿Por qué puede este método acceder directamente a 'otra.saldo' aunque sea un campo privado?", "opciones": ["Porque el acceso 'private' se aplica a nivel de CLASE, no de instancia: cualquier método de Cuenta puede acceder a los campos privados de otro objeto Cuenta", "Porque 'saldo' no es realmente privado en este caso", "No compila, es un error de acceso", "Porque 'otra' es un parámetro especial reservado"], "correcta": 0, "explicacion": "En Java, el modificador 'private' restringe el acceso a nivel de clase, no de objeto individual. Cualquier método definido dentro de Cuenta puede acceder a los campos privados de cualquier instancia de Cuenta."}]}, {"id": "excepciones", "nombre": "4. Manejo de excepciones", "preguntas": [{"codigo": "try {\n    throw new RuntimeException(\"A\");\n} catch (RuntimeException e) {\n    System.out.print(\"B\");\n} finally {\n    System.out.print(\"C\");\n}\nSystem.out.print(\"D\");", "enunciado": "¿Qué imprime este código?", "opciones": ["BC", "BCD", "CD", "ABCD"], "correcta": 1, "explicacion": "La excepción es capturada por el catch (imprime B), luego SIEMPRE se ejecuta finally (imprime C), y como la excepción fue manejada, el flujo continúa e imprime D."}, {"codigo": "public class MiExcepcion extends Exception {\n    public MiExcepcion(String msg) { super(msg); }\n}\n\npublic void metodo() {\n    throw new MiExcepcion(\"error\");\n}", "enunciado": "¿Qué problema tiene este código?", "opciones": ["MiExcepcion extiende Exception (checked), por lo que 'metodo' debe declarar 'throws MiExcepcion' o capturarla", "No se puede extender Exception directamente", "El constructor no puede llamar a super(msg)", "No hay ningún problema, compila perfectamente"], "correcta": 0, "explicacion": "Al extender Exception (no RuntimeException), MiExcepcion es una excepción 'checked'. Cualquier método que la lance debe declararla en su cláusula throws o manejarla con try-catch."}, {"codigo": "try (var recurso = new MiRecurso()) {\n    recurso.usar();\n} catch (Exception e) {\n    System.out.println(\"Error\");\n}", "enunciado": "Para que este 'try-with-resources' compile, ¿qué debe implementar MiRecurso?", "opciones": ["Cloneable", "AutoCloseable", "Serializable", "Comparable"], "correcta": 1, "explicacion": "El try-with-resources requiere que el recurso implemente la interfaz AutoCloseable (o Closeable), para que su método close() se invoque automáticamente al final del bloque."}, {"codigo": "try {\n    int[] arr = new int[2];\n    System.out.println(arr[5]);\n} catch (NullPointerException e) {\n    System.out.println(\"NPE\");\n} catch (ArrayIndexOutOfBoundsException e) {\n    System.out.println(\"AIOOBE\");\n}", "enunciado": "¿Qué imprime este código?", "opciones": ["NPE", "AIOOBE", "No compila", "No se captura la excepción"], "correcta": 1, "explicacion": "Acceder a un índice fuera de rango de un array lanza ArrayIndexOutOfBoundsException, que es capturada por el segundo bloque catch correspondiente."}, {"codigo": null, "enunciado": "¿Cuál de estas excepciones es 'unchecked' (no verificada por el compilador)?", "opciones": ["IOException", "SQLException", "NumberFormatException", "InterruptedException"], "correcta": 2, "explicacion": "NumberFormatException extiende IllegalArgumentException que extiende RuntimeException, por lo que es 'unchecked'. Las otras tres son excepciones 'checked' (heredan directamente de Exception)."}, {"codigo": "try {\n    throw new IllegalStateException(\"x\");\n} catch (RuntimeException | Error e) {\n    System.out.println(\"capturado\");\n} finally {\n    return;\n}", "enunciado": "¿Este código compila?", "opciones": ["Sí, multi-catch con RuntimeException y Error es válido", "No, no se puede combinar RuntimeException y Error en un multi-catch", "No, finally no puede tener un return", "No, falta declarar throws en el método"], "correcta": 0, "explicacion": "Un bloque multi-catch (con |) puede combinar cualquier tipo de excepción (checked, unchecked o Error) siempre que no exista relación de herencia directa entre ellas. RuntimeException y Error no están relacionadas jerárquicamente entre sí, así que es válido."}, {"codigo": "public int calcular() {\n    try {\n        return 1;\n    } finally {\n        return 2;\n    }\n}", "enunciado": "¿Qué devuelve el método calcular()?", "opciones": ["1", "2", "No compila", "Lanza excepción en tiempo de ejecución"], "correcta": 1, "explicacion": "Cuando finally contiene un 'return', este SIEMPRE sobrescribe cualquier valor de retorno pendiente del bloque try, por lo que el método devuelve 2 (aunque esta práctica se considera un mal hábito de programación)."}, {"codigo": null, "enunciado": "En try-with-resources con múltiples recursos declarados, ¿en qué orden se cierran?", "opciones": ["En el mismo orden en que fueron declarados", "En orden inverso al de su declaración", "En orden alfabético del nombre de la variable", "El orden no está definido"], "correcta": 1, "explicacion": "Los recursos se cierran en orden inverso a como fueron abiertos/declarados, similar a una pila (el último recurso abierto es el primero en cerrarse)."}, {"codigo": "catch (Exception e) {\n    System.out.println(e.getMessage());\n} catch (ArithmeticException ae) {\n    System.out.println(\"aritmética\");\n}", "enunciado": "¿Qué problema tiene este fragmento (suponiendo un try previo válido)?", "opciones": ["No compila: el catch de ArithmeticException es inalcanzable porque Exception ya lo cubre y está antes", "No hay ningún problema", "Falta un finally obligatorio", "ArithmeticException no puede capturarse nunca"], "correcta": 0, "explicacion": "Cuando se ordenan bloques catch, las subclases deben ir ANTES que sus superclases. Como Exception es superclase de ArithmeticException y va primero, el segundo catch es código inalcanzable, lo que produce un error de compilación."}, {"codigo": null, "enunciado": "¿Cuál es la superclase común de Exception y Error?", "opciones": ["RuntimeException", "Throwable", "Object", "IOException"], "correcta": 1, "explicacion": "Throwable es la superclase raíz de toda la jerarquía de excepciones y errores en Java; de ella derivan tanto Exception como Error."}, {"codigo": "class ServicioException extends Exception {\n    public ServicioException(String msg, Throwable causa) { super(msg, causa); }\n}\ntry {\n    try {\n        throw new NullPointerException(\"original\");\n    } catch (NullPointerException e) {\n        throw new ServicioException(\"fallo servicio\", e);\n    }\n} catch (ServicioException se) {\n    System.out.println(se.getCause().getMessage());\n}", "enunciado": "¿Qué imprime este código?", "opciones": ["original", "fallo servicio", "null", "No compila"], "correcta": 0, "explicacion": "getCause() devuelve la excepción original encadenada (la NullPointerException pasada al constructor), cuyo mensaje es 'original'."}, {"codigo": "void metodo() throws IOException, SQLException {\n    try {\n        if (Math.random() > 2) throw new IOException();\n        else throw new SQLException();\n    } catch (Exception e) {\n        throw e;\n    }\n}", "enunciado": "¿Por qué compila 'throws IOException, SQLException' aunque se capture y relance un 'Exception' genérico?", "opciones": ["Por el análisis de 'rethrow preciso' (precise rethrow) desde Java 7, que infiere los tipos reales lanzados dentro del try", "Porque Exception siempre se traduce automáticamente a esos tipos", "No compila; se necesitaría 'throws Exception'", "Porque IOException y SQLException no son checked"], "correcta": 0, "explicacion": "Desde Java 7, si la variable capturada en el catch es efectivamente final y solo se relanza (throw e), el compilador analiza los tipos concretos que pueden lanzarse dentro del try, permitiendo una cláusula throws más precisa."}, {"codigo": "int x = -5;\nassert x > 0 : \"x debe ser positivo\";\nSystem.out.println(\"fin\");", "enunciado": "Si las aserciones NO están habilitadas (comportamiento por defecto de la JVM), ¿qué imprime este código?", "opciones": ["fin", "Se lanza AssertionError", "No compila", "x debe ser positivo"], "correcta": 0, "explicacion": "Las aserciones están deshabilitadas por defecto en la JVM; deben activarse explícitamente con la opción -ea. Sin ella, la sentencia 'assert' se ignora por completo."}, {"codigo": "try {\n    System.out.println(\"intento\");\n} finally {\n    System.out.println(\"finally\");\n}", "enunciado": "¿Es válido un bloque try sin catch, solo con finally?", "opciones": ["Sí, es completamente válido", "No, siempre se requiere al menos un catch", "No compila nunca", "Solo es válido en try-with-resources"], "correcta": 0, "explicacion": "Un bloque try puede ir acompañado solo de finally (sin catch), siempre que exista al menos uno de los dos (catch o finally)."}, {"codigo": "class Recurso {\n    Recurso() { throw new RuntimeException(\"fallo al crear\"); }\n}\ntry {\n    Recurso r = new Recurso();\n} catch (RuntimeException e) {\n    System.out.println(\"capturado: \" + e.getMessage());\n}", "enunciado": "¿Qué imprime este código?", "opciones": ["capturado: fallo al crear", "No compila", "r se crea con valor null", "Error en tiempo de ejecución no capturado"], "correcta": 0, "explicacion": "Una excepción lanzada dentro de un constructor puede capturarse igual que cualquier otra, ya que la creación del objeto ocurre dentro del bloque try."}, {"codigo": "void recursivo() { recursivo(); }", "enunciado": "¿Qué error se produce al invocar recursivo()?", "opciones": ["StackOverflowError", "OutOfMemoryError", "IllegalStateException", "No ocurre ningún error, se ejecuta indefinidamente"], "correcta": 0, "explicacion": "La recursión infinita agota el espacio de la pila de llamadas (call stack), lanzando un StackOverflowError, que es una subclase de Error, no de Exception."}, {"codigo": "try {\n    int x = Integer.parseInt(\"abc\");\n} catch (NumberFormatException e) {\n    System.out.println(\"no numérico\");\n}", "enunciado": "¿Qué imprime este código?", "opciones": ["no numérico", "abc", "0", "No compila"], "correcta": 0, "explicacion": "Integer.parseInt() lanza NumberFormatException cuando la cadena no representa un número entero válido, como es el caso de 'abc'."}, {"codigo": "Object o = \"texto\";\nInteger i = (Integer) o;", "enunciado": "¿Qué ocurre al ejecutar esta línea?", "opciones": ["i vale null", "Se lanza ClassCastException en tiempo de ejecución", "No compila", "i vale 0"], "correcta": 1, "explicacion": "El objeto real referenciado por 'o' es un String, no un Integer. El cast explícito falla en tiempo de ejecución con ClassCastException."}, {"codigo": "class SaldoInsuficienteException extends RuntimeException {\n    public SaldoInsuficienteException() { super(); }\n    public SaldoInsuficienteException(String msg) { super(msg); }\n}\nthrow new SaldoInsuficienteException();", "enunciado": "¿Por qué esta excepción NO necesita declararse en la cláusula 'throws' del método que la lanza?", "opciones": ["Porque extiende RuntimeException, que es una excepción 'unchecked'", "Porque tiene múltiples constructores", "Porque no tiene mensaje en uno de sus constructores", "No es cierto: sí debe declararse siempre"], "correcta": 0, "explicacion": "Las excepciones que extienden RuntimeException (directa o indirectamente) son 'unchecked', por lo que el compilador no exige declararlas en 'throws' ni capturarlas obligatoriamente."}, {"codigo": "class Recurso implements AutoCloseable {\n    public void close() { throw new RuntimeException(\"error al cerrar\"); }\n}\ntry (Recurso r = new Recurso()) {\n    throw new RuntimeException(\"error en el cuerpo\");\n}", "enunciado": "Si tanto el cuerpo del try como close() lanzan excepciones, ¿cuál se propaga como excepción principal?", "opciones": ["La del cuerpo del try; la de close() queda registrada como excepción suprimida (suppressed)", "La de close(), ignorando la del cuerpo", "Ambas se lanzan simultáneamente como excepciones separadas", "Ninguna; se ignoran silenciosamente"], "correcta": 0, "explicacion": "En try-with-resources, si el cuerpo lanza una excepción y luego close() lanza otra, la excepción del cuerpo es la que se propaga como principal, y la de close() se añade como 'suprimida' (accesible con getSuppressed())."}, {"codigo": "try {\n    throw new RuntimeException(\"original\");\n} finally {\n    throw new IllegalStateException(\"del finally\");\n}", "enunciado": "¿Qué excepción se propaga finalmente al llamador?", "opciones": ["RuntimeException(\"original\")", "IllegalStateException(\"del finally\"); la original se pierde", "Ambas encadenadas automáticamente", "No compila"], "correcta": 1, "explicacion": "Si el bloque finally lanza una excepción, esta REEMPLAZA a cualquier excepción pendiente del try, incluso perdiendo la información de la original (una práctica generalmente desaconsejada)."}, {"codigo": "Runnable r = () -> {\n    throw new IOException(\"fallo\");\n};", "enunciado": "¿Compila este código?", "opciones": ["Sí, sin problema", "No, porque Runnable.run() no declara 'throws IOException' y esta es checked", "No, porque las lambdas no pueden lanzar excepciones", "Sí, pero solo si se usa Callable en lugar de Runnable"], "correcta": 1, "explicacion": "El cuerpo de una lambda debe respetar la cláusula throws del método abstracto de la interfaz funcional que implementa. Runnable.run() no declara excepciones checked, por lo que lanzar IOException dentro no compila."}, {"codigo": "MiRecurso recurso = new MiRecurso();\ntry (recurso) {\n    recurso.usar();\n}", "enunciado": "¿Es válido este try-with-resources usando una variable ya existente (Java 9+)?", "opciones": ["Sí, siempre que 'recurso' sea final o efectivamente final", "No, el recurso debe declararse dentro del paréntesis del try", "No compila en ninguna versión de Java", "Solo es válido si recurso es null"], "correcta": 0, "explicacion": "Desde Java 9, try-with-resources admite usar variables ya existentes (no solo declaraciones nuevas), siempre que sean final o efectivamente final."}, {"codigo": "Integer[] arr = {1, 2, 3};\nList<Integer> lista = Arrays.asList(arr);\nlista.add(4);", "enunciado": "¿Qué ocurre al ejecutar lista.add(4)?", "opciones": ["Se agrega correctamente", "Se lanza UnsupportedOperationException porque Arrays.asList() devuelve una lista de tamaño fijo", "Se lanza ArrayIndexOutOfBoundsException", "No compila"], "correcta": 1, "explicacion": "Arrays.asList() devuelve una lista de tamaño fijo respaldada por el array original; admite modificar elementos existentes con set(), pero no agregar ni eliminar."}, {"codigo": "public void procesar(String dato) {\n    Objects.requireNonNull(dato, \"dato no puede ser null\");\n    System.out.println(dato.length());\n}\nprocesar(null);", "enunciado": "¿Qué ocurre al invocar procesar(null)?", "opciones": ["Se imprime 0", "Se lanza NullPointerException con el mensaje 'dato no puede ser null'", "No compila", "Se imprime 'null'"], "correcta": 1, "explicacion": "Objects.requireNonNull() lanza explícitamente una NullPointerException con el mensaje indicado si el argumento es null, útil para validar parámetros de forma temprana y clara."}, {"codigo": "try {\n    throw new Error(\"error grave\");\n} catch (Throwable t) {\n    System.out.println(\"capturado: \" + t.getMessage());\n}", "enunciado": "¿Es válido capturar un Error usando 'catch (Throwable t)'?", "opciones": ["Sí, Throwable es superclase tanto de Exception como de Error", "No, los Error nunca pueden capturarse", "No compila", "Solo se puede capturar con catch (Error e)"], "correcta": 0, "explicacion": "Throwable es la superclase de toda la jerarquía, incluyendo Error y Exception. Aunque no es recomendable en la práctica, técnicamente sí se puede capturar un Error con catch(Throwable t)."}, {"codigo": "try {\n    riesgoso();\n} catch (IOException | SQLException e) {\n    e = new IOException(); // ¿Es válido?\n}", "enunciado": "¿Por qué esta línea dentro del catch NO compila?", "opciones": ["Porque en un multi-catch, la variable de excepción es implícitamente final y no puede reasignarse", "Porque IOException no puede asignarse a una variable", "Porque falta declarar 'throws' en el método", "Sí compila sin problema"], "correcta": 0, "explicacion": "En un bloque multi-catch (Tipo1 | Tipo2 e), la variable 'e' es implícitamente final; intentar reasignarle un nuevo valor produce un error de compilación."}]}, {"id": "colecciones", "nombre": "5. Arrays y Collections Framework", "preguntas": [{"codigo": "int[] arr = {5, 3, 8, 1};\nArrays.sort(arr);\nSystem.out.println(Arrays.toString(arr));", "enunciado": "¿Qué imprime este código?", "opciones": ["[5, 3, 8, 1]", "[1, 3, 5, 8]", "[8, 5, 3, 1]", "No compila"], "correcta": 1, "explicacion": "Arrays.sort() ordena el array de forma ascendente 'in place' (modifica el array original). Arrays.toString() genera una representación legible."}, {"codigo": "List<String> lista = new ArrayList<>(List.of(\"a\", \"b\", \"c\"));\nIterator<String> it = lista.iterator();\nwhile (it.hasNext()) {\n    String s = it.next();\n    if (s.equals(\"b\")) lista.remove(s);\n}", "enunciado": "¿Qué ocurre al ejecutar este código?", "opciones": ["Se elimina 'b' correctamente sin problema", "Se lanza ConcurrentModificationException", "Se lanza NoSuchElementException", "No compila"], "correcta": 1, "explicacion": "Modificar una colección directamente (con lista.remove) mientras se itera con un Iterator externo (sin usar it.remove()) provoca ConcurrentModificationException en la siguiente llamada a next() o hasNext()."}, {"codigo": "Map<String, Integer> mapa = new HashMap<>();\nmapa.put(\"a\", 1);\nmapa.merge(\"a\", 10, Integer::sum);\nSystem.out.println(mapa.get(\"a\"));", "enunciado": "¿Qué imprime este código?", "opciones": ["1", "10", "11", "No compila"], "correcta": 2, "explicacion": "merge() aplica la función indicada (aquí, suma) al valor existente y al nuevo valor cuando la clave ya existe: 1 + 10 = 11."}, {"codigo": null, "enunciado": "¿Cuál de las siguientes implementaciones de List mantiene el orden de inserción y permite acceso rápido por índice (O(1))?", "opciones": ["LinkedList", "ArrayList", "TreeSet", "HashSet"], "correcta": 1, "explicacion": "ArrayList se basa en un array interno redimensionable, lo que permite acceso por índice en tiempo constante O(1), además de mantener el orden de inserción."}, {"codigo": "Set<String> set = new TreeSet<>();\nset.add(\"banana\");\nset.add(\"apple\");\nset.add(\"cherry\");\nSystem.out.println(set);", "enunciado": "¿Qué imprime este código?", "opciones": ["[banana, apple, cherry]", "[apple, banana, cherry]", "[cherry, banana, apple]", "Orden no determinístico"], "correcta": 1, "explicacion": "TreeSet mantiene sus elementos ordenados según su orden natural (alfabético para String), independientemente del orden de inserción."}, {"codigo": "var deque = new ArrayDeque<Integer>();\ndeque.addFirst(1);\ndeque.addLast(2);\ndeque.addFirst(3);\nSystem.out.println(deque);", "enunciado": "¿Qué imprime este código?", "opciones": ["[3, 1, 2]", "[1, 2, 3]", "[2, 1, 3]", "[3, 2, 1]"], "correcta": 0, "explicacion": "ArrayDeque permite insertar en ambos extremos. addFirst(1) -> [1]; addLast(2) -> [1,2]; addFirst(3) -> [3,1,2]."}, {"codigo": "List<Integer> nums = new ArrayList<>(List.of(3, 1, 2));\nnums.sort(Comparator.reverseOrder());\nSystem.out.println(nums);", "enunciado": "¿Qué imprime este código?", "opciones": ["[1, 2, 3]", "[3, 2, 1]", "[3, 1, 2]", "No compila"], "correcta": 1, "explicacion": "Comparator.reverseOrder() ordena los elementos en orden descendente según su orden natural: [3, 2, 1]."}, {"codigo": null, "enunciado": "¿Qué método de Collections se usa para obtener una vista de solo lectura de una lista mutable?", "opciones": ["Collections.unmodifiableList(lista)", "Collections.readOnly(lista)", "lista.toImmutableList()", "Collections.freeze(lista)"], "correcta": 0, "explicacion": "Collections.unmodifiableList() envuelve la lista original en una vista que lanza UnsupportedOperationException ante intentos de modificación, aunque los cambios en la lista original subyacente siguen reflejándose."}, {"codigo": "int[][] matriz = new int[2][3];\nSystem.out.println(matriz.length + \" \" + matriz[0].length);", "enunciado": "¿Qué imprime este código?", "opciones": ["2 3", "3 2", "6 6", "No compila"], "correcta": 0, "explicacion": "matriz.length devuelve el número de filas (2) y matriz[0].length el número de columnas de la primera fila (3)."}, {"codigo": null, "enunciado": "¿Cuál es la diferencia principal entre HashMap y LinkedHashMap?", "opciones": ["LinkedHashMap no permite valores nulos", "LinkedHashMap mantiene el orden de inserción de las claves, HashMap no garantiza ningún orden", "HashMap es más rápido en todos los casos", "LinkedHashMap no permite claves duplicadas y HashMap sí"], "correcta": 1, "explicacion": "LinkedHashMap añade una lista doblemente enlazada interna que preserva el orden de inserción (o de acceso, si se configura), mientras que HashMap no garantiza ningún orden específico de iteración."}, {"codigo": "var lista = new ArrayList<Integer>(List.of(1, 2, 3, 4, 5));\nlista.removeIf(n -> n % 2 == 0);\nSystem.out.println(lista);", "enunciado": "¿Qué imprime este código?", "opciones": ["[1, 3, 5]", "[2, 4]", "[1, 2, 3, 4, 5]", "No compila"], "correcta": 0, "explicacion": "removeIf() elimina de la colección todos los elementos que cumplen el predicado dado; aquí elimina los números pares, dejando [1, 3, 5]."}, {"codigo": "Queue<Integer> pq = new PriorityQueue<>();\npq.add(5); pq.add(1); pq.add(3);\nSystem.out.println(pq.poll());", "enunciado": "¿Qué imprime este código?", "opciones": ["5", "1", "3", "No compila"], "correcta": 1, "explicacion": "PriorityQueue es por defecto un min-heap: poll() siempre extrae y devuelve el elemento MENOR según el orden natural, en este caso 1."}, {"codigo": "List<Integer> nums = List.of(4, 1, 9, 2);\nSystem.out.println(Collections.max(nums) + \" \" + Collections.min(nums));", "enunciado": "¿Qué imprime este código?", "opciones": ["9 1", "1 9", "4 2", "No compila"], "correcta": 0, "explicacion": "Collections.max() y Collections.min() recorren la colección y devuelven el mayor y menor elemento según su orden natural, respectivamente: 9 y 1."}, {"codigo": "List<Integer> original = new ArrayList<>(List.of(1, 2, 3));\nList<Integer> copia = List.copyOf(original);\ncopia.add(4);", "enunciado": "¿Qué ocurre al ejecutar copia.add(4)?", "opciones": ["Se agrega sin problema", "Se lanza UnsupportedOperationException, porque List.copyOf() es inmutable", "Se modifica también 'original'", "No compila"], "correcta": 1, "explicacion": "List.copyOf() crea una copia INMUTABLE e independiente de la colección original; cualquier intento de modificarla lanza UnsupportedOperationException."}, {"codigo": "List<String> nombres = new ArrayList<>(List.of(\"Ana\", \"Bo\", \"Al\"));\nnombres.sort(Comparator.comparing(String::length).thenComparing(Comparator.naturalOrder()));\nSystem.out.println(nombres);", "enunciado": "¿Qué imprime este código?", "opciones": ["[Bo, Al, Ana]", "[Al, Bo, Ana]", "[Ana, Al, Bo]", "No compila"], "correcta": 1, "explicacion": "Se ordena primero por longitud ('Bo' y 'Al' tienen 2 letras, 'Ana' tiene 3). Para desempatar entre 'Bo' y 'Al' (misma longitud), thenComparing usa el orden natural alfabético: 'Al' antes que 'Bo'. Resultado: [Al, Bo, Ana]."}, {"codigo": "TreeSet<Integer> set = new TreeSet<>(Set.of(1, 3, 5, 7));\nSystem.out.println(set.floor(4) + \" \" + set.ceiling(4));", "enunciado": "¿Qué imprime este código?", "opciones": ["3 5", "5 3", "4 4", "No compila"], "correcta": 0, "explicacion": "floor(4) devuelve el mayor elemento menor o igual a 4 (que es 3). ceiling(4) devuelve el menor elemento mayor o igual a 4 (que es 5)."}, {"codigo": "Map<String, Integer> m = Map.of(\"a\", 1, \"b\", 2, \"c\", 3);\nint suma = m.values().stream().mapToInt(Integer::intValue).sum();\nSystem.out.println(suma);", "enunciado": "¿Qué imprime este código?", "opciones": ["6", "3", "0", "No compila"], "correcta": 0, "explicacion": "values() devuelve una colección con los valores del mapa (1, 2, 3). Al convertirlos a IntStream y sumarlos, el resultado es 6."}, {"codigo": "List<String> lista = new ArrayList<>(List.of(\"banana\", \"kiwi\", \"fresa\"));\nCollections.sort(lista, Comparator.comparing(String::length));\nSystem.out.println(lista);", "enunciado": "¿Qué imprime este código?", "opciones": ["[kiwi, fresa, banana]", "[banana, fresa, kiwi]", "[fresa, kiwi, banana]", "No compila"], "correcta": 0, "explicacion": "Ordenando por longitud ascendente: 'kiwi' (4), 'fresa' (5), 'banana' (6). Resultado: [kiwi, fresa, banana]."}, {"codigo": "class Punto {\n    int x, y;\n    Punto(int x, int y) { this.x = x; this.y = y; }\n}\nSet<Punto> set = new HashSet<>();\nset.add(new Punto(1, 1));\nset.add(new Punto(1, 1));\nSystem.out.println(set.size());", "enunciado": "¿Qué imprime este código?", "opciones": ["1", "2", "0", "No compila"], "correcta": 1, "explicacion": "Sin sobrescribir equals()/hashCode(), cada objeto Punto se considera distinto (comparación por referencia), por lo que ambas instancias se agregan al Set, resultando en tamaño 2."}, {"codigo": "List<Integer> lista = new ArrayList<>(List.of(1, 2, 3, 4, 5));\nList<Integer> sub = lista.subList(1, 3);\nsub.set(0, 99);\nSystem.out.println(lista);", "enunciado": "¿Qué imprime este código?", "opciones": ["[1, 2, 3, 4, 5]", "[1, 99, 3, 4, 5]", "[99, 2, 3, 4, 5]", "No compila"], "correcta": 1, "explicacion": "subList() devuelve una VISTA respaldada por la lista original, no una copia independiente. Modificar la sublista afecta directamente a la lista original."}, {"codigo": "Integer[] arr = {1, 2, 3};\nList<Integer> lista = Arrays.asList(arr);\narr[0] = 99;\nSystem.out.println(lista.get(0));", "enunciado": "¿Qué imprime este código?", "opciones": ["1", "99", "No compila", "Error en tiempo de ejecución"], "correcta": 1, "explicacion": "Arrays.asList() devuelve una lista respaldada directamente por el array original; modificar el array se refleja inmediatamente en la lista, y viceversa."}, {"codigo": "Stack<Integer> pila = new Stack<>();\npila.push(1); pila.push(2); pila.push(3);\nSystem.out.println(pila.pop() + \" \" + pila.peek());", "enunciado": "¿Qué imprime este código?", "opciones": ["3 2", "3 3", "1 2", "2 1"], "correcta": 0, "explicacion": "pop() elimina y devuelve el elemento en el tope de la pila (3). Tras eliminarlo, peek() consulta el nuevo tope (2) sin eliminarlo."}, {"codigo": null, "enunciado": "¿Qué característica distingue a Vector de ArrayList?", "opciones": ["Vector está sincronizado internamente (thread-safe), con menor rendimiento en entornos de un solo hilo", "ArrayList está sincronizado y Vector no", "No hay ninguna diferencia real entre ambos", "Vector no permite elementos duplicados"], "correcta": 0, "explicacion": "Vector es una clase legada que sincroniza internamente sus métodos, garantizando seguridad en entornos multihilo pero con un costo de rendimiento innecesario cuando no se necesita esa sincronización."}, {"codigo": "enum Dia { LUN, MAR, MIE, JUE, VIE }\nEnumSet<Dia> laborables = EnumSet.range(Dia.LUN, Dia.VIE);\nSystem.out.println(laborables.size());", "enunciado": "¿Qué imprime este código?", "opciones": ["5", "4", "0", "No compila"], "correcta": 0, "explicacion": "EnumSet.range() crea un conjunto con todos los valores del enum entre los dos indicados (inclusive). De LUN a VIE hay 5 valores."}, {"codigo": "List<String> vacia = Collections.emptyList();\nvacia.add(\"x\");", "enunciado": "¿Qué ocurre al ejecutar vacia.add(\"x\")?", "opciones": ["Se agrega el elemento", "Se lanza UnsupportedOperationException", "Se lanza NullPointerException", "No compila"], "correcta": 1, "explicacion": "Collections.emptyList() devuelve una lista inmutable de tamaño fijo (cero); cualquier intento de modificarla lanza UnsupportedOperationException."}, {"codigo": "List<String> lista = List.of(\"a\", \"b\", \"c\", \"b\");\nSystem.out.println(lista.indexOf(\"b\"));", "enunciado": "¿Qué imprime este código?", "opciones": ["1", "3", "-1", "No compila"], "correcta": 0, "explicacion": "indexOf() devuelve el índice de la PRIMERA ocurrencia del elemento buscado. 'b' aparece por primera vez en el índice 1."}, {"codigo": "List<Integer> lista = new ArrayList<>(List.of(5, 1, 3));\nint pos = Collections.binarySearch(lista, 3);", "enunciado": "¿Por qué el resultado de esta búsqueda binaria puede ser incorrecto o impredecible?", "opciones": ["Porque la lista no está ordenada previamente, y binarySearch requiere una lista ordenada para funcionar correctamente", "Porque 3 no existe en la lista", "Porque binarySearch no funciona con Integer", "No compila"], "correcta": 0, "explicacion": "Collections.binarySearch() asume que la lista ya está ordenada según el orden natural (o el Comparator dado). Si no lo está, el resultado no está garantizado y puede ser incorrecto."}]}, {"id": "streams", "nombre": "6. Java Stream API y expresiones lambda", "preguntas": [{"codigo": "List<Integer> nums = List.of(1, 2, 3, 4, 5);\nlong total = nums.stream()\n    .filter(n -> n % 2 == 0)\n    .count();\nSystem.out.println(total);", "enunciado": "¿
