Qué imprime este código?", "opciones": ["2", "3", "5", "No compila"], "correcta": 0, "explicacion": "El filtro selecciona los números pares (2 y 4), y count() devuelve la cantidad de elementos restantes en el stream: 2."}, {"codigo": "Stream<Integer> s = Stream.of(1, 2, 3);\ns.forEach(System.out::println);\ns.forEach(System.out::println);", "enunciado": "¿Qué ocurre al ejecutar este código?", "opciones": ["Imprime los números dos veces", "Lanza IllegalStateException porque un stream ya consumido no puede reutilizarse", "No compila", "Imprime los números solo una vez y no hace nada la segunda vez"], "correcta": 1, "explicacion": "Un Stream solo puede consumirse (recorrerse por completo) UNA vez; intentar operar de nuevo sobre él tras una operación terminal lanza IllegalStateException."}, {"codigo": "List<String> nombres = List.of(\"Ana\", \"Bruno\", \"Carla\");\nString resultado = nombres.stream()\n    .reduce(\"\", (a, b) -> a + b.charAt(0));\nSystem.out.println(resultado);", "enunciado": "¿Qué imprime este código?", "opciones": ["ABC", "AnaBrunoCarla", "abc", "No compila"], "correcta": 0, "explicacion": "reduce() acumula un resultado combinando el acumulador con la primera letra de cada nombre: '' + 'A' -> 'A' + 'B' -> 'AB' + 'C' -> 'ABC'."}, {"codigo": null, "enunciado": "¿Cuál es la firma funcional de la interfaz Function<T, R>?", "opciones": ["R apply(T t)", "void accept(T t)", "boolean test(T t)", "T get()"], "correcta": 0, "explicacion": "Function<T, R> define el método abstracto R apply(T t), que transforma un valor de tipo T en uno de tipo R. accept() pertenece a Consumer, test() a Predicate, y get() a Supplier."}, {"codigo": "List<Integer> nums = List.of(3, 1, 4, 1, 5);\nOptional<Integer> max = nums.stream().max(Integer::compareTo);\nSystem.out.println(max.get());", "enunciado": "¿Qué imprime este código?", "opciones": ["5", "1", "4", "Optional.empty"], "correcta": 0, "explicacion": "max() con el comparador natural de enteros devuelve un Optional con el valor máximo del stream, que es 5."}, {"codigo": "var resultado = Stream.iterate(1, n -> n * 2)\n    .limit(4)\n    .collect(Collectors.toList());\nSystem.out.println(resultado);", "enunciado": "¿Qué imprime este código?", "opciones": ["[1, 2, 4, 8]", "[2, 4, 6, 8]", "[1, 2, 3, 4]", "No compila"], "correcta": 0, "explicacion": "Stream.iterate genera un stream infinito aplicando repetidamente la función (duplicar), y limit(4) toma los primeros 4 elementos: 1, 2, 4, 8."}, {"codigo": "Map<Boolean, List<Integer>> particion = Stream.of(1, 2, 3, 4, 5)\n    .collect(Collectors.partitioningBy(n -> n % 2 == 0));\nSystem.out.println(particion.get(true));", "enunciado": "¿Qué imprime este código?", "opciones": ["[2, 4]", "[1, 3, 5]", "[1, 2, 3, 4, 5]", "No compila"], "correcta": 0, "explicacion": "partitioningBy() divide el stream en dos listas según el predicado: la clave 'true' contiene los que cumplen la condición (pares): [2, 4]."}, {"codigo": null, "enunciado": "¿Qué diferencia existe entre map() y flatMap() en Stream?", "opciones": ["map() transforma cada elemento en otro elemento; flatMap() transforma cada elemento en un stream y luego los 'aplana' en uno solo", "flatMap() siempre es más rápido que map()", "map() solo funciona con tipos numéricos", "No hay ninguna diferencia real"], "correcta": 0, "explicacion": "map() aplica una función de transformación 1 a 1. flatMap() se usa cuando cada elemento produce un stream (por ejemplo, una lista de listas), y combina todos esos streams en uno solo aplanado."}, {"codigo": "IntStream.rangeClosed(1, 5)\n    .forEach(System.out::print);", "enunciado": "¿Qué imprime este código?", "opciones": ["12345", "1234", "0 1 2 3 4", "12345 (con espacios)"], "correcta": 0, "explicacion": "rangeClosed(1, 5) genera un IntStream con los valores 1, 2, 3, 4, 5 (incluyendo el límite superior), a diferencia de range() que lo excluye."}, {"codigo": "BinaryOperator<Integer> suma = (a, b) -> a + b;\nSystem.out.println(suma.apply(3, 4));", "enunciado": "¿Qué imprime este código?", "opciones": ["7", "34", "No compila", "12"], "correcta": 0, "explicacion": "BinaryOperator<T> es una especialización de BiFunction<T,T,T> con el método apply(T,T) que devuelve T; aquí simplemente suma los dos argumentos: 3+4=7."}, {"codigo": "List<String> palabras = List.of(\"uno\", \"dos\", \"tres\");\nString unido = palabras.stream()\n    .collect(Collectors.joining(\", \", \"[\", \"]\"));\nSystem.out.println(unido);", "enunciado": "¿Qué imprime este código?", "opciones": ["[uno, dos, tres]", "uno, dos, tres", "[uno][dos][tres]", "No compila"], "correcta": 0, "explicacion": "Collectors.joining(delimitador, prefijo, sufijo) concatena los elementos con el delimitador dado, y añade el prefijo y sufijo indicados al resultado final."}, {"codigo": null, "enunciado": "¿Cuál de las siguientes operaciones de Stream es una operación INTERMEDIA (perezosa, lazy)?", "opciones": ["forEach()", "collect()", "sorted()", "count()"], "correcta": 2, "explicacion": "sorted() es una operación intermedia que devuelve otro Stream y se ejecuta de forma perezosa. forEach, collect y count son operaciones terminales que sí disparan la ejecución del pipeline."}, {"codigo": "List<Integer> nums = List.of(1, 2, 3);\nlong total = nums.stream()\n    .peek(n -> System.out.print(\"v\" + n))\n    .filter(n -> n > 1)\n    .count();", "enunciado": "¿Qué es cierto sobre peek() en este código?", "opciones": ["Es una operación intermedia usada típicamente para depuración, que no modifica el stream", "Es una operación terminal que reemplaza a forEach", "Falla en tiempo de compilación", "Siempre debe ir después de un filter"], "correcta": 0, "explicacion": "peek() es una operación intermedia que permite observar los elementos que pasan por el stream (usualmente para depuración) sin transformarlos ni consumirlos."}, {"codigo": "List<String> nombres = List.of(\"Ana\", \"Bruno\", \"Carla\");\nMap<String, Integer> mapa = nombres.stream()\n    .collect(Collectors.toMap(n -> n, String::length));\nSystem.out.println(mapa.get(\"Bruno\"));", "enunciado": "¿Qué imprime este código?", "opciones": ["5", "6", "0", "No compila"], "correcta": 0, "explicacion": "Collectors.toMap() construye un Map usando la primera función lambda para la clave y la segunda para el valor. 'Bruno' tiene 5 caracteres."}, {"codigo": "Stream.generate(() -> \"x\").limit(3).forEach(System.out::print);", "enunciado": "¿Qué imprime este código?", "opciones": ["xxx", "x", "Bucle infinito", "No compila"], "correcta": 0, "explicacion": "Stream.generate() crea un stream infinito a partir de un Supplier. limit(3) trunca el stream a los primeros 3 elementos antes de que se ejecute forEach, evitando el bucle infinito."}, {"codigo": "List<Integer> nums = List.of(2, 4, 6, 8);\nSystem.out.println(nums.stream().allMatch(n -> n % 2 == 0));\nSystem.out.println(nums.stream().anyMatch(n -> n > 6));", "enunciado": "¿Qué imprime este código?", "opciones": ["true true", "false false", "true false", "false true"], "correcta": 0, "explicacion": "allMatch() verifica que TODOS los elementos cumplan la condición (todos son pares: true). anyMatch() verifica si AL MENOS UNO cumple la condición (8 > 6: true)."}, {"codigo": "int[] arr = {1, 2, 3};\nStream<int[]> s1 = Stream.of(arr);\nIntStream s2 = Arrays.stream(arr);\nSystem.out.println(s1.count() + \" \" + s2.count());", "enunciado": "¿Qué imprime este código?", "opciones": ["1 3", "3 3", "3 1", "No compila"], "correcta": 0, "explicacion": "Stream.of(arr) con un array de tipo primitivo trata el array COMPLETO como un único elemento (produciendo un stream de tamaño 1). Arrays.stream(arr) sí descompone el array en sus 3 elementos individuales."}, {"codigo": "List<String> palabras = List.of(\"uno\", \"dos\", \"tres\", \"cuatro\", \"cinco\");\nMap<Integer, Long> porLongitud = palabras.stream()\n    .collect(Collectors.groupingBy(String::length, Collectors.counting()));\nSystem.out.println(porLongitud.get(4));", "enunciado": "¿Qué imprime este código?", "opciones": ["2", "1", "3", "No compila"], "correcta": 1, "explicacion": "Agrupando por longitud: 'uno'(3), 'dos'(3), 'tres'(4), 'cuatro'(6), 'cinco'(5). Solo 'tres' tiene longitud 4, así que porLongitud.get(4) es 1."}, {"codigo": null, "enunciado": "¿Qué ventaja tiene orElseGet() sobre orElse() cuando el Optional ya contiene un valor?", "opciones": ["orElseGet() no ejecuta el Supplier si el valor ya está presente, evitando cálculos innecesarios; orElse() siempre evalúa su argumento", "No hay diferencia alguna entre ambos", "orElse() es siempre más rápido", "orElseGet() lanza una excepción si el Optional tiene valor"], "correcta": 0, "explicacion": "orElse(valor) siempre evalúa su argumento (aunque no se use), mientras que orElseGet(supplier) solo invoca el Supplier si el Optional está vacío, siendo más eficiente para cálculos costosos."}, {"codigo": "List<String> lista = new ArrayList<>(List.of(\"banana\", \"kiwi\", \"uva\"));\nlista.stream()\n    .sorted(Comparator.comparing(String::length).reversed())\n    .forEach(System.out::print);", "enunciado": "¿Qué imprime este código?", "opciones": ["bananakiwiuva", "uvakiwibanana", "kiwiuvabanana", "No compila"], "correcta": 0, "explicacion": "Ordenando por longitud de forma descendente: 'banana'(6), 'kiwi'(4), 'uva'(3). El resultado impreso es 'bananakiwiuva'."}, {"codigo": "String resultado = IntStream.range(1, 4)\n    .mapToObj(i -> \"n\" + i)\n    .collect(Collectors.joining(\",\"));\nSystem.out.println(resultado);", "enunciado": "¿Qué imprime este código?", "opciones": ["n1,n2,n3", "n0,n1,n2", "1,2,3", "No compila"], "correcta": 0, "explicacion": "IntStream.range(1,4) genera los valores 1, 2, 3 (excluyendo el límite superior). mapToObj() los transforma en Strings 'n1','n2','n3', unidos con coma."}, {"codigo": "List<Integer> nums = List.of(2, 4, 6);\nDouble promedio = nums.stream().collect(Collectors.averagingInt(n -> n));\nSystem.out.println(promedio);", "enunciado": "¿Qué imprime este código?", "opciones": ["4.0", "3", "12", "No compila"], "correcta": 0, "explicacion": "Collectors.averagingInt() calcula el promedio de los valores como Double. (2+4+6)/3 = 4.0."}, {"codigo": "Stream<Integer> s1 = Stream.of(1, 2);\nStream<Integer> s2 = Stream.of(3, 4);\nStream.concat(s1, s2).forEach(System.out::print);", "enunciado": "¿Qué imprime este código?", "opciones": ["1234", "3412", "12 34", "No compila"], "correcta": 0, "explicacion": "Stream.concat() combina dos streams en uno solo, respetando el orden: primero los elementos de s1, luego los de s2."}, {"codigo": "record Punto(int x, int y) {}\nList<Punto> puntos = List.of(new Punto(1, 1), new Punto(1, 1), new Punto(2, 2));\nlong total = puntos.stream().distinct().count();\nSystem.out.println(total);", "enunciado": "¿Qué imprime este código?", "opciones": ["2", "3", "1", "No compila"], "correcta": 0, "explicacion": "distinct() usa equals()/hashCode(). Los records generan estos métodos automáticamente basados en sus componentes, por lo que los dos Punto(1,1) se consideran iguales y se cuentan una sola vez: quedan 2 elementos distintos."}, {"codigo": "Function<Integer, Integer> sumarUno = x -> x + 1;\nFunction<Integer, Integer> multiplicarDos = x -> x * 2;\nSystem.out.println(sumarUno.andThen(multiplicarDos).apply(3));", "enunciado": "¿Qué imprime este código?", "opciones": ["8", "7", "6", "No compila"], "correcta": 0, "explicacion": "andThen() aplica primero la función original y luego la siguiente: (3+1)=4, luego 4*2=8."}, {"codigo": "Predicate<Integer> esPar = n -> n % 2 == 0;\nPredicate<Integer> esImpar = esPar.negate();\nSystem.out.println(esImpar.test(3));", "enunciado": "¿Qué imprime este código?", "opciones": ["true", "false", "No compila", "Error en tiempo de ejecución"], "correcta": 0, "explicacion": "negate() invierte el resultado del predicado original. Como 3 no es par (esPar.test(3) es false), esImpar.test(3) da true."}, {"codigo": "Optional<Integer> primero = Stream.of(1, 2, 3, 4, 5)\n    .filter(n -> n > 2)\n    .findFirst();\nSystem.out.println(primero.get());", "enunciado": "¿Qué imprime este código?", "opciones": ["3", "1", "5", "Optional.empty"], "correcta": 0, "explicacion": "filter() selecciona los elementos mayores a 2, y findFirst() es una operación de cortocircuito que devuelve el primero que cumple la condición sin procesar el resto: 3."}]}, {"id": "concurrencia", "nombre": "7. Concurrencia", "preguntas": [{"codigo": "Runnable tarea = () -> System.out.println(\"Ejecutando\");\nThread t = new Thread(tarea);\nt.start();\nt.start();", "enunciado": "¿Qué ocurre al ejecutar este código?", "opciones": ["Se imprime 'Ejecutando' dos veces", "Se lanza IllegalThreadStateException en la segunda llamada a start()", "No compila", "El hilo se pausa indefinidamente"], "correcta": 1, "explicacion": "Un hilo (Thread) solo puede iniciarse una vez con start(); llamarlo una segunda vez sobre el mismo objeto Thread lanza IllegalThreadStateException."}, {"codigo": "ExecutorService executor = Executors.newFixedThreadPool(2);\nexecutor.submit(() -> System.out.println(\"Tarea 1\"));\nexecutor.submit(() -> System.out.println(\"Tarea 2\"));\nexecutor.shutdown();", "enunciado": "¿Qué hace el método shutdown() en este contexto?", "opciones": ["Detiene inmediatamente todas las tareas en ejecución", "Permite que las tareas ya enviadas terminen, pero rechaza nuevas tareas", "Reinicia el pool de hilos", "Bloquea el hilo principal hasta que termine todo"], "correcta": 1, "explicacion": "shutdown() inicia un apagado ordenado: las tareas ya enviadas se completan, pero no se aceptan tareas nuevas. Para forzar la detención inmediata se usaría shutdownNow()."}, {"codigo": "private int contador = 0;\n\npublic synchronized void incrementar() {\n    contador++;\n}", "enunciado": "¿Qué garantiza la palabra clave 'synchronized' en este método?", "opciones": ["Que el método se ejecute más rápido", "Que solo un hilo a la vez pueda ejecutar este método sobre la misma instancia, evitando condiciones de carrera", "Que el método se ejecute en un hilo separado automáticamente", "Que el contador nunca pueda ser negativo"], "correcta": 1, "explicacion": "'synchronized' en un método de instancia usa el monitor del objeto ('this') para asegurar exclusión mutua: solo un hilo puede ejecutar ese método (o cualquier otro sincronizado sobre el mismo objeto) a la vez."}, {"codigo": null, "enunciado": "¿Cuál es la diferencia principal entre Callable<V> y Runnable?", "opciones": ["Callable puede devolver un valor y lanzar excepciones checked; Runnable no devuelve valor", "Runnable es más moderno que Callable", "Callable no puede ejecutarse en un ExecutorService", "No hay ninguna diferencia funcional"], "correcta": 0, "explicacion": "Callable<V> define V call() throws Exception, permitiendo devolver un resultado y lanzar excepciones checked. Runnable define void run() sin retorno y sin declarar excepciones checked."}, {"codigo": "AtomicInteger contador = new AtomicInteger(0);\ncontador.incrementAndGet();\ncontador.incrementAndGet();\nSystem.out.println(contador.get());", "enunciado": "¿Qué imprime este código?", "opciones": ["0", "1", "2", "No compila"], "correcta": 2, "explicacion": "AtomicInteger provee operaciones atómicas thread-safe sin necesidad de bloqueos explícitos. incrementAndGet() incrementa y devuelve el nuevo valor; tras dos llamadas, el contador vale 2."}, {"codigo": "ExecutorService ex = Executors.newSingleThreadExecutor();\nFuture<Integer> resultado = ex.submit(() -> 5 + 5);\nSystem.out.println(resultado.get());\nex.shutdown();", "enunciado": "¿Qué imprime este código?", "opciones": ["10", "0", "Lanza una excepción checked no manejada obligatoriamente en tiempo de compilación", "No compila"], "correcta": 0, "explicacion": "future.get() bloquea hasta obtener el resultado de la tarea Callable enviada. El cálculo 5+5 da 10. (Nota: get() lanza ExecutionException/InterruptedException checked que deberían manejarse o declararse, pero el resultado lógico es 10)."}, {"codigo": null, "enunciado": "¿Qué problema de concurrencia describe mejor un 'deadlock'?", "opciones": ["Dos o más hilos quedan bloqueados esperando indefinidamente recursos que el otro posee", "Un hilo consume el 100% de CPU sin terminar nunca", "Dos hilos leen la misma variable al mismo tiempo", "Un hilo termina antes de lo esperado"], "correcta": 0, "explicacion": "Un deadlock ocurre cuando dos o más hilos se bloquean mutuamente esperando recursos (locks) que están retenidos por el otro, y ninguno puede avanzar."}, {"codigo": "CopyOnWriteArrayList<String> lista = new CopyOnWriteArrayList<>();\nlista.add(\"a\");\nfor (String s : lista) {\n    lista.add(\"b\");\n}\nSystem.out.println(lista.size());", "enunciado": "¿Qué ocurre al ejecutar este código?", "opciones": ["Lanza ConcurrentModificationException", "Se ejecuta sin error, imprimiendo 2 (el bucle solo itera sobre el snapshot original)", "Bucle infinito", "No compila"], "correcta": 1, "explicacion": "CopyOnWriteArrayList crea una copia interna del array en cada modificación; el iterador opera sobre una instantánea (snapshot) tomada al crear el iterador, por lo que no lanza excepción aunque se modifique la lista durante la iteración."}, {"codigo": null, "enunciado": "¿Cuál es el propósito principal de un objeto CountDownLatch?", "opciones": ["Hacer que uno o más hilos esperen hasta que un conjunto de operaciones realizadas en otros hilos se complete", "Contar cuántos hilos han terminado con excepción", "Reemplazar por completo a ExecutorService", "Ordenar alfabéticamente los hilos en ejecución"], "correcta": 0, "explicacion": "CountDownLatch permite que uno o más hilos bloqueen su ejecución con await() hasta que un contador (inicializado en un número) llegue a cero mediante llamadas a countDown() desde otros hilos."}, {"codigo": null, "enunciado": "¿Qué método de la clase Thread NO se recomienda usar porque puede dejar objetos en un estado inconsistente?", "opciones": ["Thread.sleep()", "Thread.stop()", "Thread.join()", "Thread.interrupt()"], "correcta": 1, "explicacion": "Thread.stop() está deprecado porque termina el hilo de forma abrupta, pudiendo dejar recursos o estructuras de datos compartidas en un estado inconsistente. Se recomienda usar mecanismos de interrupción cooperativa (interrupt())."}, {"codigo": null, "enunciado": "¿Qué garantiza la palabra clave 'volatile' aplicada a un campo?", "opciones": ["Que los cambios hechos por un hilo sean visibles inmediatamente para otros hilos, evitando cachés locales desactualizadas", "Que el campo sea thread-safe para operaciones compuestas como incrementos", "Que el campo no pueda modificarse nunca", "Que el campo se serialice automáticamente"], "correcta": 0, "explicacion": "'volatile' garantiza visibilidad entre hilos (happens-before), pero NO garantiza atomicidad en operaciones compuestas como i++, que requieren sincronización adicional."}, {"codigo": "Lock lock = new ReentrantLock();\nlock.lock();\ntry {\n    // sección crítica\n} finally {\n    lock.unlock();\n}", "enunciado": "¿Por qué se recomienda llamar a unlock() dentro de un bloque finally?", "opciones": ["Para garantizar que el lock se libere incluso si ocurre una excepción en la sección crítica", "Porque lock() lo requiere obligatoriamente por sintaxis", "Para mejorar el rendimiento", "No es necesario, Java libera locks automáticamente"], "correcta": 0, "explicacion": "Si no se libera el lock en un finally, una excepción en la sección crítica dejaría el lock retenido indefinidamente, provocando un posible deadlock para otros hilos."}, {"codigo": "synchronized(objeto) {\n    objeto.wait();\n}", "enunciado": "¿Qué se requiere para invocar wait() sobre un objeto?", "opciones": ["Estar dentro de un bloque synchronized sobre ese mismo objeto, o se lanza IllegalMonitorStateException", "Nada especial, puede llamarse en cualquier contexto", "Que el objeto implemente Runnable", "Que el hilo actual sea el hilo principal"], "correcta": 0, "explicacion": "wait() (y notify()/notifyAll()) solo pueden invocarse dentro de un bloque sincronizado sobre el monitor de ese objeto; de lo contrario se lanza IllegalMonitorStateException."}, {"codigo": null, "enunciado": "¿Qué garantiza establecer una prioridad alta con setPriority() en un Thread?", "opciones": ["Nada garantizado de forma determinista: es solo una sugerencia al planificador del sistema operativo", "Que ese hilo siempre se ejecutará antes que los demás", "Que ese hilo no podrá ser interrumpido", "Que el hilo se convierte automáticamente en daemon"], "correcta": 0, "explicacion": "La prioridad de un hilo es solo una sugerencia (hint) para el planificador; el comportamiento real depende del sistema operativo y no está garantizado por la especificación de Java."}, {"codigo": "ThreadLocal<Integer> contador = ThreadLocal.withInitial(() -> 0);\ncontador.set(contador.get() + 1);\nSystem.out.println(contador.get());", "enunciado": "¿Qué propósito cumple ThreadLocal en este código?", "opciones": ["Mantener una copia independiente de la variable para cada hilo que la use", "Sincronizar el acceso entre múltiples hilos", "Hacer que la variable sea inmutable", "Serializar el valor entre hilos"], "correcta": 0, "explicacion": "ThreadLocal provee una variable independiente para cada hilo que la accede, evitando condiciones de carrera sin necesidad de sincronización explícita."}, {"codigo": "List<Callable<Integer>> tareas = List.of(() -> 1, () -> 2, () -> 3);\nList<Future<Integer>> resultados = executor.invokeAll(tareas);", "enunciado": "¿Qué comportamiento tiene invokeAll()?", "opciones": ["Ejecuta todas las tareas y bloquea hasta que TODAS terminen, devolviendo sus Future", "Ejecuta solo la primera tarea que termine", "No bloquea el hilo llamador", "Requiere que las tareas sean Runnable, no Callable"], "correcta": 0, "explicacion": "invokeAll() envía todas las tareas Callable al executor y bloquea el hilo llamador hasta que TODAS hayan finalizado, devolviendo una lista de Future con sus resultados."}, {"codigo": null, "enunciado": "¿Cuál es una ventaja de implementar Runnable en lugar de extender Thread directamente?", "opciones": ["Permite que la clase siga pudiendo extender otra clase, ya que Java no permite herencia múltiple", "Runnable es más rápido en tiempo de ejecución", "Solo Runnable puede usarse con ExecutorService", "Thread no puede iniciar más de un hilo"], "correcta": 0, "explicacion": "Al implementar Runnable (en vez de extender Thread), la clase conserva la posibilidad de extender otra clase distinta, dado que Java no permite herencia múltiple de clases."}, {"codigo": "CompletableFuture<Integer> cf = CompletableFuture.supplyAsync(() -> 5)\n    .thenApply(x -> x * 2);\nSystem.out.println(cf.get());", "enunciado": "¿Qué imprime este código?", "opciones": ["10", "5", "No compila", "0"], "correcta": 0, "explicacion": "supplyAsync() ejecuta el Supplier de forma asíncrona (produciendo 5), y thenApply() transforma ese resultado (5*2=10) una vez disponible."}, {"codigo": "class Contador {\n    static int valor = 0;\n    static synchronized void incrementar() { valor++; }\n}", "enunciado": "¿Sobre qué objeto se aplica el lock cuando 'synchronized' se usa en un método estático?", "opciones": ["Sobre el objeto Class asociado a la clase Contador, no sobre una instancia particular", "Sobre la primera instancia creada de Contador", "No se aplica ningún lock real", "Sobre el hilo actual"], "correcta": 0, "explicacion": "Un método estático synchronized usa como monitor el objeto Class de la clase (Contador.class), compartido por todas las instancias y llamadas estáticas."}, {"codigo": "public void metodo() {\n    Thread.sleep(1000);\n}", "enunciado": "¿Qué problema tiene este código?", "opciones": ["No compila porque Thread.sleep() lanza InterruptedException (checked) que debe manejarse o declararse", "No compila porque sleep() requiere un objeto Thread explícito", "Compila y funciona sin problema", "sleep() no existe en la clase Thread"], "correcta": 0, "explicacion": "Thread.sleep() declara 'throws InterruptedException', una excepción checked. El método que la invoca debe capturarla o declarar también esa excepción en su firma."}, {"codigo": "ScheduledExecutorService ses = Executors.newScheduledThreadPool(1);\nses.scheduleAtFixedRate(() -> System.out.println(\"tick\"), 0, 1, TimeUnit.SECONDS);", "enunciado": "¿Qué hace scheduleAtFixedRate() en este contexto?", "opciones": ["Ejecuta la tarea repetidamente cada cierto intervalo de tiempo fijo, comenzando de inmediato", "Ejecuta la tarea una sola vez tras el retraso indicado", "Cancela automáticamente después de la primera ejecución", "Solo funciona con Callable"], "correcta": 0, "explicacion": "scheduleAtFixedRate() programa la ejecución repetida de una tarea con un intervalo de tiempo fijo entre inicios de ejecución, comenzando tras el retraso inicial indicado (0 en este caso)."}, {"codigo": null, "enunciado": "¿Qué ventaja ofrece ConcurrentHashMap sobre un HashMap sincronizado manualmente (Collections.synchronizedMap)?", "opciones": ["Permite mayor concurrencia al usar particionamiento interno con bloqueos más finos, en lugar de bloquear todo el mapa en cada operación", "ConcurrentHashMap no permite valores null y HashMap sí, siendo esa la única diferencia relevante", "Es idéntico en rendimiento pero más simple de usar", "Un HashMap sincronizado siempre es más rápido"], "correcta": 0, "explicacion": "ConcurrentHashMap divide internamente sus datos para permitir que múltiples hilos operen simultáneamente sobre distintas partes del mapa, logrando mucho mayor concurrencia que bloquear el mapa completo en cada acceso."}, {"codigo": "Thread hilo = new Thread(() -> tareaLarga());\nhilo.setDaemon(true);\nhilo.start();", "enunciado": "¿Qué implica marcar un hilo como 'daemon'?", "opciones": ["La JVM puede terminar el proceso aunque este hilo siga en ejecución, ya que no impide la salida del programa", "El hilo tendrá prioridad máxima", "El hilo no puede ser interrumpido", "El hilo se ejecuta en un proceso separado"], "correcta": 0, "explicacion": "Los hilos daemon se usan para tareas de soporte en segundo plano; la JVM finaliza el programa en cuanto solo quedan hilos daemon en ejecución, sin esperar a que terminen."}, {"codigo": "Semaphore sem = new Semaphore(2);\nsem.acquire();\ntry {\n    // recurso limitado\n} finally {\n    sem.release();\n}", "enunciado": "¿Qué controla un Semaphore inicializado con 2 permisos?", "opciones": ["Que como máximo 2 hilos accedan simultáneamente a la sección protegida", "Que solo 2 hilos puedan crearse en total en la aplicación", "Que la sección se ejecute exactamente 2 veces", "Que el recurso se libere automáticamente tras 2 segundos"], "correcta": 0, "explicacion": "Un Semaphore limita el número de hilos que pueden acceder concurrentemente a un recurso, según la cantidad de 'permisos' disponibles (2 en este caso)."}, {"codigo": "class Contador {\n    int valor = 0;\n    void incrementar() { valor++; } // sin synchronized\n}", "enunciado": "Si múltiples hilos llaman a incrementar() concurrentemente sin sincronización, ¿qué puede ocurrir?", "opciones": ["El valor final puede ser menor al esperado debido a una condición de carrera (race condition), ya que valor++ no es atómico", "El código no compila", "Siempre se obtiene el resultado correcto porque int es primitivo", "Se lanza ConcurrentModificationException"], "correcta": 0, "explicacion": "valor++ implica leer, incrementar y escribir; si dos hilos lo hacen simultáneamente sin sincronización, algunos incrementos pueden perderse, resultando en un valor final menor al esperado."}, {"codigo": null, "enunciado": "¿Cuál de los siguientes NO es un estado válido de Thread.State en Java?", "opciones": ["NEW", "RUNNABLE", "PAUSED", "TERMINATED"], "correcta": 2, "explicacion": "Los estados válidos de Thread.State son NEW, RUNNABLE, BLOCKED, WAITING, TIMED_WAITING y TERMINATED. 'PAUSED' no existe como estado de hilo en Java."}, {"codigo": "Thread t = new Thread(() -> tareaLarga());\nt.start();\nt.join();\nSystem.out.println(\"terminado\");", "enunciado": "¿Qué efecto tiene la llamada a t.join()?", "opciones": ["Bloquea el hilo actual hasta que el hilo 't' finalice su ejecución", "Termina inmediatamente el hilo 't'", "Inicia el hilo 't' nuevamente", "No tiene efecto si 't' ya fue iniciado"], "correcta": 0, "explicacion": "join() hace que el hilo que lo invoca (en este caso, el hilo principal) espere hasta que el hilo 't' termine su ejecución antes de continuar."}]}, {"id": "io", "nombre": "8. Java I/O y NIO.2", "preguntas": [{"codigo": "Path p = Path.of(\"datos\", \"archivo.txt\");\nSystem.out.println(p);", "enunciado": "En un sistema tipo Unix, ¿qué imprime aproximadamente este código?", "opciones": ["datos/archivo.txt", "datos\\\\archivo.txt", "datosarchivo.txt", "No compila"], "correcta": 0, "explicacion": "Path.of() (o Paths.get()) construye una ruta a partir de los segmentos indicados, usando el separador del sistema operativo (en Unix, '/')."}, {"codigo": null, "enunciado": "¿Cuál es la diferencia principal entre Files.readAllLines() y Files.lines()?", "opciones": ["readAllLines() carga todo el archivo en memoria como una List<String>; lines() devuelve un Stream perezoso, más adecuado para archivos grandes", "lines() solo puede leer archivos binarios", "readAllLines() no puede lanzar IOException", "No hay ninguna diferencia"], "correcta": 0, "explicacion": "Files.readAllLines() lee todo el contenido de una vez en memoria, mientras que Files.lines() devuelve un Stream<String> de lectura perezosa, ideal para archivos grandes ya que no carga todo en memoria simultáneamente."}, {"codigo": "try (BufferedReader br = new BufferedReader(new FileReader(\"datos.txt\"))) {\n    String linea;\n    while ((linea = br.readLine()) != null) {\n        System.out.println(linea);\n    }\n}", "enunciado": "¿Qué característica de diseño demuestra este código?", "opciones": ["Un patrón decorador: BufferedReader envuelve a FileReader para añadir buffering", "Serialización de objetos", "Uso de streams funcionales (java.util.stream)", "Programación reactiva"], "correcta": 0, "explicacion": "La API de I/O clásica de Java usa el patrón decorador: clases como BufferedReader 'envuelven' a otro Reader (FileReader) para añadirle funcionalidad extra, en este caso, lectura eficiente por líneas con buffer."}, {"codigo": null, "enunciado": "Para que una clase pueda ser escrita con ObjectOutputStream (serialización), ¿qué interfaz debe implementar?", "opciones": ["Externalizable únicamente", "Serializable", "Cloneable", "AutoCloseable"], "correcta": 1, "explicacion": "Una clase debe implementar la interfaz marcador Serializable para que sus instancias puedan escribirse con ObjectOutputStream y leerse luego con ObjectInputStream."}, {"codigo": "Path origen = Path.of(\"a.txt\");\nPath destino = Path.of(\"b.txt\");\nFiles.copy(origen, destino, StandardCopyOption.REPLACE_EXISTING);", "enunciado": "¿Qué hace StandardCopyOption.REPLACE_EXISTING en esta llamada?", "opciones": ["Permite sobrescribir el archivo destino si ya existe", "Elimina el archivo origen tras copiarlo", "Crea automáticamente las carpetas necesarias", "Comprime el archivo copiado"], "correcta": 0, "explicacion": "REPLACE_EXISTING indica a Files.copy() que, si el archivo destino ya existe, debe sobrescribirse en lugar de lanzar FileAlreadyExistsException."}, {"codigo": null, "enunciado": "¿Qué método de la interfaz Path se usa para obtener la ruta absoluta a partir de una ruta relativa?", "opciones": ["toAbsolutePath()", "resolve()", "normalize()", "relativize()"], "correcta": 0, "explicacion": "toAbsolutePath() convierte una ruta relativa en una ruta absoluta basada en el directorio de trabajo actual. resolve() combina rutas, normalize() elimina elementos redundantes (como '..'), y relativize() calcula una ruta relativa entre dos rutas."}, {"codigo": "try (Stream<Path> paths = Files.walk(Path.of(\".\"))) {\n    long total = paths.filter(Files::isRegularFile).count();\n    System.out.println(total);\n}", "enunciado": "¿Qué hace Files.walk() en este contexto?", "opciones": ["Recorre recursivamente el árbol de directorios a partir de la ruta dada, devolviendo un Stream<Path>", "Solo lista los archivos del directorio actual, sin recursividad", "Elimina todos los archivos del directorio", "Crea un nuevo directorio"], "correcta": 0, "explicacion": "Files.walk() recorre recursivamente el árbol de directorios comenzando en la ruta indicada, devolviendo un Stream<Path> perezoso con todos los archivos y subdirectorios encontrados."}, {"codigo": null, "enunciado": "¿Qué anotación se usa en un campo para que NO sea incluido en la serialización de un objeto?", "opciones": ["@NotSerializable", "transient (modificador, no anotación)", "@Ignore", "static (modificador)"], "correcta": 1, "explicacion": "El modificador 'transient' marca un campo para que sea excluido explícitamente del proceso de serialización; al deserializar, ese campo recupera su valor por defecto (0, null, false, etc.)."}, {"codigo": "Path p = Path.of(\"no_existe.txt\");\nSystem.out.println(Files.exists(p));", "enunciado": "Si el archivo no existe, ¿qué imprime este código?", "opciones": ["false", "true", "Lanza excepción", "No compila"], "correcta": 0, "explicacion": "Files.exists() devuelve false si el archivo o directorio en la ruta dada no existe, sin lanzar ninguna excepción."}, {"codigo": "Path dir = Path.of(\"a/b/c\");\nFiles.createDirectories(dir);", "enunciado": "Si los directorios intermedios 'a' y 'a/b' no existen, ¿qué hace esta línea?", "opciones": ["Los crea automáticamente junto con 'c'", "Lanza NoSuchFileException porque faltan directorios intermedios", "Solo crea 'c' si 'a/b' ya existe", "No compila"], "correcta": 0, "explicacion": "Files.createDirectories() crea todos los directorios intermedios necesarios que no existan, a diferencia de Files.createDirectory() que requiere que el padre ya exista."}, {"codigo": "Files.write(Path.of(\"salida.txt\"), \"Hola\".getBytes());", "enunciado": "Si el archivo 'salida.txt' no existe, ¿qué hace esta línea?", "opciones": ["Crea el archivo y escribe el contenido indicado", "Lanza NoSuchFileException porque el archivo no existe", "No compila", "Falla silenciosamente sin escribir nada"], "correcta": 0, "explicacion": "Por defecto, Files.write() usa las opciones CREATE y TRUNCATE_EXISTING: crea el archivo si no existe, o lo sobrescribe si ya existe."}, {"codigo": "FileWriter fw = new FileWriter(\"log.txt\", true);\nfw.write(\"nueva línea\");\nfw.close();", "enunciado": "¿Qué hace el segundo argumento 'true' en este constructor de FileWriter?", "opciones": ["Habilita el modo append, agregando contenido al final del archivo sin sobrescribirlo", "Hace que el archivo se cree como de solo lectura", "Activa el buffering automático", "Convierte el escritor en thread-safe"], "correcta": 0, "explicacion": "El segundo parámetro booleano del constructor de FileWriter indica el modo 'append': true agrega al final del archivo existente, false (por defecto) lo sobrescribe."}, {"codigo": "PrintWriter pw = new PrintWriter(new FileWriter(\"datos.txt\"));\npw.println(\"Hola\");\npw.close();", "enunciado": "¿Qué ventaja aporta PrintWriter frente a escribir directamente con FileWriter?", "opciones": ["Ofrece métodos convenientes como println(), print() y printf() para distintos tipos de datos", "Es la única forma de escribir texto en un archivo", "Cifra automáticamente el contenido", "Convierte el archivo en inmutable"], "correcta": 0, "explicacion": "PrintWriter decora otro Writer añadiendo métodos convenientes (println, print, printf) similares a los de System.out, facilitando la escritura formateada."}, {"codigo": "Files.delete(Path.of(\"no_existe.txt\"));", "enunciado": "¿Qué ocurre si el archivo no existe al llamar a Files.delete()?", "opciones": ["Lanza NoSuchFileException", "No hace nada silenciosamente", "Crea el archivo antes de eliminarlo", "No compila"], "correcta": 0, "explicacion": "A diferencia de Files.deleteIfExists() (que devuelve false sin error si el archivo no existe), Files.delete() lanza NoSuchFileException si el archivo no está presente."}, {"codigo": "Path base = Path.of(\"/datos/proyectos\");\nPath destino = Path.of(\"/datos/proyectos/java/App.java\");\nSystem.out.println(base.relativize(destino));", "enunciado": "¿Qué imprime este código?", "opciones": ["java/App.java", "proyectos/java/App.java", "../App.java", "No compila"], "correcta": 0, "explicacion": "relativize() calcula la ruta relativa necesaria para ir desde 'base' hasta 'destino': 'java/App.java'."}, {"codigo": "Path base = Path.of(\"/datos\");\nPath resultado = base.resolve(\"proyectos/app.txt\");\nSystem.out.println(resultado);", "enunciado": "¿Qué imprime este código?", "opciones": ["/datos/proyectos/app.txt", "proyectos/app.txt", "/datos", "No compila"], "correcta": 0, "explicacion": "resolve() combina la ruta base con la ruta relativa dada, produciendo '/datos/proyectos/app.txt'."}, {"codigo": null, "enunciado": "¿Cuál es el propósito principal de declarar un campo 'serialVersionUID' en una clase Serializable?", "opciones": ["Identificar de forma consistente la versión de la clase durante la deserialización, evitando InvalidClassException si la clase cambia", "Es obligatorio para que la clase compile", "Cifra el contenido serializado", "Aumenta el rendimiento de la serialización"], "correcta": 0, "explicacion": "serialVersionUID ayuda a verificar la compatibilidad entre la versión de la clase usada al serializar y la usada al deserializar, evitando InvalidClassException si difieren y no se declaró explícitamente."}, {"codigo": "ObjectInputStream ois = new ObjectInputStream(new FileInputStream(\"datos.ser\"));\nPersona p = (Persona) ois.readObject();", "enunciado": "¿Por qué es necesario el cast explícito a (Persona) en esta línea?", "opciones": ["Porque readObject() devuelve Object de forma genérica, sin importar el tipo real serializado", "Porque Persona no implementa Serializable", "Porque ObjectInputStream no puede leer objetos personalizados", "No es necesario, es opcional"], "correcta": 0, "explicacion": "El método readObject() de ObjectInputStream tiene firma 'Object readObject()', por lo que siempre requiere un cast explícito al tipo real esperado."}, {"codigo": null, "enunciado": "¿Para qué se utiliza típicamente la clase java.io.Console?", "opciones": ["Para leer entradas interactivas del usuario desde la terminal, incluyendo contraseñas ocultas con readPassword()", "Para escribir archivos binarios", "Para gestionar hilos de ejecución", "Para serializar objetos"], "correcta": 0, "explicacion": "java.io.Console provee acceso a la consola asociada con la JVM, útil para leer entradas de usuario de forma interactiva, incluyendo contraseñas que no se muestran en pantalla."}, {"codigo": "try (var a = new RecursoA(); var b = new RecursoB()) {\n    // uso\n}", "enunciado": "¿En qué orden se cierran 'a' y 'b' al finalizar el bloque?", "opciones": ["Primero b, luego a (orden inverso a la declaración)", "Primero a, luego b", "En orden aleatorio", "Solo se cierra el último declarado"], "correcta": 0, "explicacion": "En try-with-resources con múltiples recursos, se cierran en orden INVERSO al de su declaración: el último recurso abierto es el primero en cerrarse."}, {"codigo": "try (BufferedWriter bw = new BufferedWriter(new FileWriter(\"out.txt\"))) {\n    bw.write(\"linea1\");\n    bw.newLine();\n    bw.write(\"linea2\");\n}", "enunciado": "¿Qué ventaja tiene usar bw.newLine() en lugar de escribir \"\\n\" directamente?", "opciones": ["Usa el separador de línea correcto según el sistema operativo (line.separator)", "Es más rápido en todos los casos", "Cifra automáticamente el salto de línea", "No hay ninguna diferencia real"], "correcta": 0, "explicacion": "newLine() usa el separador de línea propio de la plataforma (definido en la propiedad 'line.separator'), lo que garantiza portabilidad entre sistemas operativos."}, {"codigo": "long tamano = Files.size(Path.of(\"datos.txt\"));", "enunciado": "¿Qué devuelve Files.size()?", "opciones": ["El tamaño del archivo en bytes", "El número de líneas del archivo", "El número de caracteres del archivo", "La fecha de creación del archivo"], "correcta": 0, "explicacion": "Files.size() devuelve el tamaño del archivo en bytes, tal como está almacenado en el sistema de archivos."}, {"codigo": "try (DirectoryStream<Path> stream = Files.newDirectoryStream(Path.of(\".\"))) {\n    for (Path p : stream) {\n        System.out.println(p.getFileName());\n    }\n}", "enunciado": "¿Qué hace Files.newDirectoryStream() en este ejemplo?", "opciones": ["Lista los archivos y directorios directamente contenidos en la ruta dada (sin recursividad)", "Recorre recursivamente todos los subdirectorios", "Elimina todo el contenido del directorio", "Solo funciona con archivos .txt"], "correcta": 0, "explicacion": "DirectoryStream provee una forma eficiente de iterar sobre las entradas de UN SOLO nivel de un directorio, sin recorrer subdirectorios de forma recursiva."}, {"codigo": null, "enunciado": "¿Qué característica distingue a RandomAccessFile de otras clases de E/S como FileInputStream?", "opciones": ["Permite leer y escribir en cualquier posición del archivo usando seek(), sin tener que procesar secuencialmente", "Solo permite lectura, nunca escritura", "Es la única clase que implementa Serializable", "No requiere cerrarse nunca"], "correcta": 0, "explicacion": "RandomAccessFile permite mover el puntero de posición del archivo libremente con seek(), habilitando acceso de lectura/escritura en cualquier punto, a diferencia del acceso puramente secuencial de otros flujos."}, {"codigo": "BufferedReader br = new BufferedReader(new InputStreamReader(System.in));\nString linea = br.readLine();", "enunciado": "¿Qué función cumple InputStreamReader en este código?", "opciones": ["Actúa como puente (bridge) entre un flujo de bytes (InputStream) y un flujo de caracteres (Reader), aplicando una codificación de texto", "Comprime los datos leídos", "Cifra la entrada del usuario", "Convierte automáticamente el texto a mayúsculas"], "correcta": 0, "explicacion": "InputStreamReader convierte bytes (de un InputStream como System.in) en caracteres (Reader), aplicando la codificación de caracteres especificada o la por defecto del sistema."}, {"codigo": "Files.move(Path.of(\"origen.txt\"), Path.of(\"destino.txt\"), StandardCopyOption.REPLACE_EXISTING);", "enunciado": "¿Qué hace esta línea?", "opciones": ["Mueve (renombra) el archivo origen.txt a destino.txt, sobrescribiendo si ya existe", "Copia el archivo sin eliminar el original", "Solo funciona dentro del mismo directorio", "No compila"], "correcta": 0, "explicacion": "Files.move() mueve (o renombra) un archivo de una ruta a otra; REPLACE_EXISTING indica que se sobrescriba el destino si ya existe."}, {"codigo": "class Conexion {} // no implementa Serializable\nclass Sesion implements Serializable {\n    Conexion conexion = new Conexion();\n}\nObjectOutputStream oos = new ObjectOutputStream(new FileOutputStream(\"s.ser\"));\noos.writeObject(new Sesion());", "enunciado": "¿Qué ocurre al intentar serializar una instancia de Sesion?", "opciones": ["Se lanza NotSerializableException en tiempo de ejecución porque Conexion no implementa Serializable", "Se serializa correctamente ignorando el campo conexion", "No compila", "Se lanza IOException genérica sin más detalles"], "correcta": 0, "explicacion": "Cuando un objeto Serializable contiene una referencia a un objeto de una clase que NO implementa Serializable (y no es transient), se lanza NotSerializableException al intentar escribirlo."}]}, {"id": "jdbc", "nombre": "9. JDBC (Java Database Connectivity)", "preguntas": [{"codigo": "try (Connection conn = DriverManager.getConnection(url, user, pass);\n     PreparedStatement ps = conn.prepareStatement(\"SELECT * FROM usuarios WHERE id = ?\")) {\n    ps.setInt(1, 5);\n    try (ResultSet rs = ps.executeQuery()) {\n        while (rs.next()) {\n            System.out.println(rs.getString(\"nombre\"));\n        }\n    }\n}", "enunciado": "¿Por qué se prefiere PreparedStatement sobre Statement en este ejemplo?", "opciones": ["Porque previene inyección SQL y permite reutilizar el plan de ejecución con parámetros", "Porque no requiere manejo de excepciones", "Porque es la única forma de ejecutar SELECT", "Porque no necesita cerrarse nunca"], "correcta": 0, "explicacion": "PreparedStatement usa parámetros vinculados (placeholders '?') que son tratados como datos, no como código SQL, previniendo inyección SQL, además de permitir que la base de datos reutilice el plan de ejecución."}, {"codigo": null, "enunciado": "¿Qué método de ResultSet se usa para avanzar al siguiente registro y verificar si existe?", "opciones": ["next()", "hasNext()", "advance()", "getRow()"], "correcta": 0, "explicacion": "ResultSet.next() mueve el cursor a la siguiente fila y devuelve true si existe una fila válida, o false si se llegó al final del conjunto de resultados."}, {"codigo": "Connection conn = DriverManager.getConnection(url, user, pass);\nconn.setAutoCommit(false);\ntry {\n    // varias operaciones\n    conn.commit();\n} catch (SQLException e) {\n    conn.rollback();\n}", "enunciado": "¿Qué patrón demuestra este código?", "opciones": ["Manejo manual de transacciones: desactivar auto-commit, confirmar o revertir cambios explícitamente", "Pool de conexiones", "Serialización JDBC", "Batch processing obligatorio"], "correcta": 0, "explicacion": "Al desactivar autoCommit, el desarrollador controla manualmente cuándo confirmar (commit) o revertir (rollback) un conjunto de operaciones como una única unidad transaccional."}, {"codigo": null, "enunciado": "¿Cuál es el propósito de la interfaz DriverManager en JDBC?", "opciones": ["Gestionar un registro de drivers JDBC y establecer conexiones a bases de datos según la URL proporcionada", "Ejecutar directamente sentencias SQL sin necesidad de Connection", "Serializar resultados a JSON automáticamente", "Sustituir completamente a los drivers específicos de cada base de datos"], "correcta": 0, "explicacion": "DriverManager mantiene un registro de los drivers JDBC cargados y, mediante getConnection(url, ...), selecciona el driver apropiado según el prefijo de la URL para establecer la conexión."}, {"codigo": "String sql = \"INSERT INTO log(mensaje) VALUES (?)\";\ntry (PreparedStatement ps = conn.prepareStatement(sql)) {\n    ps.setString(1, \"evento1\");\n    ps.addBatch();\n    ps.setString(1, \"evento2\");\n    ps.addBatch();\n    int[] resultados = ps.executeBatch();\n}", "enunciado": "¿Qué ventaja principal ofrece el uso de addBatch() y executeBatch()?", "opciones": ["Ejecutar múltiples sentencias SQL en un solo viaje de red, mejorando el rendimiento", "Evitar el uso de PreparedStatement", "Garantizar que las inserciones sean atómicas automáticamente sin transacciones", "Permitir ejecutar sentencias DDL únicamente"], "correcta": 0, "explicacion": "El procesamiento por lotes (batch) agrupa varias sentencias para enviarlas juntas a la base de datos, reduciendo la sobrecarga de comunicación red/servidor y mejorando el rendimiento en inserciones o actualizaciones masivas."}, {"codigo": null, "enunciado": "¿Qué diferencia hay entre Statement y CallableStatement?", "opciones": ["CallableStatement se usa específicamente para invocar procedimientos almacenados", "Statement no permite ejecutar SELECT", "CallableStatement no puede recibir parámetros", "No existe ninguna diferencia real"], "correcta": 0, "explicacion": "CallableStatement extiende PreparedStatement y está diseñado específicamente para invocar procedimientos almacenados (stored procedures) en la base de datos, incluyendo soporte para parámetros de salida (OUT)."}, {"codigo": null, "enunciado": "¿Cuál es el formato típico de una URL de conexión JDBC para MySQL?", "opciones": ["jdbc:mysql://host:puerto/basededatos", "mysql://host/basededatos", "host:puerto/basededatos", "db:mysql://host/basededatos"], "correcta": 0, "explicacion": "Las URLs JDBC siguen el formato 'jdbc:subprotocolo://host:puerto/basededatos', donde el subprotocolo identifica el tipo de base de datos (mysql, postgresql, oracle, etc.)."}, {"codigo": "try (Connection conn = DriverManager.getConnection(url, user, pass)) {\n    // usar conexión\n}", "enunciado": "¿Qué ventaja aporta usar try-with-resources con Connection?", "opciones": ["Garantiza que conn.close() se invoque automáticamente, liberando recursos incluso si ocurre una excepción", "Hace que las consultas se ejecuten más rápido", "Evita tener que usar PreparedStatement", "Permite omitir el manejo de SQLException"], "correcta": 0, "explicacion": "Connection implementa AutoCloseable, así que try-with-resources garantiza que la conexión se cierre automáticamente al final del bloque, incluso ante una excepción."}, {"codigo": "ResultSet rs = ps.executeQuery();\nwhile (rs.next()) {\n    int id = rs.getInt(\"id\");\n    String nombre = rs.getString(2);\n}", "enunciado": "¿Qué es cierto sobre el acceso a columnas de un ResultSet?", "opciones": ["Se puede acceder por nombre de columna o por índice (basado en 1, no en 0)", "Solo se puede acceder por nombre de columna", "Los índices de columna comienzan en 0", "No se puede mezclar acceso por nombre e índice"], "correcta": 0, "explicacion": "JDBC permite acceder a las columnas de un ResultSet tanto por su nombre (getInt(\"id\")) como por su posición numérica, la cual comienza en 1 (no en 0 como los arrays)."}, {"codigo": null, "enunciado": "¿SQLException es una excepción checked o unchecked?", "opciones": ["Checked, extiende directamente de Exception", "Unchecked, extiende de RuntimeException", "Es un Error, no una Exception", "Depende del driver JDBC usado"], "correcta": 0, "explicacion": "SQLException es una excepción 'checked' (extiende Exception directamente), por lo que debe manejarse con try-catch o declararse en la cláusula throws del método."}, {"codigo": "String sql = \"SELECT * FROM usuarios WHERE nombre = '\" + entradaUsuario + \"'\";\nStatement st = conn.createStatement();\nResultSet rs = st.executeQuery(sql);", "enunciado": "¿Qué vulnerabilidad de seguridad presenta este código?", "opciones": ["Inyección SQL, ya que 'entradaUsuario' se concatena directamente sin sanitizar ni usar parámetros", "Ninguna, es una práctica segura y recomendada", "Fuga de memoria", "Bloqueo de la tabla usuarios"], "correcta": 0, "explicacion": "Concatenar directamente entradas del usuario en una sentencia SQL permite que un atacante inyecte código SQL malicioso (por ejemplo, ' OR '1'='1). Se debe usar PreparedStatement con parámetros vinculados."}, {"codigo": null, "enunciado": "Por defecto, ¿qué tipo de cursor tiene un ResultSet obtenido con executeQuery()?", "opciones": ["TYPE_FORWARD_ONLY: solo permite avanzar con next(), no retroceder", "TYPE_SCROLL_SENSITIVE, permite navegación bidireccional", "Aleatorio según el driver", "Siempre de solo lectura y bidireccional"], "correcta": 0, "explicacion": "Por defecto, un ResultSet es de tipo TYPE_FORWARD_ONLY, permitiendo únicamente avanzar secuencialmente con next(); para navegación bidireccional se debe solicitar explícitamente otro tipo al crear el Statement."}, {"codigo": null, "enunciado": "¿Qué ocurre si no se cierra una Connection JDBC explícitamente tras usarla?", "opciones": ["Se puede agotar el pool de conexiones disponibles, causando fugas de recursos en la aplicación", "No pasa nada, Java la cierra automáticamente siempre", "Se cierra automáticamente al final del método actual", "La base de datos la cierra tras 1 segundo"], "correcta": 0, "explicacion": "Las conexiones JDBC son recursos limitados y costosos; no cerrarlas explícitamente puede agotar el pool disponible, causando fallos en la aplicación por falta de conexiones libres."}, {"codigo": "int[] resultados = ps.executeBatch();", "enunciado": "¿Qué representa cada elemento del array devuelto por executeBatch()?", "opciones": ["El número de filas afectadas por cada sentencia del lote (o un código especial si no se puede determinar)", "El tiempo en milisegundos que tardó cada sentencia", "El identificador generado por cada inserción", "Siempre son ceros"], "correcta": 0, "explicacion": "executeBatch() devuelve un array donde cada posición indica el número de filas afectadas por la sentencia correspondiente del lote, en el mismo orden en que fueron agregadas con addBatch()."}, {"codigo": "PreparedStatement ps = conn.prepareStatement(sql, Statement.RETURN_GENERATED_KEYS);\nps.executeUpdate();\nResultSet keys = ps.getGeneratedKeys();", "enunciado": "¿Para qué se usa Statement.RETURN_GENERATED_KEYS junto con getGeneratedKeys()?", "opciones": ["Para obtener valores generados automáticamente por la base de datos, como claves primarias autoincrementales, tras una inserción", "Para revertir la transacción si falla", "Para cifrar las claves de la tabla", "Para validar el esquema de la tabla"], "correcta": 0, "explicacion": "Esta combinación permite recuperar valores generados automáticamente por la base de datos (como un ID autoincremental) inmediatamente después de una operación INSERT."}, {"codigo": null, "enunciado": "En versiones modernas de JDBC (4.0+), ¿es obligatorio llamar a Class.forName(\"driver\") antes de conectar?", "opciones": ["No, los drivers JDBC 4.0+ se registran automáticamente mediante el mecanismo ServiceLoader", "Sí, siempre es obligatorio en cualquier versión", "Solo es necesario para bases de datos Oracle", "Solo es necesario si se usa un pool de conexiones"], "correcta": 0, "explicacion": "Desde JDBC 4.0, los drivers presentes en el classpath se registran automáticamente al iniciar la aplicación, gracias al mecanismo de descubrimiento de servicios (ServiceLoader), haciendo innecesario el Class.forName() manual."}, {"codigo": "conn.setTransactionIsolation(Connection.TRANSACTION_READ_COMMITTED);", "enunciado": "¿Qué controla el nivel de aislamiento de una transacción?", "opciones": ["Qué tan visibles son los cambios no confirmados de otras transacciones concurrentes para la transacción actual", "La velocidad de ejecución de las consultas", "El número máximo de conexiones simultáneas", "El tipo de driver JDBC utilizado"], "correcta": 0, "explicacion": "El nivel de aislamiento (isolation level) determina qué fenómenos de concurrencia (lecturas sucias, no repetibles, fantasma) pueden ocurrir entre transacciones simultáneas."}, {"codigo": "ResultSetMetaData meta = rs.getMetaData();\nint columnas = meta.getColumnCount();", "enunciado": "¿Qué información provee ResultSetMetaData?", "opciones": ["Metadatos sobre la estructura del resultado, como número de columnas, sus nombres y tipos", "Los datos reales de las filas del ResultSet", "El plan de ejecución SQL", "La configuración del driver JDBC"], "correcta": 0, "explicacion": "ResultSetMetaData permite consultar la estructura del resultado de una consulta (número de columnas, nombres, tipos de datos) sin conocerla de antemano en tiempo de compilación."}, {"codigo": "Statement st = conn.createStatement(ResultSet.TYPE_SCROLL_INSENSITIVE, ResultSet.CONCUR_READ_ONLY);\nResultSet rs = st.executeQuery(sql);\nrs.last();\nrs.first();", "enunciado": "¿Qué permite el tipo TYPE_SCROLL_INSENSITIVE en un ResultSet?", "opciones": ["Navegar en ambas direcciones (adelante y atrás) e ir a posiciones específicas como first()/last()", "Solo avanzar con next(), igual que el tipo por defecto", "Modificar directamente los datos de la base de datos", "Ejecutar consultas más rápido siempre"], "correcta": 0, "explicacion": "TYPE_SCROLL_INSENSITIVE permite un cursor desplazable en ambas direcciones, habilitando métodos como first(), last(), absolute() y relative(), a diferencia del cursor por defecto (solo hacia adelante)."}, {"codigo": null, "enunciado": "¿Qué ventaja ofrece usar una interfaz DataSource en lugar de DriverManager directamente en aplicaciones empresariales?", "opciones": ["Permite configurar pooling de conexiones y desacoplar la configuración de la conexión del código, apto para servidores de aplicaciones", "DataSource solo funciona con SQLite", "DriverManager no puede usarse nunca en producción", "No hay ninguna diferencia real"], "correcta": 0, "explicacion": "DataSource desacopla la obtención de conexiones de los detalles concretos del driver, y suele integrarse con mecanismos de pooling gestionados por el contenedor o framework de la aplicación."}, {"codigo": "int valor = rs.getInt(\"cantidad\");\nif (rs.wasNull()) {\n    System.out.println(\"el valor era NULL en la base de datos\");\n}", "enunciado": "¿Para qué sirve rs.wasNull() después de llamar a un getter como getInt()?", "opciones": ["Para verificar si el último valor leído era NULL en la base de datos (ya que getInt() devuelve 0 tanto para NULL como para 0 real)", "Para verificar si la conexión sigue activa", "Para cerrar el ResultSet", "Para revertir la última operación"], "correcta": 0, "explicacion": "Los métodos getX() de tipos primitivos devuelven un valor por defecto (como 0) cuando la columna es NULL en la base de datos. wasNull() permite distinguir si ese 0 representa un valor real o un NULL."}, {"codigo": "int filas = ps.executeUpdate();", "enunciado": "¿Qué representa el valor devuelto por executeUpdate() en una sentencia UPDATE o DELETE?", "opciones": ["El número de filas afectadas por la operación", "El ID de la última fila insertada", "Un booleano indicando éxito o fracaso", "El tiempo de ejecución en milisegundos"], "correcta": 0, "explicacion": "executeUpdate() se usa para sentencias INSERT, UPDATE o DELETE, y devuelve un int con el número de filas afectadas por la operación."}, {"codigo": "Savepoint sp = conn.setSavepoint();\n// operaciones riesgosas\nconn.rollback(sp);", "enunciado": "¿Qué permite un Savepoint dentro de una transacción?", "opciones": ["Revertir parcialmente una transacción hasta un punto intermedio, sin deshacer todo lo confirmado previamente", "Confirmar (commit) parcialmente una transacción", "Cambiar el nivel de aislamiento en tiempo real", "Cerrar la conexión de forma segura"], "correcta": 0, "explicacion": "Un Savepoint marca un punto intermedio dentro de una transacción, permitiendo hacer rollback solo hasta ese punto en lugar de deshacer toda la transacción completa."}, {"codigo": "ps.setNull(2, Types.INTEGER);", "enunciado": "¿Para qué se usa PreparedStatement.setNull()?", "opciones": ["Para asignar explícitamente un valor NULL de SQL a un parámetro, indicando el tipo SQL correspondiente", "Para eliminar un parámetro previamente asignado", "Para cerrar el PreparedStatement", "Para validar que el parámetro no sea NULL"], "correcta": 0, "explicacion": "setNull() asigna explícitamente NULL a un parámetro de un PreparedStatement, indicando también el tipo SQL (Types.INTEGER, Types.VARCHAR, etc.) para que el driver lo interprete correctamente."}, {"codigo": null, "enunciado": "¿Cuál es el propósito principal de un pool de conexiones (connection pool) en una aplicación con JDBC?", "opciones": ["Reutilizar un conjunto de conexiones ya establecidas para evitar el costo de abrir y cerrar conexiones repetidamente", "Cifrar automáticamente todas las consultas SQL", "Aumentar el número máximo de tablas permitidas", "Sustituir completamente la necesidad de cerrar conexiones"], "correcta": 0, "explicacion": "Un pool de conexiones mantiene un conjunto de conexiones abiertas y reutilizables, evitando el costoso proceso de crear y destruir conexiones para cada operación de la aplicación."}, {"codigo": "rs.absolute(3);\nrs.relative(-1);", "enunciado": "¿Qué hacen absolute(3) y relative(-1) sobre un ResultSet desplazable?", "opciones": ["absolute(3) posiciona el cursor en la fila 3; relative(-1) lo mueve una posición hacia atrás desde la posición actual", "Ambos métodos solo funcionan hacia adelante", "absolute() lanza excepción siempre", "relative() reinicia el cursor al principio"], "correcta": 0, "explicacion": "absolute(n) posiciona el cursor en la fila absoluta n; relative(n) mueve el cursor n posiciones relativas a la posición actual (negativo para retroceder). Ambos requieren un ResultSet desplazable (scrollable)."}, {"codigo": "try (Statement st = conn.createStatement();\n     ResultSet rs = st.executeQuery(\"SELECT * FROM productos\")) {\n    while (rs.next()) {\n        System.out.println(rs.getString(\"nombre\"));\n    }\n}", "enunciado": "¿Por qué es una buena práctica declarar tanto Statement como ResultSet en el mismo try-with-resources?", "opciones": ["Para asegurar que ambos recursos se cierren automáticamente en el orden correcto, evitando fugas de recursos de la base de datos", "Porque ResultSet no puede cerrarse manualmente", "Porque es obligatorio por sintaxis del lenguaje", "Porque mejora el rendimiento de la consulta SQL"], "correcta": 0, "explicacion": "Tanto Statement como ResultSet implementan AutoCloseable; declararlos juntos en try-with-resources asegura que ambos se cierren automáticamente (ResultSet primero, luego Statement) al finalizar el bloque."}]}, {"id": "seguridad", "nombre": "10. Código seguro (secure coding)", "preguntas": [{"codigo": "public final class Punto {\n    private final int x;\n    private final int y;\n    public Punto(int x, int y) { this.x = x; this.y = y; }\n    public int getX() { return x; }\n    public int getY() { return y; }\n}", "enunciado": "¿Qué principio de código seguro ejemplifica mejor esta clase?", "opciones": ["Inmutabilidad: campos privados y finales, clase final, sin setters", "Uso de reflexión", "Serialización personalizada", "Encapsulación de excepciones"], "correcta": 0, "explicacion": "La clase es 'final' (no se puede extender), sus campos son 'private final' (no pueden reasignarse ni accederse directamente desde fuera), y no expone setters, garantizando que su estado no cambie tras la construcción: es inmutable."}, {"codigo": null, "enunciado": "¿Por qué se recomienda usar tipos específicos (como List<String>) en lugar de tipos crudos (raw types) como List?", "opciones": ["Los genéricos proporcionan seguridad de tipos en tiempo de compilación, evitando ClassCastException en tiempo de ejecución", "Los raw types son más rápidos siempre", "Los raw types no pueden usarse con colecciones", "No hay ninguna diferencia de seguridad"], "correcta": 0, "explicacion": "Usar genéricos permite que el compilador detecte errores de tipo en tiempo de compilación, evitando que se introduzcan elementos de tipo incorrecto que causarían ClassCastException más adelante en tiempo de ejecución."}, {"codigo": "public void procesar(String entrada) {\n    if (entrada == null || entrada.isBlank()) {\n        throw new IllegalArgumentException(\"Entrada inválida\");\n    }\n    // procesar entrada validada\n}", "enunciado": "¿Qué práctica de código seguro se demuestra en este método?", "opciones": ["Validación de entradas (input validation) antes de procesarlas", "Ofuscación de código", "Cifrado de datos", "Uso de excepciones checked obligatorias"], "correcta": 0, "explicacion": "Validar que los datos de entrada sean correctos (no nulos, no vacíos) antes de procesarlos es una práctica fundamental de codificación segura para evitar comportamientos inesperados o vulnerabilidades."}, {"codigo": null, "enunciado": "¿Cuál es una buena práctica al declarar campos de una clase para minimizar la superficie de ataque?", "opciones": ["Declarar los campos como private y exponerlos solo mediante métodos controlados (getters, sin setters si no es necesario)", "Declarar todos los campos como public para facilitar el acceso", "Usar siempre campos static para todo", "Evitar el uso de constructores"], "correcta": 0, "explicacion": "Encapsular el estado con campos privados y exponer solo lo necesario a través de métodos públicos controlados reduce la posibilidad de que código externo modifique el estado interno de forma no controlada."}, {"codigo": null, "enunciado": "¿Por qué preferir try-with-resources en lugar de cerrar recursos manualmente en un bloque finally?", "opciones": ["Reduce el riesgo de fugas de recursos (resource leaks) al garantizar el cierre automático, incluso si ocurre una excepción", "Es la única forma de cerrar un archivo en Java", "Hace que el código se ejecute en paralelo", "Elimina la necesidad de manejar excepciones"], "correcta": 0, "explicacion": "try-with-resources garantiza que el método close() se invoque automáticamente al final del bloque (incluso si se produce una excepción), reduciendo drásticamente el riesgo de fugas de recursos por errores humanos en el manejo manual."}, {"codigo": null, "enunciado": "¿Qué riesgo de seguridad se asocia comúnmente con hacer públicos campos mutables de una clase que representa datos sensibles?", "opciones": ["Permite que código externo modifique el estado interno sin validación, rompiendo invariantes de la clase", "Ningún riesgo real, solo es una cuestión de estilo", "Hace que la clase no pueda compilar", "Aumenta el uso de memoria significativamente"], "correcta": 0, "explicacion": "Los campos públicos y mutables permiten que cualquier código externo los modifique directamente, sin pasar por validaciones, lo cual puede romper las invariantes internas de la clase y generar estados inconsistentes o vulnerables."}, {"codigo": "public final class Evento {\n    private final Date fecha;\n    public Evento(Date fecha) {\n        this.fecha = new Date(fecha.getTime()); // copia defensiva\n    }\n    public Date getFecha() {\n        return new Date(fecha.getTime()); // copia defensiva\n    }\n}", "enunciado": "¿Por qué se realizan copias defensivas de 'fecha' tanto en el constructor como en el getter?", "opciones": ["Para evitar que código externo modifique el estado interno del objeto a través de una referencia mutable compartida (Date es mutable)", "Para mejorar el rendimiento de la clase", "Para permitir la serialización del objeto", "Porque Date no puede asignarse directamente a un campo final"], "correcta": 0, "explicacion": "Date es mutable. Sin copias defensivas, tanto quien construye el objeto como quien recibe la fecha por el getter podrían modificar la fecha interna a través de su propia referencia, rompiendo la inmutabilidad de Evento."}, {"codigo": "public final class Grupo {\n    private final List<String> miembros;\n    public Grupo(List<String> miembros) {\n        this.miembros = List.copyOf(miembros);\n    }\n    public List<String> getMiembros() { return miembros; }\n}", "enunciado": "¿Qué logra usar List.copyOf() en el constructor?", "opciones": ["Crear una copia inmutable interna, protegiendo la clase de modificaciones externas posteriores a la lista original pasada al constructor", "Ordenar automáticamente la lista", "Eliminar duplicados únicamente", "Permitir valores null en la lista"], "correcta": 0, "explicacion": "List.copyOf() crea una copia inmutable e independiente; aunque el llamador modifique la lista original después de construir el Grupo, el estado interno de Grupo permanece intacto."}, {"codigo": "public class Inventario {\n    private int[] cantidades = {10, 20, 30};\n    public int[] getCantidades() { return cantidades; }\n}", "enunciado": "¿Qué vulnerabilidad de encapsulación tiene este getter?", "opciones": ["Expone una referencia directa al array interno, permitiendo que código externo lo modifique sin control", "Ninguna, los arrays son inmutables en Java", "El método no compila", "Genera una fuga de memoria automáticamente"], "correcta": 0, "explicacion": "Los arrays son objetos mutables. Devolver la referencia directa permite que el código externo modifique el array interno (por ejemplo, inventario.getCantidades()[0] = -1), rompiendo la encapsulación."}, {"codigo": null, "enunciado": "¿Qué principio de código seguro se aplica al declarar métodos y campos con el modificador de acceso MÁS restrictivo posible que aún permita el funcionamiento correcto?", "opciones": ["Principio de mínimo privilegio (least privilege), reduciendo la superficie de ataque de la clase", "Principio de sustitución de Liskov", "Principio de responsabilidad única", "Principio abierto/cerrado"], "correcta": 0, "explicacion": "El principio de mínimo privilegio recomienda otorgar el nivel de acceso mínimo necesario, reduciendo así las posibilidades de uso indebido o manipulación no autorizada del código."}, {"codigo": null, "enunciado": "¿Por qué se considera una mala práctica llamar a System.exit() dentro de código de una librería reutilizable?", "opciones": ["Termina abruptamente toda la JVM, afectando a la aplicación completa que use la librería, en lugar de manejar el error localmente", "Porque System.exit() no existe en Java", "Porque siempre lanza una excepción checked", "Porque solo puede llamarse una vez por programa"], "correcta": 0, "explicacion": "System.exit() termina el proceso completo de la JVM. Una librería que lo invoque puede tumbar inesperadamente toda la aplicación que la use, en lugar de dejar que el código llamador decida cómo manejar el problema."}, {"codigo": "private void readObject(ObjectInputStream in) throws IOException, ClassNotFoundException {\n    in.defaultReadObject();\n    if (saldo < 0) throw new InvalidObjectException(\"saldo inválido\");\n}", "enunciado": "¿Por qué se recomienda validar el estado del objeto dentro de un método readObject() personalizado?", "opciones": ["Porque un flujo de datos serializado manipulado externamente podría reconstruir un objeto con un estado inválido si no se valida", "Porque readObject() nunca se ejecuta automáticamente", "Para mejorar el rendimiento de la deserialización", "Porque es obligatorio por el compilador"], "correcta": 0, "explicacion": "Un atacante podría modificar manualmente los bytes de un objeto serializado. Validar el estado dentro de readObject() protege contra la reconstrucción de objetos con invariantes rotas."}, {"codigo": null, "enunciado": "¿Por qué se recomienda usar char[] en lugar de String para almacenar temporalmente contraseñas en memoria?", "opciones": ["Porque un char[] puede sobrescribirse y limpiarse explícitamente de memoria, mientras que un String inmutable puede permanecer en memoria (posiblemente en el pool) hasta que el recolector de basura actúe", "Porque String no puede contener caracteres especiales", "Porque char[] es más rápido de comparar", "Porque String no permite más de 8 caracteres"], "correcta": 0, "explicacion": "Al ser inmutable, un String con una contraseña puede quedar en memoria más tiempo del deseado (por ejemplo, si termina en el pool de Strings). Un char[] permite sobrescribir explícitamente sus posiciones tras usarlo."}, {"codigo": "class Clave {\n    int id;\n    Clave(int id) { this.id = id; }\n    public boolean equals(Object o) { return o instanceof Clave c && c.id == id; }\n    public int hashCode() { return id; }\n}\nMap<Clave, String> mapa = new HashMap<>();\nClave k = new Clave(1);\nmapa.put(k, \"valor\");\nk.id = 2;\nSystem.out.println(mapa.get(k));", "enunciado": "¿Qué problema surge al mutar 'id' después de usar el objeto como clave de un HashMap?", "opciones": ["El objeto puede volverse 'inencontrable' en el mapa porque su hashCode cambió y ya no coincide con el bucket original donde fue almacenado", "No hay ningún problema, siempre se encuentra correctamente", "El programa lanza una excepción de compilación", "El HashMap elimina automáticamente la entrada"], "correcta": 0, "explicacion": "HashMap ubica las entradas según el hashCode calculado al momento de insertarlas. Si el objeto clave muta y su hashCode cambia, buscarlo después (con el nuevo hashCode) no encontrará el bucket original, efectivamente 'perdiendo' la entrada."}, {"codigo": null, "enunciado": "¿Qué beneficio de seguridad ofrece declarar una clase sensible (por ejemplo, de validación de permisos) como 'final'?", "opciones": ["Evita que código malicioso extienda la clase y sobrescriba métodos para alterar su comportamiento esperado", "Hace que la clase se ejecute más rápido siempre", "Permite que la clase implemente más interfaces", "Es un requisito obligatorio para todas las clases públicas"], "correcta": 0, "explicacion": "Una clase 'final' no puede ser extendida, evitando que una subclase maliciosa sobrescriba métodos críticos (como validaciones de seguridad) para alterar su comportamiento esperado."}, {"codigo": "public void setCorreo(String correo) {\n    if (!correo.matches(\"^[\\\\w.-]+@[\\\\w.-]+\\\\.[a-z]{2,}$\")) {\n        throw new IllegalArgumentException(\"correo inválido\");\n    }\n    this.correo = correo;\n}", "enunciado": "¿Qué práctica de código seguro se ilustra en este método?", "opciones": ["Validación de formato de entrada mediante una expresión regular antes de aceptar el dato", "Cifrado del correo electrónico", "Serialización segura", "Uso de reflexión para validar tipos"], "correcta": 0, "explicacion": "Validar que una entrada cumpla un formato esperado (mediante regex u otro mecanismo) antes de aceptarla es una práctica fundamental de validación de entradas."}, {"codigo": "Field campo = MiClase.class.getDeclaredField(\"saldo\");\ncampo.setAccessible(true);\ncampo.set(objeto, -1000);", "enunciado": "¿Qué riesgo de seguridad demuestra este uso de reflexión?", "opciones": ["setAccessible(true) puede saltarse la encapsulación normal (private), permitiendo modificar campos que deberían estar protegidos", "Ninguno, es una técnica siempre segura y recomendada", "El código no compila nunca", "Solo funciona con campos públicos"], "correcta": 0, "explicacion": "La reflexión con setAccessible(true) puede saltarse los modificadores de acceso normales de Java, permitiendo leer o modificar campos privados que deberían estar protegidos por encapsulación."}, {"codigo": "try {\n    conectar(usuario, clave);\n} catch (SQLException e) {\n    System.out.println(\"Error de conexión con usuario=\" + usuario + \" clave=\" + clave);\n}", "enunciado": "¿Qué problema de seguridad tiene este manejo de excepciones?", "opciones": ["Expone información sensible (como la clave) en mensajes de log o consola, lo que puede filtrarse a través de registros", "Ninguno, es una práctica recomendada para depuración", "No compila porque SQLException no puede capturarse así", "Hace que la conexión falle siempre"], "correcta": 0, "explicacion": "Registrar credenciales (como contraseñas) en mensajes de log o consola es una práctica insegura, ya que esa información puede quedar expuesta en archivos de registro accesibles."}, {"codigo": "public final class Config {\n    private final String host;\n    private final int puerto;\n    private Config(Builder b) { this.host = b.host; this.puerto = b.puerto; }\n    public static class Builder {\n        private String host;\n        private int puerto;\n        public Builder host(String h) { this.host = h; return this; }\n        public Builder puerto(int p) { this.puerto = p; return this; }\n        public Config build() { return new Config(this); }\n    }\n}", "enunciado": "¿Qué ventaja de diseño ofrece este patrón Builder combinado con inmutabilidad en Config?", "opciones": ["Permite construir objetos complejos paso a paso, garantizando que el objeto final sea inmutable y consistente una vez creado", "Permite modificar Config después de construido sin restricciones", "Elimina la necesidad de validación", "Hace que Config sea serializable automáticamente"], "correcta": 0, "explicacion": "El patrón Builder permite ensamblar un objeto complejo de forma flexible, mientras que el constructor privado de Config asegura que, una vez construido, el objeto resultante sea inmutable y no pueda alterarse."}, {"codigo": "public class Configuracion {\n    public static List<String> servidores = new ArrayList<>();\n}", "enunciado": "¿Qué riesgo de seguridad presenta este campo estático público y mutable?", "opciones": ["Cualquier clase puede modificar la lista compartida globalmente sin control ni validación, incluyendo desde hilos concurrentes sin sincronización", "Ninguno, es una práctica común y segura", "El código no compila", "Solo se puede acceder desde la misma clase"], "correcta": 0, "explicacion": "Un campo estático público y mutable es accesible y modificable desde cualquier parte del código sin control, y además puede sufrir condiciones de carrera si se accede concurrentemente sin sincronización."}, {"codigo": "class Pedido implements Cloneable {\n    List<String> items = new ArrayList<>();\n    public Pedido clone() throws CloneNotSupportedException {\n        return (Pedido) super.clone();\n    }\n}", "enunciado": "¿Qué problema de consistencia tiene esta implementación de clone()?", "opciones": ["Es una copia superficial (shallow copy): el clon comparte la MISMA referencia a la lista 'items', por lo que modificar una afecta a la otra", "Es una copia profunda segura, sin ningún problema", "No compila porque Cloneable requiere un constructor especial", "clone() nunca puede lanzar excepciones checked"], "correcta": 0, "explicacion": "super.clone() realiza una copia superficial: los campos de tipo referencia (como 'items') se copian como referencias, no como objetos nuevos. Ambas instancias (original y clon) comparten la misma lista subyacente."}, {"codigo": null, "enunciado": "¿Por qué se recomienda usar java.security.SecureRandom en lugar de java.util.Random para generar valores sensibles (como tokens de sesión)?", "opciones": ["SecureRandom usa fuentes de aleatoriedad criptográficamente más fuertes, dificultando que un atacante prediga los valores generados", "Random es más lento que SecureRandom en todos los casos", "No hay ninguna diferencia real entre ambas clases", "SecureRandom no puede generar números enteros"], "correcta": 0, "explicacion": "java.util.Random usa un generador determinista predecible si se conoce la semilla; SecureRandom está diseñado para usos criptográficos, generando valores mucho más difíciles de predecir."}, {"codigo": "try {\n    procesarPago(monto);\n} catch (Exception e) {\n    // no hacer nada\n}", "enunciado": "¿Qué riesgo introduce este patrón de 'tragarse' (swallow) la excepción sin registrarla ni manejarla?", "opciones": ["Los errores pasan desapercibidos, ocultando fallos reales (incluidos posibles problemas de seguridad) y dificultando la depuración", "Mejora la seguridad al ocultar detalles internos", "Es la forma recomendada de manejar cualquier excepción", "Hace que el código sea más eficiente"], "correcta": 0, "explicacion": "Capturar una excepción sin registrarla ni manejarla ('swallow') oculta problemas reales, dificultando enormemente la detección y depuración de errores, incluidos posibles fallos de seguridad."}, {"codigo": "public void leerArchivo(String nombreArchivo) {\n    Path ruta = Path.of(\"/datos/usuarios\", nombreArchivo).normalize();\n    if (!ruta.startsWith(\"/datos/usuarios\")) {\n        throw new SecurityException(\"ruta no permitida\");\n    }\n    // leer archivo\n}", "enunciado": "¿Qué ataque intenta prevenir esta validación con normalize() y startsWith()?", "opciones": ["Un ataque de 'path traversal' (por ejemplo, usando '../../etc/passwd') que intente acceder a archivos fuera del directorio permitido", "Inyección SQL", "Ataques de denegación de servicio", "Desbordamiento de buffer"], "correcta": 0, "explicacion": "normalize() resuelve secuencias como '..' en la ruta, y verificar que el resultado siga comenzando dentro del directorio permitido previene que un atacante escape del directorio esperado usando path traversal."}, {"codigo": "String password = \"Admin123!\";\nconn = DriverManager.getConnection(url, \"admin\", password);", "enunciado": "¿Qué problema de seguridad presenta codificar credenciales directamente en el código fuente (hardcoding)?", "opciones": ["Las credenciales quedan expuestas en el código fuente y en el control de versiones, siendo fácilmente descubiertas si el código se filtra", "Ninguno, es la forma más eficiente de conectar a la base de datos", "Hace que la conexión sea más rápida", "Es un requisito de JDBC"], "correcta": 0, "explicacion": "Las cred
