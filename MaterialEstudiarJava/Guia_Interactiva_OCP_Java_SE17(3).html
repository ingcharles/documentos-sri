enciales embebidas en el código fuente quedan visibles para cualquiera con acceso al repositorio o al binario compilado. Se recomienda usar variables de entorno, gestores de secretos o archivos de configuración externos protegidos."}, {"codigo": null, "enunciado": "¿Por qué declarar variables en el ámbito (scope) más reducido posible se considera una buena práctica de código seguro y mantenible?", "opciones": ["Reduce la posibilidad de uso indebido o modificación accidental desde código que no debería tener acceso a esa variable", "Hace que el programa consuma menos memoria siempre", "Es un requisito del compilador de Java", "Permite que la variable sea accesible desde cualquier clase"], "correcta": 0, "explicacion": "Limitar el ámbito de una variable al mínimo necesario reduce la superficie donde puede ser leída o modificada incorrectamente, facilitando también el razonamiento sobre el código."}, {"codigo": "public String obtener(String[] arr, int indice) {\n    if (indice < 0 || indice >= arr.length) {\n        throw new IllegalArgumentException(\"índice fuera de rango\");\n    }\n    return arr[indice];\n}", "enunciado": "¿Qué práctica de código seguro se demuestra en este método?", "opciones": ["Validar los límites de un índice antes de acceder al array, evitando ArrayIndexOutOfBoundsException y posibles fallos explotables", "Ordenar el array antes de acceder", "Cifrar el contenido del array", "Convertir el array en una lista inmutable"], "correcta": 0, "explicacion": "Validar explícitamente los límites de un índice antes de usarlo previene excepciones en tiempo de ejecución y posibles comportamientos indebidos derivados de entradas no controladas."}]}, {"id": "modulos", "nombre": "11. Aplicaciones modulares (JPMS)", "preguntas": [{"codigo": "module com.miapp.core {\n    requires java.sql;\n    exports com.miapp.core.servicios;\n}", "enunciado": "¿Qué permite la directiva 'exports' en este archivo module-info.java?", "opciones": ["Que otros módulos puedan acceder a las clases públicas del paquete indicado", "Que el módulo requiera obligatoriamente java.sql en tiempo de compilación solamente", "Que se genere automáticamente documentación Javadoc", "Que el paquete se cifre en tiempo de ejecución"], "correcta": 0, "explicacion": "'exports paquete' hace que los tipos públicos de ese paquete sean accesibles desde otros módulos que declaren 'requires' sobre este módulo. Sin 'exports', el paquete permanece encapsulado (fuertemente encapsulado) aunque sus clases sean públicas."}, {"codigo": null, "enunciado": "¿Qué diferencia hay entre 'requires' y 'requires transitive' en module-info.java?", "opciones": ["'requires transitive' propaga la dependencia a los módulos que a su vez dependan del módulo actual", "'requires transitive' es más rápido en tiempo de ejecución", "No existe diferencia real entre ambos", "'requires' solo funciona con módulos de la JDK"], "correcta": 0, "explicacion": "'requires transitive' indica que cualquier módulo que dependa del módulo actual (con 'requires') automáticamente también tendrá acceso al módulo requerido de forma transitiva, sin tener que declararlo explícitamente."}, {"codigo": "module com.miapp.core {\n    opens com.miapp.core.modelo to com.miapp.persistencia;\n}", "enunciado": "¿Para qué se usa típicamente la directiva 'opens ... to'?", "opciones": ["Para permitir acceso por reflexión profunda (deep reflection) a un paquete específico, solo desde el módulo indicado", "Para exportar el paquete públicamente a todos los módulos", "Para importar clases de otro módulo", "Para cifrar el paquete en tiempo de compilación"], "correcta": 0, "explicacion": "'opens paquete to modulo' permite acceso reflexivo (usado comúnmente por frameworks como Hibernate o Jackson) al paquete indicado, mas restringido solo al módulo especificado, en lugar de abrirlo a todos."}, {"codigo": null, "enunciado": "¿Qué comando se usa para ejecutar una aplicación modular desde la línea de comandos?", "opciones": ["java --module-path mods -m com.miapp/com.miapp.Main", "java -jar com.miapp.Main", "javac --module com.miapp", "java --run com.miapp.Main"], "correcta": 0, "explicacion": "Para ejecutar una app modular se usa --module-path (o -p) para indicar dónde están los módulos, y -m módulo/clasePrincipal para indicar qué módulo y clase principal ejecutar."}, {"codigo": null, "enunciado": "¿Qué es el 'módulo no nombrado' (unnamed module) en JPMS?", "opciones": ["El módulo implícito al que pertenece todo el código en el classpath tradicional (sin module-info.java)", "Un módulo especial que no puede tener dependencias", "El módulo raíz de todas las aplicaciones Java", "Un módulo que solo existe en tiempo de compilación"], "correcta": 0, "explicacion": "El código que se ejecuta desde el classpath clásico (sin declarar module-info.java) pertenece al 'módulo no nombrado', que puede leer todos los demás módulos pero no puede ser referenciado explícitamente por nombre desde otros módulos."}, {"codigo": null, "enunciado": "¿Qué directiva de module-info.java se usa para declarar que un módulo proporciona una implementación de un servicio (Service Provider Interface)?", "opciones": ["provides ... with ...", "implements ... as ...", "exports ... as ...", "uses ... with ..."], "correcta": 0, "explicacion": "'provides Interfaz with ImplementacionConcreta' declara que este módulo ofrece una implementación concreta de un servicio, que puede ser descubierta por otros módulos que usen 'uses Interfaz' junto con ServiceLoader."}, {"codigo": null, "enunciado": "¿En qué ubicación debe colocarse el archivo module-info.java dentro del código fuente de un módulo?", "opciones": ["En la raíz del árbol de código fuente del módulo (no dentro de ningún paquete)", "Dentro del paquete principal de la aplicación", "En cualquier subdirectorio, no importa cuál", "Debe llamarse igual que el módulo"], "correcta": 0, "explicacion": "module-info.java debe ubicarse en la raíz del árbol de código fuente del módulo, sin pertenecer a ningún paquete (no lleva declaración 'package')."}, {"codigo": null, "enunciado": "¿Qué característica tiene el 'módulo no nombrado' respecto a la lectura de otros módulos?", "opciones": ["Puede leer (acceder a) todos los demás módulos del module path, pero ningún módulo con nombre puede declarar 'requires' sobre él explícitamente", "No puede leer ningún otro módulo", "Debe declarar explícitamente todos sus requires", "Es idéntico al módulo java.base"], "correcta": 0, "explicacion": "El módulo no nombrado (código del classpath tradicional) puede leer todos los módulos con nombre, pero no puede ser referenciado por su nombre desde otros módulos, ya que no tiene uno formal."}, {"codigo": null, "enunciado": "¿Qué es un 'módulo automático' en JPMS?", "opciones": ["Un JAR sin module-info.java colocado en el module path, al que Java asigna automáticamente un nombre derivado del archivo, y que exporta todos sus paquetes", "Un módulo generado automáticamente por el compilador para cada clase", "Un módulo que se actualiza solo con nuevas versiones", "Un tipo de módulo exclusivo de la JDK"], "correcta": 0, "explicacion": "Un módulo automático permite usar JARs tradicionales (sin module-info.java) dentro de una aplicación modular, facilitando la migración gradual de bibliotecas heredadas."}, {"codigo": null, "enunciado": "¿Cuál es uno de los principales beneficios del 'encapsulamiento fuerte' (strong encapsulation) que introduce JPMS?", "opciones": ["Impide el acceso no autorizado a APIs internas de un módulo que no hayan sido explícitamente exportadas, incluso si las clases son públicas", "Elimina la necesidad de modificadores de acceso como private", "Hace que todo el código sea automáticamente thread-safe", "Permite ejecutar código sin la JVM"], "correcta": 0, "explicacion": "Antes de JPMS, cualquier clase pública en el classpath era accesible desde cualquier otro código. Con JPMS, incluso las clases públicas de un paquete NO exportado permanecen inaccesibles desde fuera del módulo."}, {"codigo": null, "enunciado": "¿Para qué se utiliza la herramienta jlink?", "opciones": ["Para crear una imagen de runtime personalizada y reducida, que incluya solo los módulos necesarios para ejecutar una aplicación específica", "Para compilar archivos .java a .class", "Para depurar aplicaciones concurrentes", "Para generar documentación Javadoc"], "correcta": 0, "explicacion": "jlink permite ensamblar una imagen de runtime a medida, incluyendo únicamente los módulos que la aplicación realmente necesita, reduciendo el tamaño de distribución."}, {"codigo": null, "enunciado": "¿Para qué se utiliza la herramienta jdeps?", "opciones": ["Para analizar las dependencias de un archivo .class o .jar, ayudando a identificar qué módulos requiere una aplicación", "Para ejecutar pruebas unitarias automáticamente", "Para firmar digitalmente un JAR", "Para convertir código legado en módulos automáticamente sin análisis"], "correcta": 0, "explicacion": "jdeps analiza el bytecode de clases o JARs para reportar sus dependencias, siendo especialmente útil al migrar aplicaciones legadas hacia JPMS."}, {"codigo": "module com.miapp {\n    requires static com.terceros.opcional;\n}", "enunciado": "¿Qué significa la palabra clave 'static' en esta directiva 'requires'?", "opciones": ["Que la dependencia es obligatoria solo en tiempo de compilación, pero opcional en tiempo de ejecución", "Que el módulo completo es una clase estática", "Que la dependencia nunca podrá actualizarse", "Que el módulo no puede exportar paquetes"], "correcta": 0, "explicacion": "'requires static' declara una dependencia opcional en tiempo de ejecución: el módulo se necesita para compilar, pero la aplicación puede ejecutarse sin él si esa funcionalidad no se usa."}, {"codigo": "module com.miapp {\n    exports com.miapp.api;\n    exports com.miapp.util;\n}", "enunciado": "¿Es válido declarar múltiples directivas 'exports' en un mismo module-info.java?", "opciones": ["Sí, se pueden exportar tantos paquetes como sea necesario mediante declaraciones 'exports' separadas", "No, solo se permite un 'exports' por módulo", "Sí, pero como máximo dos", "No, se debe usar una sola declaración con comas"], "correcta": 0, "explicacion": "Un módulo puede tener tantas declaraciones 'exports' como paquetes públicos desee exponer, cada una en su propia línea."}, {"codigo": null, "enunciado": "¿Qué restricción de JPMS prohíbe que el mismo paquete esté definido simultáneamente en dos módulos diferentes del mismo grafo de módulos?", "opciones": ["La prohibición de 'paquetes divididos' (split packages), que causa un error al resolver los módulos en tiempo de lanzamiento", "No existe tal restricción, es perfectamente válido", "Solo aplica a módulos automáticos", "Solo aplica si ambos módulos son de la JDK"], "correcta": 0, "explicacion": "JPMS prohíbe los 'split packages': el mismo paquete no puede existir en más de un módulo del mismo grafo de resolución, ya que rompe la unicidad de la organización modular."}, {"codigo": null, "enunciado": "¿Qué comando se utiliza para listar los módulos disponibles en la JDK actual?", "opciones": ["java --list-modules", "java --show-modules", "javac --modules", "java -modules-list"], "correcta": 0, "explicacion": "El comando 'java --list-modules' muestra todos los módulos disponibles en la instalación actual de la JDK, incluyendo los del sistema (java.base, java.sql, etc.)."}, {"codigo": "module com.miapp.core {\n    exports com.miapp.core.interno to com.miapp.tests;\n}", "enunciado": "¿Qué logra una 'exportación calificada' (qualified export) como esta?", "opciones": ["Exponer el paquete solo al módulo indicado (com.miapp.tests), manteniéndolo encapsulado para todos los demás", "Exportar el paquete públicamente a todos los módulos, igual que un exports normal", "Prohibir el acceso incluso al módulo indicado", "Requiere que com.miapp.tests sea un módulo automático"], "correcta": 0, "explicacion": "'exports paquete to modulo' restringe la visibilidad del paquete exportado únicamente al módulo (o módulos) indicados, manteniéndolo encapsulado para el resto."}, {"codigo": "module com.miapp {\n    uses com.miapp.api.Procesador;\n}\nServiceLoader<Procesador> loader = ServiceLoader.load(Procesador.class);", "enunciado": "¿Qué papel cumple la directiva 'uses' junto con ServiceLoader?", "opciones": ["Declara que el módulo consume implementaciones de un servicio (Procesador), permitiendo que ServiceLoader las descubra en tiempo de ejecución", "Declara que el módulo provee una implementación del servicio", "Impide el uso de ServiceLoader", "Solo funciona con clases abstractas, no interfaces"], "correcta": 0, "explicacion": "'uses Interfaz' indica que el módulo actúa como consumidor de un servicio, habilitando a ServiceLoader.load() a descubrir las implementaciones provistas por otros módulos con 'provides ... with ...'."}, {"codigo": null, "enunciado": "¿Se puede usar un comodín (wildcard) para exportar todos los subpaquetes de un paquete en module-info.java, como 'exports com.miapp.*'?", "opciones": ["No, cada paquete que se desea exportar debe declararse explícitamente y por completo", "Sí, es la forma estándar y recomendada", "Sí, pero solo para paquetes de la JDK", "No, JPMS no permite exportar más de un paquete por módulo"], "correcta": 0, "explicacion": "JPMS no admite comodines en 'exports'; cada paquete que se desee exponer debe declararse explícitamente con su nombre completo."}, {"codigo": null, "enunciado": "Si se coloca 'commons-utils-2.1.jar' (sin module-info.java) en el module path, ¿qué nombre de módulo automático se le asignaría típicamente?", "opciones": ["commons.utils (derivado del nombre del archivo, normalizando guiones y quitando la versión)", "commons-utils-2.1", "El nombre del primer paquete que contenga", "Ninguno; los JAR sin module-info no pueden usarse en el module path"], "correcta": 0, "explicacion": "Los módulos automáticos derivan su nombre del nombre del archivo JAR, normalizando caracteres no válidos (como guiones, que se convierten en puntos) y descartando la información de versión."}, {"codigo": null, "enunciado": "Si se especifica una versión al empaquetar un módulo (jar --module-version), ¿JPMS impone automáticamente resolución de conflictos de versiones en tiempo de ejecución?", "opciones": ["No, JPMS registra la versión como metadato informativo, pero no realiza resolución de conflictos como lo haría un gestor de dependencias", "Sí, JPMS elige automáticamente la versión más reciente disponible", "Sí, y lanza un error si hay dos versiones del mismo módulo", "No, la versión se ignora completamente y ni siquiera se puede consultar"], "correcta": 0, "explicacion": "JPMS almacena la versión del módulo como información descriptiva, pero no implementa un mecanismo de resolución de conflictos de versiones como Maven o Gradle."}, {"codigo": null, "enunciado": "Al empaquetar un módulo ejecutable como JAR modular, ¿cómo se puede indicar la clase principal para ejecutar con solo '-m nombreModulo' (sin especificar la clase)?", "opciones": ["Usando la opción --main-class al crear el JAR con la herramienta 'jar', o declarándola en el manifiesto del módulo", "Debe especificarse siempre con -m modulo/Clase, sin excepción", "Solo es posible con módulos automáticos", "Usando 'requires main' en module-info.java"], "correcta": 0, "explicacion": "La herramienta 'jar' permite especificar --main-class al crear el JAR modular, quedando registrada en su manifiesto, de modo que 'java -m nombreModulo' (sin indicar la clase) sepa qué clase ejecutar."}, {"codigo": "module com.miapp.api {\n    requires transitive com.miapp.modelo;\n}\nmodule com.miapp.web {\n    requires com.miapp.api;\n}", "enunciado": "Gracias a 'requires transitive' en com.miapp.api, ¿qué acceso obtiene automáticamente com.miapp.web sin declararlo explícitamente?", "opciones": ["Acceso a los paquetes exportados por com.miapp.modelo, de forma transitiva", "Ningún acceso adicional", "Acceso total sin restricciones a com.miapp.api", "Acceso de solo lectura a com.miapp.modelo"], "correcta": 0, "explicacion": "'requires transitive' propaga la dependencia: cualquier módulo que dependa de com.miapp.api (como com.miapp.web) obtiene automáticamente acceso a los paquetes exportados por com.miapp.modelo."}, {"codigo": "open module com.miapp.modelo {\n    exports com.miapp.modelo;\n}", "enunciado": "¿Qué diferencia hay entre declarar 'open module' y usar 'opens paquete' selectivamente?", "opciones": ["'open module' abre TODOS los paquetes del módulo para reflexión profunda automáticamente, sin necesidad de declarar 'opens' para cada uno", "'open module' es idéntico a no declarar module-info.java", "'open module' impide cualquier exportación", "'open module' solo afecta a un paquete a la vez, igual que 'opens'"], "correcta": 0, "explicacion": "Declarar un módulo completo como 'open' habilita acceso reflexivo profundo a TODOS sus paquetes, útil para frameworks que dependen intensamente de reflexión, a costa de perder parte del encapsulamiento fuerte."}, {"codigo": "// módulo sin 'opens' para el paquete del framework\nField campo = MiClase.class.getDeclaredField(\"dato\");\ncampo.setAccessible(true);", "enunciado": "¿Qué ocurre si un framework intenta acceder por reflexión profunda a un paquete que NO fue abierto ('opens') por el módulo?", "opciones": ["Se lanza InaccessibleObjectException en tiempo de ejecución", "Se ejecuta sin problema siempre", "No compila", "Se abre automáticamente el paquete de forma silenciosa"], "correcta": 0, "explicacion": "Si un módulo no declara 'opens' (ni 'open module') para el paquete correspondiente, un intento de acceso reflexivo profundo desde otro módulo lanza InaccessibleObjectException en tiempo de ejecución."}, {"codigo": null, "enunciado": "¿Qué tipo de error ocurre típicamente al ejecutar una aplicación modular si un módulo requerido no se encuentra en el module path?", "opciones": ["Un error de resolución de módulos en tiempo de lanzamiento (por ejemplo, 'module not found'), antes de ejecutar el código", "Un error silencioso que se ignora", "Una advertencia que no detiene la ejecución", "Un NullPointerException en tiempo de ejecución"], "correcta": 0, "explicacion": "JPMS resuelve el grafo completo de módulos ANTES de ejecutar cualquier código de la aplicación; si falta un módulo requerido, el lanzamiento falla inmediatamente con un error de resolución."}, {"codigo": null, "enunciado": "¿Cuál es uno de los beneficios principales que JPMS aporta a aplicaciones grandes, conocido como 'configuración confiable' (reliable configuration)?", "opciones": ["Detectar en tiempo de lanzamiento dependencias faltantes o conflictivas, en lugar de fallar más tarde con errores como ClassNotFoundException en tiempo de ejecución", "Eliminar por completo la necesidad de pruebas unitarias", "Permitir que cualquier clase acceda a cualquier otra sin restricciones", "Aumentar automáticamente el rendimiento de la JVM"], "correcta": 0, "explicacion": "La 'configuración confiable' de JPMS verifica el grafo de dependencias de módulos al inicio de la aplicación, detectando de forma temprana problemas que antes solo se manifestaban en tiempo de ejecución con errores difíciles de diagnosticar."}]}];
const GUIA = {"fundamentos": {"resumen": "Tipos primitivos, var, texto (String, text blocks), casting y literales numéricos.", "puntos": ["Los 8 tipos primitivos son: byte, short, int, long, float, double, char, boolean. Todo lo demás es referencia.", "'var' infiere el tipo en tiempo de compilación a partir del inicializador; requiere inicialización inmediata y no puede usarse en campos de clase, solo en variables locales.", "String es inmutable: cada operación que 'modifica' un String en realidad crea uno nuevo. StringBuilder es la alternativa mutable y eficiente para concatenaciones repetidas.", "Los text blocks (\"\"\" ... \"\"\") permiten literales multilínea y recortan automáticamente la sangría incidental común.", "El casting explícito es obligatorio al asignar un tipo 'más grande' a uno 'más pequeño' (narrowing), por ejemplo: int a byte.", "Los guiones bajos en literales numéricos (1_000_000) solo mejoran la legibilidad; no cambian el valor.", "El operador de división entre dos enteros trunca el resultado (no redondea); para obtener decimales, al menos un operando debe ser de punto flotante."], "codigo": "var mensaje = \"\"\"\n    Hola\n    Mundo\"\"\";\nint enteros = 5 / 2;      // 2 (división entera)\ndouble decimales = 5 / 2.0; // 2.5\nbyte b = (byte) 300;       // requiere cast explícito (narrowing)"}, "flujo": {"resumen": "if/else, switch clásico vs switch expression, bucles for/while/do-while, pattern matching.", "puntos": ["El switch clásico (case: ...) tiene 'fall-through': la ejecución continúa al siguiente case si no hay 'break'.", "El switch expression (case -> ...) NO tiene fall-through, debe ser exhaustivo (cubrir todos los casos o tener default), y puede devolver un valor.", "'yield' se usa dentro de un bloque { } de un switch expression para devolver un valor cuando se necesita lógica adicional.", "Pattern matching for instanceof (obj instanceof Tipo variable) permite declarar y usar la variable convertida en el mismo condicional, evitando casts manuales.", "Las etiquetas (labels) en bucles anidados permiten que 'break' o 'continue' actúen sobre el bucle externo, no solo el interno.", "do-while siempre ejecuta el cuerpo al menos una vez, a diferencia de while que evalúa la condición antes de la primera ejecución."], "codigo": "String resultado = switch (dia) {\n    case LUNES, MARTES -> \"inicio de semana\";\n    case VIERNES -> {\n        yield \"casi fin de semana\";\n    }\n    default -> \"otro día\";\n};\n\nif (obj instanceof String texto && texto.length() > 0) {\n    System.out.println(texto.toUpperCase());\n}"}, "poo": {"resumen": "Clases, herencia, interfaces, records, clases selladas (sealed) y enums.", "puntos": ["Un record es una clase inmutable y concisa que genera automáticamente constructor, accessors, equals(), hashCode() y toString() basados en sus componentes.", "Los records son implícitamente 'final' y no pueden extender otra clase (aunque sí implementar interfaces).", "Un 'constructor compacto' en un record permite validar/normalizar los parámetros sin repetir la lista de parámetros ni las asignaciones.", "Las clases/interfaces 'sealed' restringen qué otras clases pueden extenderlas/implementarlas mediante 'permits'; las subclases deben ser final, sealed o non-sealed.", "Los métodos 'default' en interfaces permiten dar una implementación por defecto; si dos interfaces aportan el mismo método default, la clase implementadora debe resolver el conflicto sobrescribiéndolo.", "Los enums pueden tener campos, constructores (siempre privados) y métodos, incluyendo cuerpos de constante específicos.", "El polimorfismo en tiempo de ejecución (dynamic dispatch) determina qué método sobrescrito se ejecuta según el tipo REAL del objeto, no el tipo de la referencia."], "codigo": "public record Punto(int x, int y) {\n    public Punto {  // constructor compacto\n        if (x < 0 || y < 0) throw new IllegalArgumentException();\n    }\n}\n\npublic sealed interface Figura permits Circulo, Cuadrado {}\npublic final class Circulo implements Figura {}\npublic final class Cuadrado implements Figura {}"}, "excepciones": {"resumen": "Checked vs unchecked, try-catch-finally, try-with-resources, multi-catch, jerarquía Throwable.", "puntos": ["Throwable es la raíz de la jerarquía; se divide en Error (problemas graves, no se deben capturar normalmente) y Exception.", "Exception se divide en 'checked' (deben declararse con throws o capturarse, ej. IOException) y 'unchecked' / RuntimeException (no obligatorias, ej. NullPointerException).", "El bloque finally SIEMPRE se ejecuta (salvo System.exit() o caída de la JVM), incluso si hay return en try o catch. Un return dentro de finally sobrescribe cualquier valor de retorno anterior.", "try-with-resources cierra automáticamente los recursos que implementan AutoCloseable, en orden inverso a su declaración.", "En un multi-catch (Tipo1 | Tipo2 e), los tipos no pueden tener relación de herencia directa entre sí.", "Los bloques catch deben ordenarse de más específico a más general; un catch de una superclase antes que su subclase produce código inalcanzable (error de compilación)."], "codigo": "try (var recurso = new MiRecurso()) {\n    recurso.usar();\n} catch (IOException | SQLException e) {\n    System.out.println(\"Error: \" + e.getMessage());\n} finally {\n    System.out.println(\"Limpieza siempre ejecutada\");\n}"}, "colecciones": {"resumen": "Arrays, List, Set, Map, Deque y sus implementaciones principales.", "puntos": ["ArrayList: acceso O(1) por índice, ideal para lecturas frecuentes. LinkedList: inserciones/eliminaciones eficientes en los extremos, pero acceso O(n) por índice.", "HashSet/HashMap no garantizan orden. LinkedHashSet/LinkedHashMap preservan el orden de inserción. TreeSet/TreeMap mantienen orden natural (o el de un Comparator).", "List.of(), Set.of(), Map.of() crean colecciones INMUTABLES: cualquier modificación lanza UnsupportedOperationException.", "Modificar una colección mientras se itera con un Iterator externo (sin usar it.remove()) lanza ConcurrentModificationException.", "removeIf(), forEach() y las nuevas APIs funcionales de Collection simplifican operaciones comunes sin bucles explícitos.", "Map.merge(), compute(), computeIfAbsent() y computeIfPresent() permiten actualizar valores de forma concisa y segura."], "codigo": "List<Integer> lista = new ArrayList<>(List.of(1, 2, 3, 4, 5));\nlista.removeIf(n -> n % 2 == 0);   // [1, 3, 5]\n\nMap<String, Integer> mapa = new HashMap<>();\nmapa.merge(\"clave\", 1, Integer::sum); // suma si existe, inserta si no"}, "streams": {"resumen": "Stream API, operaciones intermedias/terminales, lambdas e interfaces funcionales.", "puntos": ["Un Stream es de un solo uso: tras una operación terminal (collect, forEach, count, reduce...), no puede reutilizarse.", "Operaciones intermedias (filter, map, sorted, distinct, limit) son perezosas: no se ejecutan hasta que se invoca una operación terminal.", "map() transforma 1 a 1; flatMap() se usa cuando cada elemento produce su propio stream, y los combina ('aplana') en uno solo.", "Interfaces funcionales clave: Predicate<T> (test), Function<T,R> (apply), Consumer<T> (accept), Supplier<T> (get), BinaryOperator<T> (apply con dos args del mismo tipo).", "Collectors.groupingBy() agrupa elementos por una clave; Collectors.partitioningBy() divide en dos grupos (true/false) según un predicado.", "Los streams primitivos (IntStream, LongStream, DoubleStream) evitan el overhead de autoboxing y ofrecen métodos como sum(), average(), range(), rangeClosed()."], "codigo": "List<String> nombres = List.of(\"Ana\", \"Bruno\", \"Carla\", \"Ana\");\nMap<Integer, List<String>> porLongitud = nombres.stream()\n    .distinct()\n    .collect(Collectors.groupingBy(String::length));\n\nint total = IntStream.rangeClosed(1, 10).sum();"}, "concurrencia": {"resumen": "Thread, Runnable, ExecutorService, synchronized, clases atómicas.", "puntos": ["Un Thread solo puede iniciarse una vez con start(); llamarlo de nuevo lanza IllegalThreadStateException.", "ExecutorService gestiona un pool de hilos reutilizables; shutdown() espera a que terminen las tareas enviadas, shutdownNow() intenta detenerlas de inmediato.", "Callable<V> (call() devuelve V y puede lanzar excepciones checked) se usa con submit(), que devuelve un Future<V>; future.get() bloquea hasta obtener el resultado.", "'synchronized' en un método o bloque asegura exclusión mutua usando el monitor del objeto, evitando condiciones de carrera (race conditions).", "Las clases Atomic* (AtomicInteger, AtomicLong, etc.) ofrecen operaciones thread-safe sin bloqueos explícitos, usando operaciones a nivel de hardware (CAS).", "Un deadlock ocurre cuando dos o más hilos se bloquean mutuamente esperando recursos retenidos por el otro."], "codigo": "ExecutorService executor = Executors.newFixedThreadPool(4);\nFuture<Integer> resultado = executor.submit(() -> 2 + 2);\nSystem.out.println(resultado.get());\nexecutor.shutdown();\n\nAtomicInteger contador = new AtomicInteger(0);\ncontador.incrementAndGet();"}, "io": {"resumen": "Path, Files, streams de E/S, serialización.", "puntos": ["La API NIO.2 (java.nio.file) usa Path y la clase utilitaria Files para operaciones modernas de archivos (copiar, mover, leer, escribir, recorrer directorios).", "Files.readAllLines() carga todo en memoria; Files.lines() devuelve un Stream perezoso, más adecuado para archivos grandes.", "El patrón decorador es central en la E/S clásica: clases como BufferedReader/BufferedWriter envuelven a otros Reader/Writer para añadir funcionalidad (buffering).", "Para serializar un objeto con ObjectOutputStream, su clase debe implementar Serializable; el modificador 'transient' excluye un campo de la serialización.", "Files.walk() recorre recursivamente un árbol de directorios devolviendo un Stream<Path>."], "codigo": "Path ruta = Path.of(\"datos\", \"archivo.txt\");\ntry (Stream<String> lineas = Files.lines(ruta)) {\n    lineas.filter(l -> !l.isBlank()).forEach(System.out::println);\n}"}, "jdbc": {"resumen": "Connection, Statement/PreparedStatement, ResultSet, transacciones.", "puntos": ["DriverManager.getConnection(url, usuario, clave) establece la conexión eligiendo el driver adecuado según el prefijo de la URL.", "PreparedStatement usa parámetros vinculados ('?'), previniendo inyección SQL y permitiendo reutilizar el plan de ejecución.", "ResultSet.next() avanza el cursor y devuelve true/false según si hay más filas disponibles.", "Desactivar autoCommit (setAutoCommit(false)) permite agrupar varias operaciones en una transacción, confirmándolas con commit() o revirtiéndolas con rollback().", "CallableStatement se usa específicamente para invocar procedimientos almacenados.", "addBatch()/executeBatch() agrupan múltiples sentencias para reducir los viajes de red y mejorar el rendimiento en operaciones masivas."], "codigo": "try (Connection conn = DriverManager.getConnection(url, user, pass);\n     PreparedStatement ps = conn.prepareStatement(\n         \"SELECT nombre FROM usuarios WHERE id = ?\")) {\n    ps.setInt(1, 5);\n    try (ResultSet rs = ps.executeQuery()) {\n        while (rs.next()) System.out.println(rs.getString(\"nombre\"));\n    }\n}"}, "seguridad": {"resumen": "Inmutabilidad, encapsulación, validación de entradas, buenas prácticas.", "puntos": ["La inmutabilidad (campos private final, clase final, sin setters) reduce la superficie de ataque y facilita el razonamiento sobre el estado del objeto.", "Usar tipos genéricos específicos (List<String>) en lugar de raw types (List) traslada errores de tipo al tiempo de compilación.", "Validar entradas (nulos, vacíos, rangos) antes de procesarlas evita comportamientos indebidos y posibles vulnerabilidades.", "Encapsular el estado con campos privados y exponer solo lo necesario mediante métodos controlados evita modificaciones no autorizadas.", "try-with-resources reduce el riesgo de fugas de recursos frente al cierre manual en finally."], "codigo": "public final class ConfiguracionSegura {\n    private final String host;\n    public ConfiguracionSegura(String host) {\n        if (host == null || host.isBlank())\n            throw new IllegalArgumentException(\"host inválido\");\n        this.host = host;\n    }\n    public String getHost() { return host; }\n}"}, "modulos": {"resumen": "Java Platform Module System (JPMS): module-info.java, exports, requires, opens.", "puntos": ["'module nombre { }' declara un módulo en el archivo module-info.java, ubicado en la raíz del código fuente.", "'requires modulo' declara una dependencia; 'requires transitive modulo' propaga esa dependencia a quien dependa del módulo actual.", "'exports paquete' hace público un paquete para otros módulos; sin 'exports', el paquete queda fuertemente encapsulado aunque sus clases sean públicas.", "'opens paquete to modulo' permite acceso por reflexión profunda (usado por frameworks) solo al módulo indicado.", "El 'módulo no nombrado' agrupa el código tradicional del classpath que no declara module-info.java.", "'provides Interfaz with Implementacion' junto con 'uses Interfaz' habilita el patrón Service Provider mediante ServiceLoader."], "codigo": "module com.miapp.core {\n    requires java.sql;\n    requires transitive com.miapp.util;\n    exports com.miapp.core.servicios;\n    opens com.miapp.core.modelo to com.miapp.persistencia;\n}"}};
const NAV = [{"id": "fundamentos", "nombre": "1. Bloques básicos de Java (variables, tipos, texto)"}, {"id": "flujo", "nombre": "2. Control de flujo (if, switch, bucles, pattern matching)"}, {"id": "poo", "nombre": "3. Programación orientada a objetos (clases, herencia, records, sealed)"}, {"id": "excepciones", "nombre": "4. Manejo de excepciones"}, {"id": "colecciones", "nombre": "5. Arrays y Collections Framework"}, {"id": "streams", "nombre": "6. Java Stream API y expresiones lambda"}, {"id": "concurrencia", "nombre": "7. Concurrencia"}, {"id": "io", "nombre": "8. Java I/O y NIO.2"}, {"id": "jdbc", "nombre": "9. JDBC (Java Database Connectivity)"}, {"id": "seguridad", "nombre": "10. Código seguro (secure coding)"}, {"id": "modulos", "nombre": "11. Aplicaciones modulares (JPMS)"}];

let mode = 'guia';
let currentCatId = NAV[0].id;

// ---------- Utilidades ----------
function highlightCode(code){
  let c = code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  c = c.replace(/(".*?")/g, '<span class="str">$1</span>');
  c = c.replace(/\/\/.*$/gm, m => '<span class="cmt">'+m+'</span>');
  const kws = ['public','private','protected','class','interface','record','sealed','permits',
    'implements','extends','static','final','void','new','return','if','else','for','while','do',
    'switch','case','default','break','continue','try','catch','finally','throw','throws','var',
    'this','super','enum','abstract','synchronized','transient','yield','requires','exports',
    'opens','module','provides','with','uses','transitive','to','instanceof'];
  const typs = ['String','Integer','Object','List','Map','Set','Optional','Stream','IntStream',
    'ArrayList','HashMap','HashSet','TreeSet','TreeMap','LinkedHashMap','Path','Files','Thread',
    'ExecutorService','Executors','Future','Callable','Runnable','AtomicInteger','Connection',
    'PreparedStatement','ResultSet','DriverManager','ConfiguracionSegura','Punto','Figura',
    'Circulo','Cuadrado','MiRecurso','Collectors','ArrayDeque','BinaryOperator'];
  kws.forEach(k => { c = c.replace(new RegExp('\\b'+k+'\\b','g'), '<span class="kw">'+k+'</span>'); });
  typs.forEach(t => { c = c.replace(new RegExp('\\b'+t+'\\b','g'), '<span class="typ">'+t+'</span>'); });
  return c;
}

// ---------- Navegación lateral ----------
function renderNav(){
  const navList = document.getElementById('navList');
  navList.innerHTML = '';
  NAV.forEach((cat, i) => {
    const li = document.createElement('li');
    li.className = 'nav-item' + (cat.id === currentCatId && mode==='guia' ? ' active' : '');
    li.innerHTML = `<span class="nav-num">${String(i+1).padStart(2,'0')}</span><span>${cat.nombre.replace(/^\d+\.\s*/, '')}</span>`;
    li.onclick = () => {
      if(mode === 'guia'){
        currentCatId = cat.id;
        renderGuia();
        renderNav();
      } else {
        document.getElementById('catFilter').value = cat.id;
        loadQuiz(cat.id);
      }
    };
    navList.appendChild(li);
  });
  document.getElementById('navLabel').textContent = mode === 'guia' ? 'Dominios del examen' : 'Ir a categoría';
}

// ---------- Vista Guía ----------
function renderGuia(){
  const cat = NAV.find(c => c.id === currentCatId);
  const g = GUIA[currentCatId];
  document.getElementById('guiaTitulo').textContent = cat.nombre.replace(/^\d+\.\s*/, '');
  document.getElementById('guiaSubtitulo').textContent = g.resumen;

  const puntosHtml = g.puntos.map(p => `<li>${p}</li>`).join('');
  const html = `
    <div class="term">
      <div class="term-bar">
        <span class="term-dot" style="background:#F0625A"></span>
        <span class="term-dot" style="background:#ED8B00"></span>
        <span class="term-dot" style="background:#3FB950"></span>
        <span class="title">notas.md</span>
      </div>
      <div class="term-body">
        <ul class="concept-list">${puntosHtml}</ul>
      </div>
    </div>
    <div class="term">
      <div class="term-bar">
        <span class="term-dot" style="background:#F0625A"></span>
        <span class="term-dot" style="background:#ED8B00"></span>
        <span class="term-dot" style="background:#3FB950"></span>
        <span class="title">Ejemplo.java</span>
      </div>
      <div class="term-body">
        <pre class="code">${highlightCode(g.codigo)}</pre>
      </div>
    </div>
  `;
  document.getElementById('guiaContent').innerHTML = html;
}

// ---------- Vista Quiz ----------
let quizQuestions = [];
let quizIndex = 0;
let quizScore = 0;
let quizAnswered = [];

function buildCatFilter(){
  const sel = document.getElementById('catFilter');
  const totalPreguntas = QUIZ_DATA.reduce((acc, c) => acc + c.preguntas.length, 0);
  document.getElementById('quizSubtitle').textContent = `${totalPreguntas} preguntas originales tipo test · elige categoría y cantidad, luego presiona Comenzar`;
  sel.innerHTML = `<option value="__all__">Todas las categorías (${totalPreguntas} preguntas)</option>` +
    NAV.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
  sel.onchange = () => loadQuiz(sel.value);
  document.getElementById('countFilter').onchange = () => loadQuiz(sel.value);
}

function shuffle(arr){
  for(let i = arr.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getSelectedCount(){
  const val = document.getElementById('countFilter').value;
  return val === 'all' ? Infinity : parseInt(val, 10);
}

function startQuiz(){
  loadQuiz(document.getElementById('catFilter').value);
}

function shuffleQuestionOptions(p){
  const indices = shuffle(p.opciones.map((_, i) => i));
  const nuevasOpciones = indices.map(i => p.opciones[i]);
  const nuevaCorrecta = indices.indexOf(p.correcta);
  return { ...p, opciones: nuevasOpciones, correcta: nuevaCorrecta };
}

function loadQuiz(catId){
  let pool;
  if(catId === '__all__'){
    pool = [];
    QUIZ_DATA.forEach(cat => {
      cat.preguntas.forEach(p => pool.push({...p, categoria: cat.nombre}));
    });
  } else {
    const cat = QUIZ_DATA.find(c => c.id === catId);
    pool = cat.preguntas.map(p => ({...p, categoria: cat.nombre}));
  }
  const count = getSelectedCount();
  const mezclado = shuffle(pool.slice());
  const seleccionadas = Number.isFinite(count) ? mezclado.slice(0, Math.min(count, mezclado.length)) : mezclado;
  quizQuestions = seleccionadas.map(shuffleQuestionOptions);
  quizIndex = 0;
  quizScore = 0;
  quizAnswered = new Array(quizQuestions.length).fill(null);
  document.getElementById('resultsArea').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  renderQuestion();
}

function updateProgress(){
  const total = quizQuestions.length;
  const answeredCount = quizAnswered.filter(a => a !== null).length;
  document.getElementById('progressFill').style.width = (answeredCount/total*100)+'%';
  document.getElementById('progressText').textContent = `${quizIndex+1} / ${total}`;
  document.getElementById('scorePill').textContent = `✔ ${quizScore} aciertos`;
}

function renderQuestion(){
  const q = quizQuestions[quizIndex];
  const letras = ['A','B','C','D','E','F'];
  const already = quizAnswered[quizIndex];

  let codeHtml = '';
  if(q.codigo){
    codeHtml = `<pre class="code">${highlightCode(q.codigo)}</pre>`;
  }

  const optsHtml = q.opciones.map((op, i) => {
    let cls = 'opt';
    if(already !== null){
      cls += ' disabled';
      if(i === q.correcta) cls += ' correct';
      else if(i === already && already !== q.correcta) cls += ' incorrect';
    }
    return `<div class="${cls}" data-idx="${i}" onclick="answerQuestion(${i})">
      <span class="letter">${letras[i]}</span><span>${op}</span>
    </div>`;
  }).join('');

  const explHtml = already !== null
    ? `<div class="explanation show"><b>Explicación:</b> ${q.explicacion}</div>`
    : `<div class="explanation"></div>`;

  document.getElementById('quizArea').innerHTML = `
    <div class="term">
      <div class="term-bar">
        <span class="term-dot" style="background:#F0625A"></span>
        <span class="term-dot" style="background:#ED8B00"></span>
        <span class="term-dot" style="background:#3FB950"></span>
        <span class="title">Pregunta ${quizIndex+1}.java</span>
      </div>
      <div class="term-body">
        <span class="q-tag">${q.categoria.replace(/^\d+\.\s*/, '')}</span>
        <p class="q-text">${q.enunciado}</p>
        ${codeHtml}
        <div style="margin-top:14px;">${optsHtml}</div>
        ${explHtml}
      </div>
    </div>
    <div class="quiz-nav">
      <button class="btn" id="prevBtn" onclick="prevQuestion()" ${quizIndex===0?'disabled':''}>&larr; Anterior</button>
      <button class="btn primary" id="nextBtn" onclick="nextQuestion()">${quizIndex===quizQuestions.length-1 ? 'Ver resultados' : 'Siguiente →'}</button>
    </div>
  `;
  updateProgress();
}

function answerQuestion(idx){
  if(quizAnswered[quizIndex] !== null) return;
  const q = quizQuestions[quizIndex];
  quizAnswered[quizIndex] = idx;
  if(idx === q.correcta) quizScore++;
  renderQuestion();
}

function nextQuestion(){
  if(quizIndex < quizQuestions.length - 1){
    quizIndex++;
    renderQuestion();
  } else {
    showResults();
  }
}
function prevQuestion(){
  if(quizIndex > 0){
    quizIndex--;
    renderQuestion();
  }
}

function showResults(){
  document.getElementById('quizArea').classList.add('hidden');
  const total = quizQuestions.length;
  const pct = Math.round(quizScore/total*100);
  let msg = 'Sigue practicando, ¡vas por buen camino!';
  if(pct >= 80) msg = '¡Excelente! Nivel de aprobación típico del examen real.';
  else if(pct >= 60) msg = 'Buen resultado, repasa las categorías con más fallos.';
  document.getElementById('resultsArea').innerHTML = `
    <div class="term">
      <div class="term-bar">
        <span class="term-dot" style="background:#F0625A"></span>
        <span class="term-dot" style="background:#ED8B00"></span>
        <span class="term-dot" style="background:#3FB950"></span>
        <span class="title">resultado.log</span>
      </div>
      <div class="term-body results-card">
        <div style="font-family:var(--mono); color:var(--text-dim); font-size:12px;">PUNTAJE FINAL</div>
        <div class="results-score">${quizScore} / ${total}</div>
        <div style="color:var(--text-dim); margin-bottom:20px;">${pct}% de aciertos — ${msg}</div>
        <button class="btn primary" onclick="loadQuiz(document.getElementById('catFilter').value)">Reintentar</button>
      </div>
    </div>
  `;
  document.getElementById('resultsArea').classList.remove('hidden');
}

// ---------- Cambio de modo ----------
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    document.getElementById('viewGuia').classList.toggle('hidden', mode !== 'guia');
    document.getElementById('viewQuiz').classList.toggle('hidden', mode !== 'quiz');
    renderNav();
    if(mode === 'quiz' && quizQuestions.length === 0){
      loadQuiz('__all__');
    }
  };
});

// ---------- Init ----------
renderNav();
renderGuia();
buildCatFilter();
</script>
</body>
</html>
