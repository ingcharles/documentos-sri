<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario OCP Java SE 17 + Oracle SQL/PLSQL</title>
<style>
:root{
  --bg:#0f1115; --panel:#161a22; --panel2:#1c212b; --border:#2a303c;
  --text:#e7e9ee; --muted:#9aa3b2; --accent:#4f8cff; --accent2:#7c5cff;
  --good:#33c17a; --bad:#ef5a5a; --warn:#e8a33d;
  --mono:'SF Mono',Consolas,'Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5}
#app{max-width:960px;margin:0 auto;padding:24px 20px 80px}
h1{font-size:22px;font-weight:600;margin:0 0 4px}
h1 span{color:var(--accent)}
.subtitle{color:var(--muted);font-size:14px;margin:0 0 28px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px}
.card h2{font-size:16px;margin:0 0 14px;display:flex;align-items:center;gap:8px}
.badge{display:inline-block;background:var(--panel2);border:1px solid var(--border);border-radius:100px;padding:2px 10px;font-size:12px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.chip{position:relative}
.chip input{position:absolute;opacity:0;inset:0;cursor:pointer;width:100%;height:100%;margin:0}
.chip label{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:.15s;font-size:14px}
.chip input:checked + label{border-color:var(--accent);background:rgba(79,140,255,.12)}
.chip label .cnt{margin-left:auto;color:var(--muted);font-size:12px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pillbtn{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;transition:.15s}
.pillbtn:hover{border-color:var(--accent)}
.pillbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
select,input[type=number]{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:14px}
.qty-input{width:90px}
.startbtn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-weight:600;font-size:15px;padding:14px 28px;border-radius:10px;cursor:pointer;width:100%;margin-top:6px}
.startbtn:disabled{opacity:.4;cursor:not-allowed}
.progress-wrap{background:var(--panel2);border-radius:100px;height:8px;overflow:hidden;margin-bottom:18px}
.progress-bar{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;transition:width .3s}
.qmeta{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:13px;margin-bottom:10px}
.qtext{font-size:16px;margin:0 0 14px;font-weight:500}
pre.code{background:#0a0c10;border:1px solid var(--border);border-radius:10px;padding:14px 16px;overflow-x:auto;font-family:var(--mono);font-size:13px;line-height:1.6;margin:0 0 16px;color:#c9d4e3}
.opts{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.opt{position:relative}
.opt input{position:absolute;opacity:0}
.opt label{display:flex;gap:12px;align-items:flex-start;background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;cursor:pointer;font-size:14px;transition:.15s}
.opt label:hover{border-color:var(--accent)}
.opt .letter{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px}
.opt.correct label{border-color:var(--good);background:rgba(51,193,122,.1)}
.opt.correct .letter{background:var(--good);color:#04170d}
.opt.incorrect label{border-color:var(--bad);background:rgba(239,90,90,.1)}
.opt.incorrect .letter{background:var(--bad);color:#2a0808}
.opt.disabled label{cursor:default}
.feedback{border-radius:10px;padding:14px 16px;font-size:13.5px;margin-bottom:16px;border:1px solid}
.feedback.ok{background:rgba(51,193,122,.08);border-color:var(--good);color:#bdf0d4}
.feedback.bad{background:rgba(239,90,90,.08);border-color:var(--bad);color:#f6c9c9}
.navrow{display:flex;justify-content:space-between;gap:10px}
.navbtn{background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:11px 20px;border-radius:9px;cursor:pointer;font-size:14px;font-weight:500}
.navbtn.primary{background:var(--accent);border-color:var(--accent)}
.navbtn:disabled{opacity:.35;cursor:not-allowed}
.hidden{display:none !important}
.scoregrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:18px 0}
.scorecard{background:var(--panel2);border-radius:10px;padding:16px;text-align:center}
.scorecard .num{font-size:26px;font-weight:700}
.scorecard .lbl{font-size:12px;color:var(--muted);margin-top:4px}
.reviewitem{border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.reviewitem.wrong{border-left:3px solid var(--bad)}
.reviewitem.right{border-left:3px solid var(--good)}
.small{font-size:12px;color:var(--muted)}
a.linkbtn{color:var(--accent);cursor:pointer;text-decoration:underline;font-size:13px}
.catlabel{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);background:var(--panel2);padding:3px 8px;border-radius:5px}
</style>
</head>

{"c":"oop","s":"T","w":3,"q":"¿Qué debe ser la PRIMERA sentencia de un constructor?","o":["super() o this(), explícito o implícito","Cualquier sentencia, siempre que compile","Una asignación de campos antes que todo","return, si el constructor termina temprano"],"a":0,"f":"Todo constructor inicia con una llamada a otro constructor: this(...) al de la misma clase o super(...) al del padre; si no se escribe, el compilador inserta super()."},
{"c":"oop","s":"P","w":4,"q":"¿Por qué NO compila?","k":"class Base {\n    Base(int x) { }\n}\nclass Derived extends Base {\n    Derived() { System.out.println(\"D\"); }\n}","o":["Base debe ser public para permitir la herencia","El compilador inserta super() pero Base no tiene constructor sin argumentos","Sí compila, porque Java genera un constructor vacío igual","Derived debe declararse abstract para heredar de Base"],"a":1,"f":"Al definir Base(int), se pierde el constructor por defecto; Derived() intenta super() implícito y falla. Debe llamarse super(algúnInt) explícitamente."},
{"c":"oop","s":"T","w":2,"q":"¿Puede una clase abstracta tener constructor?","o":["Solo si el constructor se declara public explícitamente","Solo si la clase no declara ningún método abstracto","No, nunca: las clases abstractas no admiten constructores","Sí, lo invocan los constructores de las subclases"],"a":3,"f":"Las clases abstractas no se instancian directamente, pero sus constructores se ejecutan en la cadena de construcción de las subclases."},
{"c":"oop","s":"P","w":3,"q":"¿Qué imprime?","k":"abstract class Shape {\n    abstract double area();\n    void print() { System.out.println(area()); }\n}\nclass Square extends Shape {\n    double area() { return 4.0; }\n}\n// ...\nnew Square().print();","o":["AbstractMethodError","4.0","0.0","No compila"],"a":1,"f":"Patrón template method: la clase abstracta invoca el método abstracto que la subclase concreta implementa."},
{"c":"oop","s":"T","w":3,"q":"¿Qué combinación de modificadores es ilegal en un método?","o":["private static","public static","abstract final","protected final"],"a":2,"f":"abstract exige ser sobreescrito y final lo prohíbe: contradicción. Igualmente ilegales: abstract private y abstract static."},
{"c":"oop","s":"T","w":3,"q":"En Java 17, ¿qué tipos de miembros puede tener una interfaz?","o":["Abstractos y campos de instancia mutables","Solo default y static, sin abstractos","Solo métodos abstractos, como antes de Java 8","Abstractos, default, static, private y constantes"],"a":3,"f":"Desde Java 9 las interfaces admiten métodos private (helpers para defaults); los campos son siempre public static final implícitos."},
{"c":"oop","s":"P","w":4,"q":"¿Qué imprime?","k":"interface A { default String who() { return \"A\"; } }\ninterface B { default String who() { return \"B\"; } }\nclass C implements A, B {\n    public String who() { return A.super.who() + B.super.who(); }\n}\n// ...\nSystem.out.println(new C().who());","o":["No compila","AB","A","B"],"a":1,"f":"Ante el conflicto de defaults, la clase DEBE sobreescribir; la sintaxis Interfaz.super.metodo() invoca la versión específica de cada interfaz."},
{"c":"oop","s":"T","w":3,"q":"Si una clase hereda un método concreto de una superclase y un default idéntico de una interfaz, ¿cuál gana?","o":["El más específico en orden de declaración","El default de la interfaz","Error de compilación","El de la superclase"],"a":3,"f":"Regla de resolución: la clase siempre gana sobre la interfaz; los defaults solo aplican cuando no hay implementación heredada de clase."},
{"c":"oop","s":"P","w":3,"q":"¿Cuál es el resultado?","k":"interface Movable {\n    int SPEED = 10;\n}\nclass Car implements Movable {\n    void boost() { SPEED = 20; }\n}","o":["Compila y SPEED pasa a valer 20 en Car","No compila: SPEED es implícitamente final","Compila, pero con un warning del compilador","Excepción en tiempo de ejecución al asignar"],"a":1,"f":"Todo campo de interfaz es public static final implícito; reasignarlo es error de compilación."},
{"c":"oop","s":"T","w":2,"q":"¿Qué genera automáticamente un record?","o":["Un builder interno para construcción fluida","Solo el constructor canónico, sin nada más","Constructor canónico, accessors, equals, hashCode y toString","Setters y getters para cada componente"],"a":2,"f":"El record deriva todo de sus componentes; no genera setters porque sus campos son final: es una clase portadora de datos inmutable."},
{"c":"oop","s":"P","w":4,"q":"¿Qué imprime?","k":"record Point(int x, int y) {\n    Point {\n        if (x < 0) x = 0;\n    }\n}\n// ...\nSystem.out.println(new Point(-5, 3).x());","o":["0","No compila: x es final","-5","3"],"a":0,"f":"El constructor compacto permite validar/normalizar los parámetros ANTES de la asignación implícita a los campos; reasignar el parámetro x es legal ahí."},
{"c":"oop","s":"T","w":3,"q":"¿Qué NO puede hacer un record?","o":["Declarar constructores adicionales","Extender otra clase","Declarar métodos estáticos","Implementar interfaces"],"a":1,"f":"Todo record extiende implícitamente java.lang.Record, y Java no permite herencia múltiple de clases. Sí puede implementar interfaces y añadir métodos."},
{"c":"oop","s":"P","w":3,"q":"¿Qué imprime?","k":"record User(String name) {}\n// ...\nvar u1 = new User(\"Ana\");\nvar u2 = new User(\"Ana\");\nSystem.out.println(u1 == u2);\nSystem.out.println(u1.equals(u2));","o":["true true","true false","false false","false true"],"a":3,"f":"Los records generan equals por valor de componentes, pero siguen siendo objetos distintos en memoria: == compara referencias."},
{"c":"oop","s":"T","w":3,"q":"¿Qué exige sealed sobre sus subclases permitidas?","o":["Que sean final, sealed o non-sealed","Nada adicional","Que estén en otro módulo","Que sean abstractas"],"a":0,"f":"Cada subtipo permitido debe declarar cómo continúa la jerarquía: la cierra (final), la restringe (sealed) o la reabre (non-sealed)."},
{"c":"oop","s":"P","w":4,"q":"¿Cuál es el resultado?","k":"sealed interface Shape permits Circle, Square {}\nrecord Circle(double r) implements Shape {}\nrecord Square(double side) implements Shape {}\nrecord Triangle(double b) implements Shape {}","o":["No compila: Triangle no está en permits","Compila con warning","Compila","No compila: los records no implementan sealed interfaces"],"a":0,"f":"Solo los tipos listados en permits pueden implementar la interfaz sellada. Los records son implícitamente final, por lo que encajan sin modificador extra."},
{"c":"oop","s":"T","w":3,"q":"Si las subclases de una clase sealed están en el mismo archivo, ¿es obligatoria la cláusula permits?","o":["No, el compilador las infiere","Solo si hay más de dos","Sí, siempre","Solo en módulos"],"a":0,"f":"Cuando todos los subtipos residen en el mismo archivo fuente, permits puede omitirse y se infiere."},
{"c":"oop","s":"P","w":3,"q":"¿Qué imprime?","k":"enum Level {\n    LOW, MID, HIGH;\n}\n// ...\nSystem.out.println(Level.valueOf(\"MID\").ordinal());","o":["MID","0","2","1"],"a":3,"f":"ordinal() devuelve la posición de declaración empezando en 0: LOW=0, MID=1. No dependa de ordinal para lógica de negocio."},
{"c":"oop","s":"P","w":4,"q":"¿Qué imprime?","k":"enum Op {\n    ADD { int apply(int a, int b) { return a + b; } },\n    MUL { int apply(int a, int b) { return a * b; } };\n    abstract int apply(int a, int b);\n}\n// ...\nSystem.out.println(Op.MUL.apply(3, 4));","o":["12","IllegalStateException","7","No compila"],"a":0,"f":"Cada constante puede aportar su propio cuerpo (constant-specific body) implementando el método abstracto del enum: MUL multiplica."},
{"c":"oop","s":"T","w":3,"q":"¿Cuándo se ejecuta el constructor de un enum?","o":["Cada vez que se referencia una constante","Una vez por constante, al cargar la clase","Al llamar values()","Nunca: los enums no tienen constructor"],"a":1,"f":"Las constantes se instancian una única vez durante la inicialización de la clase; el constructor es implícitamente private."},
{"c":"oop","s":"P","w":3,"q":"¿Cuál es el resultado?","k":"class Outer {\n    private int x = 10;\n    class Inner {\n        int getX() { return x; }\n    }\n}\n// ...\nOuter o = new Outer();\nOuter.Inner i = o.new Inner();\nSystem.out.println(i.getX());","o":["0","No compila","NullPointerException","10"],"a":3,"f":"La inner class (no estática) guarda una referencia implícita a su instancia externa y accede a sus miembros privados; se instancia con la sintaxis o.new Inner()."},
{"c":"oop","s":"T","w":3,"q":"¿Qué variables locales puede capturar una clase anónima o lambda?","o":["Solo final o efectivamente final","Solo variables de tipo primitivo, nunca objetos","Cualquiera, sin restricciones de reasignación","Solo variables static de la clase contenedora"],"a":0,"f":"La captura copia el valor; permitir reasignación crearía inconsistencias entre la copia y la variable. Por eso deben ser efectivamente finales."},
{"c":"oop","s":"T","w":2,"q":"¿Qué relación modela mejor la composición frente a la herencia?","o":["\"usa-un\" temporal","\"tiene-un\" (has-a)","No hay diferencia","\"es-un\" (is-a)"],"a":1,"f":"La composición (has-a) delega en objetos contenidos y reduce el acoplamiento; la herencia modela is-a y expone al hijo a los cambios del padre."},
{"c":"oop","s":"P","w":4,"q":"¿Qué imprime?","k":"class Animal {}\nclass Dog extends Animal {}\n// ...\nAnimal a = new Animal();\nDog d = (Dog) a;\nSystem.out.println(\"ok\");","o":["ClassCastException en runtime","No compila por el cast entre tipos relacionados","ok, porque el cast siempre es válido en compilación","null, ya que Dog nunca se llega a construir"],"a":0,"f":"El downcast compila (la relación existe en la jerarquía) pero falla en runtime porque el objeto real es Animal, no Dog. Proteja con instanceof."},
{"c":"oop","s":"P","w":3,"q":"¿Qué imprime?","k":"Object o = \"text\";\nif (o instanceof Integer i)\n    System.out.println(i + 1);\nelse\n    System.out.println(\"no match\");","o":["ClassCastException","no match","1","No compila"],"a":1,"f":"instanceof con patrón devuelve false sin lanzar excepción cuando el tipo real no coincide; String no es Integer."},
{"c":"oop","s":"T","w":3,"q":"¿Qué imprime getClass() en una referencia polimórfica Padre p = new Hijo()?","o":["class Padre","class Object","Depende del compilador","class Hijo"],"a":3,"f":"getClass() es resuelto en runtime y devuelve la clase real del objeto instanciado, no el tipo declarado de la referencia."}

{"c":"oop","s":"T","w":3,"q":"¿Qué diferencia una sobrecarga (overload) de una sobreescritura (override)?","o":["Override solo aplica a métodos static","Overload: misma firma en clases distintas; override: firmas distintas","Son sinónimos","Overload: mismo nombre con parámetros distintos en la misma clase"],"a":3,"f":"La sobrecarga se resuelve en compilación por los tipos de argumentos; la sobreescritura en runtime por el tipo real del objeto."},
{"c":"oop","s":"P","w":4,"q":"¿Qué método se invoca?","k":"void call(Object o) { System.out.print(\"Object\"); }\nvoid call(String s) { System.out.print(\"String\"); }\nvoid call(Integer i) { System.out.print(\"Integer\"); }\n// ...\ncall(null);","o":["String, por ser el tipo más específico","Integer, por autoboxing del argumento null","Object, como sobrecarga más genérica","No compila: llamada ambigua"],"a":3,"f":"Con null el compilador elige la sobrecarga MÁS específica; String e Integer no se relacionan entre sí, así que hay ambigüedad y no compila. Con solo Object y String, ganaría String."},
{"c":"oop","s":"P","w":4,"q":"¿Qué imprime?","k":"void go(int i) { System.out.print(\"int\"); }\nvoid go(long l) { System.out.print(\"long\"); }\nvoid go(Integer i) { System.out.print(\"Integer\"); }\nvoid go(int... i) { System.out.print(\"varargs\"); }\n// ...\nshort s = 5;\ngo(s);","o":["Integer","varargs","int","long"],"a":2,"f":"Orden de resolución: widening primitivo (short→int) gana sobre widening a long, autoboxing y varargs. La opción exacta o la promoción más cercana siempre precede al boxing."},
{"c":"oop","s":"T","w":3,"q":"¿Cuál es el orden de inicialización al instanciar una subclase?","o":["Instancia del hijo, constructor hijo y recién después el padre completo","Constructor hijo, luego constructor padre, luego los estáticos","Aleatorio según la JVM y el recolector de basura activo","Estáticos del padre, estáticos del hijo, instancia del padre, constructor padre, instancia del hijo, constructor hijo"],"a":3,"f":"Los bloques/campos estáticos corren una sola vez (padre antes que hijo); luego, por instancia: inicializadores+constructor del padre y después los del hijo."},
{"c":"oop","s":"P","w":5,"q":"¿Qué imprime?","k":"class A {\n    static { System.out.print(\"1\"); }\n    { System.out.print(\"2\"); }\n    A() { System.out.print(\"3\"); }\n}\nclass B extends A {\n    static { System.out.print(\"4\"); }\n    { System.out.print(\"5\"); }\n    B() { System.out.print(\"6\"); }\n}\n// ...\nnew B(); new B();","o":["142356 142356","145236 145236","142356 2356","145236 2356"],"a":2,"f":"Primera instancia: estáticos 1,4 (una sola vez), luego 2,3 (padre) y 5,6 (hijo) = 142356. Segunda: solo 2356."},
{"c":"oop","s":"T","w":2,"q":"¿Qué método de Object debe sobreescribirse junto con equals()?","o":["clone()","toString()","finalize()","hashCode()"],"a":3,"f":"Romper la consistencia equals/hashCode hace que las colecciones hash no encuentren objetos lógicamente iguales."},
{"c":"oop","s":"P","w":4,"q":"¿Este equals es una sobreescritura válida?","k":"class Point {\n    int x;\n    public boolean equals(Point p) {\n        return this.x == p.x;\n    }\n}","o":["No: es una sobrecarga","Sí, pero solo con @Override","Sí, sobreescribe Object.equals","No compila"],"a":0,"f":"La firma correcta es equals(Object); equals(Point) es un método distinto (overload) y las colecciones seguirán usando el equals de identidad. @Override habría detectado el error."},
{"c":"oop","s":"T","w":3,"q":"¿Qué garantiza la anotación @Override?","o":["Error de compilación si no se sobreescribe realmente un método del supertipo","Que el método pase a ser final automáticamente","Visibilidad public forzada sobre el método anotado","Mejor rendimiento en tiempo de ejecución"],"a":0,"f":"Es una verificación de compilación contra errores de firma (typos, parámetros incorrectos); no cambia el comportamiento en runtime."},
{"c":"oop","s":"P","w":3,"q":"¿Cuál es el resultado?","k":"class Parent {\n    protected void greet() {}\n}\nclass Child extends Parent {\n    private void greet() {}\n}","o":["Compila sin ninguna advertencia del compilador","Compila, pero con un warning de acceso","No compila: no se puede reducir la visibilidad al sobreescribir","Depende del paquete donde se declare Child"],"a":2,"f":"La sobreescritura debe mantener o ampliar el acceso (protected → protected/public); reducirlo rompería el polimorfismo."},
{"c":"oop","s":"T","w":2,"q":"¿Qué es una clase final?","o":["Una clase sin constructores","Una clase inmutable","Una clase abstracta terminada","Una clase que no puede ser extendida"],"a":3,"f":"final en la clase prohíbe subclases (como String); no implica inmutabilidad de su estado por sí solo."},
{"c":"oop","s":"T","w":4,"q":"¿Qué requisitos definen una clase inmutable correcta?","o":["Implementar Cloneable para copiar el estado interno","Campos private final, sin setters, clase final y copias defensivas de campos mutables","Usar exclusivamente tipos primitivos en los campos","Solo declarar la clase final basta para lograrlo"],"a":1,"f":"Además de final y sin setters, los campos mutables (List, Date, arrays) deben copiarse defensivamente al entrar y salir, o exponerse como vistas inmutables."},
{"c":"oop","s":"P","w":4,"q":"¿Por qué esta clase NO es inmutable?","k":"final class Config {\n    private final List<String> keys;\n    Config(List<String> keys) { this.keys = keys; }\n    List<String> getKeys() { return keys; }\n}","o":["Porque a la clase le falta un setter explícito","Sí es inmutable, ya que el campo keys es final","Porque el llamador conserva/recibe la referencia y puede mutar la lista","Porque List no puede declararse final en Java"],"a":2,"f":"final protege la referencia, no el contenido: quien pasó la lista o quien la obtiene con getKeys() puede hacer add/remove. Se necesita List.copyOf en constructor y getter."},
{"c":"oop","s":"P","w":3,"q":"¿Qué imprime?","k":"interface Greeter {\n    String greet(String name);\n}\n// ...\nGreeter g = name -> \"Hola \" + name;\nSystem.out.println(g.greet(\"Eva\"));","o":["Hola name","Hola Eva","name","No compila: falta implementar la interfaz"],"a":1,"f":"Greeter es una interfaz funcional (un único método abstracto); la lambda provee esa implementación inline."},
{"c":"oop","s":"T","w":3,"q":"¿Qué hace @FunctionalInterface?","o":["Genera la implementación de la lambda en tiempo de compilación","Permite declarar múltiples métodos abstractos sin error","Convierte cualquier interfaz en funcional automáticamente","Verifica en compilación que exista exactamente un método abstracto"],"a":3,"f":"La anotación es un contrato verificado: si alguien agrega un segundo método abstracto, el código deja de compilar. Cualquier SAM interface es funcional aunque no la lleve."},
{"c":"oop","s":"P","w":4,"q":"¿Compila esta interfaz funcional?","k":"@FunctionalInterface\ninterface Worker {\n    void work();\n    boolean equals(Object o);\n    default void rest() {}\n}","o":["No: tiene dos métodos abstractos distintos","No: falta declarar el modificador static","No: default no se permite junto a @FunctionalInterface","Sí: equals coincide con un método public de Object y no cuenta"],"a":3,"f":"Los métodos abstractos que redeclaran métodos públicos de Object (equals, hashCode, toString) no cuentan para el SAM; work() es el único método funcional."},
{"c":"oop","s":"T","w":3,"q":"En genéricos, ¿qué significa List<? extends Number>?","o":["Lista de superclases de Number, como Object","Lista solo de Number exacto, sin subtipos permitidos","Lista de un subtipo desconocido de Number: se puede leer como Number, no agregar","Lista que acepta agregar cualquier subtipo de Number"],"a":2,"f":"El wildcard acotado superior es de solo lectura (producer): el tipo real podría ser List<Integer> y agregar un Double rompería la seguridad de tipos. Regla PECS: producer-extends."},
{"c":"oop","s":"T","w":4,"q":"Según PECS, ¿qué firma es correcta para copiar de src a dst?","o":["copy(List<? extends T> src, List<? super T> dst)","copy(List<T> src, List<Object> dst)","copy(List<? super T> src, List<? extends T> dst)","copy(List<?> src, List<?> dst)"],"a":0,"f":"Producer Extends (se lee de src), Consumer Super (se escribe en dst). Es la firma real de Collections.copy."},
{"c":"oop","s":"P","w":4,"q":"¿Cuál es el resultado?","k":"List<Integer> ints = new ArrayList<>();\nList<Number> nums = ints;","o":["Excepción en runtime","Compila: Integer es subtipo de Number","Compila con cast implícito","No compila: los genéricos son invariantes"],"a":3,"f":"List<Integer> NO es subtipo de List<Number> (invarianza); si compilara, podría agregarse un Double a una lista de Integers. Los arrays, en cambio, sí son covariantes (y fallan en runtime)."},
{"c":"oop","s":"P","w":5,"q":"¿Qué imprime?","k":"Object[] arr = new Integer[2];\narr[0] = \"hello\";","o":["Compila y ejecuta sin ningún problema","No compila por asignar String a un arreglo de Integer","ArrayStoreException en runtime","NullPointerException al acceder al índice 0"],"a":2,"f":"Los arrays son covariantes en compilación pero verifican el tipo real en runtime: guardar un String en un Integer[] lanza ArrayStoreException. Este agujero es lo que la invarianza de genéricos evita."},
{"c":"oop","s":"T","w":3,"q":"¿Qué es el type erasure?","o":["Eliminación de tipos no usados por el GC","Los parámetros genéricos se eliminan en compilación","Un error de casting","La conversión de genéricos a arrays"],"a":1,"f":"Por erasure no se puede hacer new T(), T.class ni instanceof List<String>; el bytecode trabaja con el tipo crudo más los casts insertados por el compilador."},
{"c":"oop","s":"P","w":3,"q":"¿Qué imprime?","k":"static <T extends Comparable<T>> T max(T a, T b) {\n    return a.compareTo(b) > 0 ? a : b;\n}\n// ...\nSystem.out.println(max(\"pear\", \"apple\"));","o":["apple","pear","No compila","ClassCastException"],"a":1,"f":"El método genérico acota T a tipos comparables consigo mismos; \"pear\" > \"apple\" lexicográficamente."},
{"c":"oop","s":"T","w":2,"q":"¿Qué categoría de excepción NO exige try/catch ni throws?","o":["Unchecked (RuntimeException y Error)","Todas las excepciones lo exigen sin excepción","IOException, por derivar de Exception","Checked, ya que el compilador las verifica"],"a":0,"f":"Solo las checked (subclases de Exception que no son RuntimeException) participan del chequeo del compilador; las unchecked pueden propagarse libremente."},
{"c":"oop","s":"P","w":4,"q":"¿Qué imprime?","k":"static String test() {\n    try {\n        return \"try\";\n    } finally {\n        System.out.print(\"finally-\");\n    }\n}\n// ...\nSystem.out.print(test());","o":["finally-","try-finally","finally-try","try"],"a":2,"f":"finally se ejecuta después de evaluar la expresión del return pero antes de devolver el control: primero imprime finally-, luego se imprime el valor retornado."},
{"c":"oop","s":"P","w":5,"q":"¿Qué imprime?","k":"static int get() {\n    try {\n        return 1;\n    } finally {\n        return 2;\n    }\n}\n// ...\nSystem.out.println(get());","o":["12","No compila","2","1"],"a":2,"f":"Un return en finally descarta silenciosamente el valor (¡y hasta excepciones!) del try: gana el 2. Nunca haga return en finally."},
{"c":"oop","s":"T","w":3,"q":"En try-with-resources con dos recursos, ¿en qué orden se cierran?","o":["En orden inverso a la declaración","En orden de declaración","Solo se cierra el último","Aleatorio"],"a":0,"f":"Los recursos se cierran en orden LIFO (inverso), garantizando que los dependientes se cierren antes que sus fuentes."},
{"c":"oop","s":"P","w":4,"q":"¿Qué requisito debe cumplir un recurso de try-with-resources?","k":"try (var r = obtenerRecurso()) {\n    r.usar();\n}","o":["Implementar AutoCloseable","Extender Resource","Tener un método close() cualquiera","Implementar Closeable únicamente"],"a":0,"f":"AutoCloseable (padre de Closeable) define close(); el compilador genera el bloque de cierre automático. La variable es implícitamente final."},
{"c":"oop","s":"T","w":4,"q":"Si el try lanza una excepción y close() lanza otra, ¿qué recibe el catch?","o":["La de close(); la del try se pierde","La del try; la de close() queda como suppressed","Ambas se pierden","Una excepción combinada nueva"],"a":1,"f":"En try-with-resources la excepción primaria es la del bloque; las de close() se adjuntan vía addSuppressed y se leen con getSuppressed(). (En try/finally clásico ocurría lo contrario)."},

{"c":"st","s":"T","w":3,"q":"¿Qué hace mapMulti (Java 16) frente a flatMap?","o":["Es idéntico a flatMap en todos los casos de uso","Solo funciona con tipos primitivos como IntStream","Aplana dos niveles de anidamiento en una sola llamada","Reemplaza el stream intermedio por un Consumer, evitando crear un Stream por elemento"],"a":3,"f":"mapMulti((elem, consumer) -> …) emite cero o más valores por elemento sin instanciar streams intermedios: más eficiente cuando se emiten pocos elementos."},
{"c":"st","s":"P","w":3,"q":"¿Qué imprime?","k":"var r = Stream.of(\"one\", \"two\", \"three\")\n    .max(Comparator.comparingInt(String::length))\n    .orElse(\"-\");\nSystem.out.println(r);","o":["one, el primero encontrado en el stream","-, porque el stream llega vacío al comparador","two, por tener longitud intermedia","three"],"a":3,"f":"max con comparador por longitud selecciona \"three\" (5 caracteres)."},
{"c":"st","s":"P","w":4,"q":"¿Qué imprime?","k":"var counts = Stream.of(\"a\", \"b\", \"a\", \"c\", \"a\")\n    .collect(Collectors.groupingBy(s -> s, Collectors.counting()));\nSystem.out.println(counts.get(\"a\"));","o":["2","3L pero como Integer","3","[a, a, a]"],"a":2,"f":"counting() devuelve Long: la clave \"a\" aparece 3 veces. Es el idiom estándar para frecuencias."},
{"c":"st","s":"T","w":3,"q":"En un Comparator, ¿qué hace nullsFirst?","o":["Convierte cada null en una cadena vacía para comparar","Envuelve otro comparador tratando null como menor que cualquier valor","Lanza NullPointerException apenas encuentra un null","Elimina los elementos null antes de comparar"],"a":1,"f":"Comparator.nullsFirst(natural) ordena nulls al inicio sin lanzar NPE; nullsLast los coloca al final."},
{"c":"st","s":"P","w":4,"q":"¿Qué imprime?","k":"var list = new ArrayList<>(Arrays.asList(\"b\", null, \"a\"));\nlist.sort(Comparator.nullsFirst(Comparator.naturalOrder()));\nSystem.out.println(list);","o":["[null, a, b]","[a, b, null]","[null, b, a]","NullPointerException"],"a":0,"f":"nullsFirst delega en el orden natural para los no nulos y antepone los null: [null, a, b]."},
{"c":"st","s":"P","w":3,"q":"¿Qué imprime?","k":"var r = Stream.of(2, 4, 6)\n    .noneMatch(n -> n % 2 != 0);\nSystem.out.println(r);","o":["Optional[true]","No compila","true","false"],"a":2,"f":"noneMatch devuelve true si NINGÚN elemento cumple: ninguno es impar → true."},
{"c":"st","s":"P","w":4,"q":"¿Qué imprime?","k":"record Prod(String cat, int qty) {}\nvar total = Stream.of(new Prod(\"A\", 2), new Prod(\"B\", 3), new Prod(\"A\", 5))\n    .filter(p -> p.cat().equals(\"A\"))\n    .mapToInt(Prod::qty)\n    .sum();\nSystem.out.println(total);","o":["10","7","5","2"],"a":1,"f":"Filtra categoría A (qty 2 y 5) y suma: 7. Patrón típico de agregación con streams primitivos."},
{"c":"st","s":"T","w":3,"q":"¿Qué sucede al llamar stream() sobre una colección y luego modificar la colección ANTES de la terminal?","o":["Siempre se ve el estado original de la colección","No compila si la colección se modifica antes de la terminal","El stream es 'late-binding': generalmente refleja los cambios hechos antes de la terminal","Lanza siempre ConcurrentModificationException al iterar"],"a":2,"f":"Los streams vinculan la fuente tarde: los datos se leen al ejecutar la terminal. Modificar DURANTE la ejecución sí puede lanzar CME en fuentes fail-fast."},
{"c":"st","s":"P","w":5,"q":"¿Qué imprime?","k":"var sb = Stream.of(\"a\", \"b\", \"c\")\n    .collect(StringBuilder::new,\n             StringBuilder::append,\n             StringBuilder::append);\nSystem.out.println(sb);","o":["No compila","cba","[a, b, c]","abc"],"a":3,"f":"La forma de tres argumentos de collect (supplier, accumulator, combiner) es la base mutable de los Collectors; en secuencial acumula en orden: abc."},
{"c":"st","s":"P","w":4,"q":"¿Qué imprime?","k":"var r = Stream.of(\"aa\", \"ab\", \"ba\")\n    .filter(s -> s.startsWith(\"a\"))\n    .map(s -> s.charAt(1))\n    .distinct()\n    .count();\nSystem.out.println(r);","o":["3","1","2","0"],"a":2,"f":"Pasan aa y ab; sus segundos caracteres son 'a' y 'b'; distinct los mantiene ambos: 2."},
{"c":"st","s":"T","w":2,"q":"¿Qué método de Optional ejecuta una acción solo si hay valor?","o":["ifPresent","orElse","filter","get"],"a":0,"f":"ifPresent(Consumer) evita el patrón if (opt.isPresent()) { opt.get()... } y no hace nada en vacío."},
{"c":"st","s":"P","w":4,"q":"¿Qué imprime?","k":"var r = Optional.ofNullable((String) null)\n    .or(() -> Optional.of(\"backup\"))\n    .map(String::length)\n    .orElse(-1);\nSystem.out.println(r);","o":["NullPointerException","-1","6","0"],"a":2,"f":"ofNullable(null) da empty; or() (Java 9) sustituye por Optional[backup]; map calcula su longitud: 6."}

{"c":"jd","s":"T","w":2,"q":"¿Qué interfaz de JDBC representa la conexión física a la base de datos?","o":["Driver","Session","DataSource","Connection"],"a":3,"f":"Connection encapsula la sesión con la BD; se obtiene de DriverManager o (preferible en producción) de un DataSource con pool."},
{"c":"jd","s":"T","w":3,"q":"¿Por qué se prefiere DataSource sobre DriverManager en producción?","o":["Es una API más nueva que DriverManager","DriverManager simplemente no funciona con Oracle","DataSource no necesita URL para conectarse a la BD","Permite pooling de conexiones, configuración externa y transacciones distribuidas"],"a":3,"f":"Crear conexiones físicas es costoso; el pool del DataSource las reutiliza. Además se integra con JNDI y con gestores de transacciones."},
{"c":"jd","s":"T","w":2,"q":"¿Cuál es el formato correcto de una URL JDBC?","o":["oracle://host/db","db:jdbc://host","jdbc:vendor:detalles","http://host:1521/db"],"a":2,"f":"Siempre inicia con jdbc:, sigue el subprotocolo del vendor y los detalles específicos. 1521 es el puerto por defecto del listener de Oracle."},
{"c":"jd","s":"P","w":3,"q":"¿Qué problema tiene este código?","k":"String user = request.get(\"user\");\nStatement st = conn.createStatement();\nResultSet rs = st.executeQuery(\n    \"SELECT * FROM accounts WHERE name = '\" + user + \"'\");","o":["Ninguno, siempre que se use PreparedStatement después","Falta hacer commit tras ejecutar la consulta","Inyección SQL: la entrada se concatena sin sanitizar","No compila por el uso de Statement en vez de PreparedStatement"],"a":2,"f":"Concatenar entrada del usuario permite inyectar SQL (' OR '1'='1). Use PreparedStatement con parámetros ?, que separa código de datos."},
{"c":"jd","s":"P","w":3,"q":"¿Cómo se asignan los parámetros de un PreparedStatement?","k":"var ps = conn.prepareStatement(\n    \"SELECT * FROM emp WHERE dept = ? AND sal > ?\");","o":["ps.setString(0, \"IT\"); ps.setDouble(1, 500)","ps.bind(1, \"IT\")","ps.setString(1, \"IT\")","ps.set(\"dept\", \"IT\")"],"a":2,"f":"Los índices de parámetros JDBC empiezan en 1, no en 0. Error clásico de examen."},
{"c":"jd","s":"P","w":4,"q":"¿Qué imprime si la tabla tiene 3 filas?","k":"ResultSet rs = ps.executeQuery();\nrs.next();\nint count = 0;\nwhile (rs.next()) count++;\nSystem.out.println(count);","o":["2","3","4","SQLException"],"a":0,"f":"El rs.next() inicial ya consumió la primera fila (el cursor empieza ANTES de la fila 1); el while cuenta solo las 2 restantes."},
{"c":"jd","s":"T","w":3,"q":"¿Dónde apunta el cursor de un ResultSet recién creado?","o":["Antes de la primera fila","En la última fila","Es indefinido","En la primera fila"],"a":0,"f":"El cursor comienza before-first: siempre se necesita un next() antes de leer con getXxx, incluso para una sola fila."},
{"c":"jd","s":"P","w":3,"q":"¿Qué método ejecuta un UPDATE y qué devuelve?","k":"var ps = conn.prepareStatement(\n    \"UPDATE emp SET sal = sal * 1.1 WHERE dept = ?\");","o":["execute() → void, sin importar el tipo de sentencia","run() → boolean, indicando éxito o fracaso","executeUpdate() → int con filas afectadas","executeQuery() → ResultSet, como cualquier consulta"],"a":2,"f":"executeUpdate sirve para INSERT/UPDATE/DELETE (y DDL) y devuelve el número de filas afectadas; executeQuery con DML lanza SQLException."},
{"c":"jd","s":"T","w":3,"q":"¿Qué devuelve el método execute() de PreparedStatement?","o":["ResultSet siempre, sin importar el tipo de sentencia","boolean: true si el resultado es un ResultSet, false si es un update count","void, ya que el resultado se consulta aparte","int con el número de filas afectadas por el update"],"a":1,"f":"execute() es genérico: con true se recupera getResultSet(), con false getUpdateCount(). Útil cuando no se conoce el tipo de sentencia."},
{"c":"jd","s":"P","w":4,"q":"¿Cuál es el resultado?","k":"var rs = st.executeQuery(\"SELECT id, name FROM emp\");\nwhile (rs.next()) {\n    System.out.println(rs.getInt(\"ID\") + rs.getString(2));\n}","o":["SQLException por mezclar el índice 2 con nombre de columna","SQLException por usar \"ID\" en mayúsculas en el getInt","No compila porque faltan los tipos explícitos","Funciona: nombres de columna case-insensitive e índices desde 1"],"a":3,"f":"getXxx acepta etiqueta de columna (insensible a mayúsculas) o índice basado en 1; ambas formas son válidas y mezclables."},
{"c":"jd","s":"P","w":4,"q":"¿Qué imprime si la columna BONUS es NULL en la fila actual?","k":"int bonus = rs.getInt(\"bonus\");\nSystem.out.println(bonus + \" \" + rs.wasNull());","o":["null true","0 true","SQLException","0 false"],"a":1,"f":"getInt convierte NULL de SQL en 0 (los primitivos no admiten null); wasNull() indica si el último valor leído era NULL real."},
{"c":"jd","s":"T","w":3,"q":"¿Cuál es el estado por defecto de auto-commit en una Connection JDBC?","o":["No existe el concepto de auto-commit en JDBC","Depende del driver JDBC que se esté utilizando","Desactivado: hay que confirmar cada sentencia a mano","Activado: cada sentencia se confirma automáticamente"],"a":3,"f":"Por defecto cada sentencia es su propia transacción. Para agrupar operaciones: setAutoCommit(false), luego commit() o rollback()."},
{"c":"jd","s":"P","w":4,"q":"¿Qué ocurre con los datos?","k":"conn.setAutoCommit(false);\nst.executeUpdate(\"INSERT INTO log VALUES (1)\");\nst.executeUpdate(\"INSERT INTO log VALUES (2)\");\nconn.rollback();\nst.executeUpdate(\"INSERT INTO log VALUES (3)\");\nconn.commit();","o":["Solo 1 y 2","No se guarda nada","Se guardan 1, 2 y 3","Solo se guarda 3"],"a":3,"f":"rollback deshace los inserts 1 y 2 (no confirmados); el insert 3 posterior sí queda dentro de la transacción confirmada por commit."},
{"c":"jd","s":"P","w":5,"q":"¿Qué hace este código con savepoints?","k":"conn.setAutoCommit(false);\nst.executeUpdate(\"INSERT INTO t VALUES (1)\");\nSavepoint sp = conn.setSavepoint();\nst.executeUpdate(\"INSERT INTO t VALUES (2)\");\nconn.rollback(sp);\nconn.commit();","o":["Guarda 1 y 2","SQLException","No guarda nada","Guarda solo 1"],"a":3,"f":"rollback(sp) deshace solo lo posterior al savepoint (el 2); el commit confirma lo restante (el 1). Los savepoints permiten rollback parcial."},
{"c":"jd","s":"T","w":3,"q":"¿Qué garantiza try-with-resources con Connection, PreparedStatement y ResultSet?","o":["Solo garantiza el auto-commit de la transacción","Mejor rendimiento general de las consultas ejecutadas","El cierre automático en orden inverso, incluso ante excepciones","Reintentos automáticos ante fallos de conexión"],"a":2,"f":"Los tres implementan AutoCloseable; no cerrarlos fuga conexiones del pool. Cerrar la Connection cierra en cascada, pero el cierre explícito de los tres es la práctica correcta."},
{"c":"jd","s":"P","w":3,"q":"¿Qué pasa con el ResultSet al cerrar su Statement?","k":"ResultSet rs;\ntry (var st = conn.createStatement()) {\n    rs = st.executeQuery(\"SELECT 1 FROM dual\");\n}\nrs.next();","o":["SQLException: el ResultSet se cierra junto con su Statement","Devuelve false silenciosamente en cada next()","No compila si el ResultSet se usa fuera del try","Funciona con normalidad, el ResultSet sigue abierto"],"a":0,"f":"El ciclo de vida del ResultSet depende de su Statement: al cerrarse este (fin del try), el ResultSet queda cerrado y usarlo lanza SQLException."},
{"c":"jd","s":"T","w":3,"q":"¿Qué interfaz JDBC sirve para invocar procedimientos almacenados?","o":["PreparedStatement","CallableStatement","StoredProcedure","ProcedureStatement"],"a":1,"f":"CallableStatement usa la sintaxis {call nombre(?, ?)} y soporta parámetros IN, OUT e INOUT."},
{"c":"jd","s":"P","w":4,"q":"¿Cómo se lee el parámetro OUT de este procedimiento?","k":"var cs = conn.prepareCall(\"{call get_total(?, ?)}\");\ncs.setInt(1, 2024);\n// el segundo parámetro es OUT de tipo NUMBER","o":["cs.setOut(2) con el valor esperado de retorno","cs.getInt(2) directamente sin registrar el parámetro","cs.registerOutParameter(2, Types.NUMERIC) antes de execute, luego cs.getInt(2)","No es posible leer parámetros OUT en JDBC estándar"],"a":2,"f":"Todo parámetro OUT debe registrarse con su tipo SQL ANTES de ejecutar; después se lee con el getter correspondiente."},
{"c":"jd","s":"P","w":4,"q":"¿Qué logra este código?","k":"var ps = conn.prepareStatement(\"INSERT INTO emp(name) VALUES (?)\");\nfor (String n : names) {\n    ps.setString(1, n);\n    ps.addBatch();\n}\nint[] results = ps.executeBatch();","o":["Agrupa los INSERT en un solo envío por lotes, reduciendo round-trips","Solo inserta el último elemento del bucle","Lanza SQLException por usar addBatch repetidamente","Ejecuta un INSERT distinto por cada viaje a la BD"],"a":0,"f":"El batching reduce drásticamente los viajes de red; results contiene las filas afectadas por cada comando. Clave de rendimiento en cargas masivas."},
{"c":"jd","s":"T","w":3,"q":"¿Qué tipo de ResultSet permite moverse hacia atrás con previous()?","o":["CONCUR_UPDATABLE, que solo controla la escritura","TYPE_SCROLL_INSENSITIVE o TYPE_SCROLL_SENSITIVE","Cualquiera de los tipos admite moverse hacia atrás","TYPE_FORWARD_ONLY, el tipo por defecto del ResultSet"],"a":1,"f":"El tipo por defecto (FORWARD_ONLY) solo avanza; los scrollable admiten previous, absolute(n), first, last. SENSITIVE además refleja cambios externos."},
{"c":"jd","s":"P","w":4,"q":"¿Qué imprime con un ResultSet scrollable de 5 filas?","k":"rs.absolute(3);\nrs.relative(-1);\nSystem.out.println(rs.getInt(1)); // columna con valores 10,20,30,40,50","o":["20","40","SQLException","30"],"a":0,"f":"absolute(3) va a la fila 3 (valor 30); relative(-1) retrocede a la fila 2 (valor 20)."},
{"c":"jd","s":"T","w":2,"q":"¿Qué excepción lanzan casi todas las operaciones JDBC?","o":["RuntimeException","IOException","SQLException","DataAccessException"],"a":2,"f":"SQLException es checked: obliga a manejarla o declararla. Ofrece getSQLState, getErrorCode y encadenamiento con getNextException."},
{"c":"jd","s":"P","w":3,"q":"¿Qué información aporta getErrorCode() en una SQLException con Oracle?","o":["Nada útil","El código HTTP","El código de error del vendor","La línea del error en Java"],"a":2,"f":"getErrorCode devuelve el código numérico específico del vendor (ORA-xxxxx); getSQLState devuelve el código estándar de 5 caracteres."},
{"c":"jd","s":"P","w":4,"q":"¿Cómo se recuperan las claves generadas por un INSERT?","k":"var ps = conn.prepareStatement(sql, ???);\nps.executeUpdate();\nResultSet keys = ps.getGeneratedKeys();","o":["Statement.KEEP_CURRENT_RESULT","ResultSet.TYPE_KEYS","No se puede","Statement.RETURN_GENERATED_KEYS"],"a":3,"f":"El flag RETURN_GENERATED_KEYS en prepareStatement habilita getGeneratedKeys(), que devuelve un ResultSet con los valores generados (identity/secuencia)."},
{"c":"jd","s":"T","w":3,"q":"¿Qué hace Connection.setReadOnly(true)?","o":["Bloquea la tabla mientras dure la transacción","Impide ejecutar cualquier SELECT sobre la conexión","Da una PISTA al driver/BD para optimizar","Cierra la conexión inmediatamente"],"a":2,"f":"Es una sugerencia de optimización (p. ej. enrutar a réplicas de lectura); el comportamiento exacto depende del driver."},
{"c":"jd","s":"T","w":4,"q":"¿Qué nivel de aislamiento evita lecturas sucias pero permite lecturas no repetibles?","o":["READ_UNCOMMITTED","READ_COMMITTED","REPEATABLE_READ","SERIALIZABLE"],"a":1,"f":"READ_COMMITTED (el default de Oracle) solo lee datos confirmados, pero una misma consulta puede ver valores distintos si otra transacción confirma entre lecturas."},
{"c":"jd","s":"P","w":4,"q":"¿Qué imprime este metadata?","k":"var rs = st.executeQuery(\"SELECT id, name FROM emp\");\nvar md = rs.getMetaData();\nSystem.out.println(md.getColumnCount() + \" \" + md.getColumnName(2));","o":["2 ID","SQLException","2 NAME","1 NAME"],"a":2,"f":"ResultSetMetaData describe la estructura del resultado: 2 columnas, y la de índice 2 es NAME (Oracle reporta identificadores en mayúsculas por defecto)."},
{"c":"jd","s":"T","w":3,"q":"¿Para qué sirve DatabaseMetaData?","o":["Consultar capacidades del driver/BD: tablas, versiones, soporte de features","Describir la estructura del ResultSet actual","Optimizar automáticamente las consultas ejecutadas","Configurar los parámetros del pool de conexiones"],"a":0,"f":"conn.getMetaData() expone getTables, getColumns, versión del motor, soporte de transacciones, etc.: base de herramientas genéricas de BD."},
{"c":"jd","s":"P","w":4,"q":"¿Cuál es el error de este patrón?","k":"var ps = conn.prepareStatement(\"SELECT * FROM emp WHERE id = ?\");\nps.setInt(1, 5);\nps.executeQuery(\"SELECT * FROM emp\"); // línea X","o":["Ninguno, el patrón es válido tal como está escrito","Falta cerrar el PreparedStatement al finalizar","La línea X: executeQuery(String) sobre PreparedStatement lanza SQLException","El parámetro ps.setInt no se asignó correctamente"],"a":2,"f":"En PreparedStatement, las variantes executeQuery/executeUpdate CON argumento String están prohibidas (el SQL se fijó al preparar); lanzan SQLException."},
{"c":"jd","s":"T","w":3,"q":"¿Qué ventaja de rendimiento aporta PreparedStatement frente a Statement?","o":["Usa menos memoria en el cliente Java","La BD parsea y compila el plan una vez y lo reutiliza con distintos parámetros","Ninguna ventaja real frente a Statement clásico","Evita el uso de transacciones en la sesión"],"a":1,"f":"Además de la seguridad, el SQL parametrizado permite a Oracle reutilizar el cursor compartido en la shared pool, evitando hard parses repetidos."}

{"c":"jd","s":"P","w":3,"q":"¿Cómo se obtiene una conexión con DriverManager?","k":"Connection conn = DriverManager.getConnection(???);","o":["Solo la URL, o URL + usuario + password","Un DataSource","Un objeto Properties únicamente","El nombre de la clase del driver"],"a":0,"f":"getConnection acepta (url), (url, user, pass) o (url, Properties). Desde JDBC 4 el driver se carga automáticamente vía ServiceLoader: Class.forName ya no es necesario."},
{"c":"jd","s":"T","w":2,"q":"¿Sigue siendo necesario Class.forName(\"oracle.jdbc.OracleDriver\") en JDBC 4+?","o":["Sí, siempre es obligatorio antes de conectar","Solo es necesario específicamente con Oracle","Solo se requiere en aplicaciones web desplegadas","No: los drivers se autoregistran mediante META-INF/services"],"a":3,"f":"El mecanismo de service provider carga automáticamente cualquier driver presente en el classpath al usar DriverManager."},
{"c":"jd","s":"P","w":4,"q":"¿Qué imprime si emp está vacía?","k":"var rs = st.executeQuery(\"SELECT COUNT(*) FROM emp\");\nif (rs.next())\n    System.out.println(rs.getInt(1));\nelse\n    System.out.println(\"sin filas\");","o":["SQLException","0","null","sin filas"],"a":1,"f":"COUNT(*) siempre devuelve exactamente una fila (con valor 0 si la tabla está vacía); next() es true y getInt(1) da 0."},
{"c":"jd","s":"P","w":4,"q":"¿Cuál es el riesgo de este código en un pool de conexiones?","k":"Connection c = dataSource.getConnection();\nc.setAutoCommit(false);\n// ... operaciones y commit ...\n// (no se restaura autoCommit ni se cierra en finally)","o":["Fuga de conexión si hay excepción, y estado sucio","Ninguno: el pool siempre resetea el estado","No compila al omitir el cierre en finally","El commit falla si autoCommit quedó en false"],"a":0,"f":"Sin try-with-resources/finally la conexión puede no volver al pool (fuga). Buenas prácticas: cerrar siempre y restaurar el estado modificado."},
{"c":"jd","s":"T","w":3,"q":"¿Qué método de PreparedStatement asigna NULL a un parámetro?","o":["setNull(1, Types.VARCHAR)","skip(1)","setString(1, null) únicamente","setEmpty(1)"],"a":0,"f":"setNull requiere el tipo SQL explícito. Muchos drivers aceptan setString(i, null), pero setNull es la forma portable y correcta para tipos no String."},
{"c":"jd","s":"P","w":4,"q":"¿Qué imprime este código con getObject?","k":"// columna HIRE_DATE de tipo DATE en Oracle\nLocalDate d = rs.getObject(\"hire_date\", LocalDate.class);\nSystem.out.println(d.getClass().getSimpleName());","o":["Date","LocalDate","Timestamp","SQLException siempre"],"a":1,"f":"JDBC 4.2 soporta java.time: getObject con el tipo destino convierte DATE→LocalDate y TIMESTAMP→LocalDateTime sin pasar por java.sql.Date."},
{"c":"jd","s":"T","w":3,"q":"¿Qué clase de java.sql corresponde a un TIMESTAMP con precisión de nanosegundos?","o":["java.util.Date","java.sql.Time","java.sql.Date","java.sql.Timestamp"],"a":3,"f":"java.sql.Timestamp extiende java.util.Date agregando nanos; java.sql.Date solo conserva la parte de fecha y Time solo la hora."},
{"c":"jd","s":"P","w":4,"q":"En un batch, ¿qué indica Statement.EXECUTE_FAILED en el arreglo de resultados?","k":"int[] r = ps.executeBatch();","o":["Que se necesita commit","Que ese comando específico falló","Que todo el batch se ejecutó","Que devolvió filas"],"a":1,"f":"Ante fallo parcial se lanza BatchUpdateException; getUpdateCounts() muestra el estado por comando. El comportamiento de continuar o detener depende del driver."},
{"c":"jd","s":"T","w":3,"q":"¿Qué hace setFetchSize(100) en un Statement?","o":["Crea 100 conexiones nuevas hacia la base de datos","Sugiere al driver traer filas del servidor en bloques de 100","Limita la consulta a traer un máximo de 100 filas","Es equivalente a aplicar ROWNUM <= 100 en el SQL"],"a":1,"f":"fetchSize controla el tamaño del buffer de red por viaje, no el total de filas. En Oracle el default histórico es 10: subirlo acelera lecturas masivas."},
{"c":"jd","s":"T","w":3,"q":"¿Qué diferencia hay entre setMaxRows(n) y setFetchSize(n)?","o":["Ambos limitan el total de filas de igual manera","Ninguna diferencia real entre los dos métodos","maxRows LIMITA el total de filas del ResultSet","fetchSize limita filas; maxRows solo el buffer"],"a":2,"f":"maxRows descarta silenciosamente el excedente (límite duro del resultado); fetchSize es una optimización de red sin afectar el contenido."},
{"c":"jd","s":"P","w":5,"q":"¿Qué imprime?","k":"conn.setAutoCommit(false);\ntry (var ps = conn.prepareStatement(\"UPDATE acc SET bal = bal - 100 WHERE id = 1\")) {\n    ps.executeUpdate();\n    throw new RuntimeException(\"fallo\");\n} catch (Exception e) {\n    conn.rollback();\n    System.out.println(\"revertido\");\n}","o":["Nada, porque el bloque nunca llega a ejecutarse","SQLException al intentar hacer rollback","revertido, y el UPDATE queda deshecho","revertido, pero el UPDATE persiste igualmente"],"a":2,"f":"Con auto-commit desactivado el UPDATE no se confirmó; rollback lo revierte. Es el patrón transaccional básico: commit al final feliz, rollback en el catch."},
{"c":"jd","s":"P","w":4,"q":"¿Qué devuelve executeUpdate para un DELETE que no coincide con ninguna fila?","k":"int n = st.executeUpdate(\"DELETE FROM emp WHERE id = -999\");","o":["null","-1","SQLException","0"],"a":3,"f":"Cero filas afectadas es un resultado válido, no un error; verificar el conteo es la forma de detectar 'no encontrado' en DML."},
{"c":"jd","s":"T","w":3,"q":"¿Qué representa un RowSet frente a un ResultSet?","o":["Un tipo particular de índice sobre la tabla","Exactamente lo mismo, con otro nombre","Un ResultSet extendido, a menudo desconectado","Una vista materializada sobre la consulta"],"a":2,"f":"CachedRowSet mantiene los datos en memoria sin conexión activa y puede sincronizar cambios después; útil para capas desconectadas."},
{"c":"jd","s":"P","w":4,"q":"¿Qué hace este código con un ResultSet CONCUR_UPDATABLE?","k":"rs.next();\nrs.updateDouble(\"sal\", 5000);\nrs.updateRow();","o":["SQLException siempre, sin importar la concurrencia","Modifica la columna en la fila actual y persiste el cambio en la BD","Solo cambia la copia en memoria del ResultSet","Nada: los ResultSet son siempre de solo lectura"],"a":1,"f":"Con concurrencia UPDATABLE, updateXxx + updateRow escribe directamente en la base; insertRow y deleteRow también están disponibles."},
{"c":"jd","s":"T","w":2,"q":"¿Qué patrón de diseño implementa DriverManager al elegir el driver según la URL?","o":["Observer","Singleton","Factory","Decorator"],"a":2,"f":"DriverManager actúa como factoría: recorre los drivers registrados y delega en el que acepta la URL para fabricar la Connection."},
{"c":"jd","s":"P","w":3,"q":"¿Qué falta para que este SELECT parametrizado funcione?","k":"var ps = conn.prepareStatement(\"SELECT * FROM emp WHERE id = ?\");\nvar rs = ps.executeQuery();","o":["Nada, el SELECT ya está completo y listo","Registrar el parámetro como OUT antes de ejecutar","Llamar a un método ps.compile() antes de ejecutar","Asignar el parámetro con ps.setInt(1, valor) antes de ejecutar"],"a":3,"f":"Ejecutar con parámetros sin asignar lanza SQLException; cada ? debe recibir valor en cada ejecución (o conservar el de la anterior según el driver, lo cual no es confiable)."},
{"c":"jd","s":"T","w":4,"q":"En Oracle JDBC, ¿qué logra la propiedad oracle.jdbc.implicitStatementCacheSize?","o":["Aumenta el tamaño del fetch por defecto del driver","Limita el número de filas devueltas por consulta","Activa el cifrado SSL en la conexión JDBC","Cachea PreparedStatements cerrados para reutilizar cursores y evitar re-parseo"],"a":3,"f":"El statement caching implícito conserva los statements 'cerrados' listos para reuso: menos soft parses y mejor latencia en OLTP."},
{"c":"jd","s":"P","w":4,"q":"¿Qué imprime?","k":"try (var rs = st.executeQuery(\"SELECT 'A' FROM dual\")) {\n    System.out.println(rs.isBeforeFirst());\n    rs.next();\n    System.out.println(rs.isFirst() + \" \" + rs.isLast());\n}","o":["SQLException","true, luego true false","true, luego true true","false, luego true false"],"a":2,"f":"Antes de next() el cursor está before-first (true); con una sola fila, tras next() es simultáneamente primera y última."},
{"c":"jd","s":"T","w":3,"q":"¿Qué método permite comprobar si una conexión sigue válida?","o":["conn.isValid(timeoutSeconds)","conn.test()","conn.isClosed() es suficiente","conn.ping()"],"a":0,"f":"isValid ejecuta una verificación real contra la BD con timeout; isClosed solo informa si close() fue llamado localmente, no detecta conexiones caídas."},
{"c":"jd","s":"P","w":4,"q":"¿Cuál es el resultado con una columna NUMBER(10,2)?","k":"BigDecimal bd = rs.getBigDecimal(\"price\");\ndouble d = rs.getDouble(\"price\");","o":["Ambos lanzan excepción","Ambos funcionan","Solo getDouble funciona","Solo getBigDecimal funciona"],"a":1,"f":"JDBC convierte tipos numéricos flexiblemente; para dinero use siempre getBigDecimal, pues double no representa exactamente muchos decimales."},
{"c":"jd","s":"T","w":3,"q":"¿Qué ocurre al llamar dos veces executeQuery() sobre el mismo PreparedStatement?","o":["El primer ResultSet se cierra implícitamente al ejecutar de nuevo","Se mantienen ambos ResultSet abiertos simultáneamente","Lanza SQLException al intentar ejecutar de nuevo","Se duplican las filas devueltas en el segundo ResultSet"],"a":0,"f":"Cada Statement mantiene UN ResultSet abierto por defecto; re-ejecutar cierra el anterior. Para varios resultados simultáneos se requieren statements distintos."},
{"c":"jd","s":"P","w":3,"q":"¿Cómo se invoca una función almacenada que DEVUELVE un valor?","k":"var cs = conn.prepareCall(???);","o":["\"{call fn(?)}\", igual que un procedimiento","No es posible invocar funciones desde JDBC","\"select fn from dual\" únicamente, sin bind","\"{? = call fn(?)}\" registrando el parámetro 1 como OUT"],"a":3,"f":"La sintaxis de escape {? = call ...} coloca el retorno como primer parámetro, que debe registrarse con registerOutParameter(1, tipo)."},
{"c":"jd","s":"T","w":3,"q":"¿Qué aporta un pool como HikariCP frente a abrir conexiones directas?","o":["Cifrado automático del tráfico de red hacia la base de datos","Solo agrega registros de logging adicionales sobre cada conexión","Cache de resultados de las últimas consultas ejecutadas por el pool","Reutilización de conexiones, límites de concurrencia, validación y métricas: menor latencia y protección de la BD"],"a":3,"f":"Establecer una conexión Oracle cuesta decenas de ms (red + autenticación + proceso servidor); el pool amortiza ese costo y evita agotar sesiones."},
{"c":"jd","s":"P","w":5,"q":"¿Qué problema de concurrencia tiene este código?","k":"// campo compartido en un servlet/bean singleton\nprivate Connection conn = ds.getConnection();\n\npublic List<Emp> find(int id) throws SQLException {\n    var ps = conn.prepareStatement(\"SELECT * FROM emp WHERE id = ?\");\n    ...\n}","o":["Connection no es segura para uso concurrente: múltiples hilos comparten transacción y estado, causando errores intermitentes","No compila al intentar compartir la misma conexión entre varios hilos","Solo es más lento por la contención, pero el resultado sigue siendo correcto","Ninguno, Connection está diseñada específicamente para ese uso compartido"],"a":0,"f":"Una Connection debe usarse por un hilo a la vez; en componentes compartidos hay que obtenerla del pool POR petición y cerrarla al terminar."},
{"c":"jd","s":"P","w":4,"q":"¿Qué imprime?","k":"var ps = conn.prepareStatement(\"SELECT ename FROM emp WHERE ename LIKE ?\");\nps.setString(1, \"S%\");\n// tabla: SMITH, SCOTT, ADAMS\nvar rs = ps.executeQuery();\nint c = 0;\nwhile (rs.next()) c++;\nSystem.out.println(c);","o":["1","2","0","3"],"a":1,"f":"El comodín % viaja DENTRO del valor del parámetro (no en el SQL): coinciden SMITH y SCOTT. Los parámetros no pueden reemplazar identificadores ni palabras clave, pero sí valores con comodines."},
{"c":"jd","s":"T","w":4,"q":"¿Por qué un parámetro ? NO puede sustituir el nombre de una tabla?","o":["Es una limitación arbitraria del estándar JDBC","Sí puede sustituir el nombre de una tabla","Solo aplica esta restricción en bases de datos Oracle","Los parámetros son valores de datos ligados tras compilar el plan"],"a":3,"f":"El binding ocurre después del parseo y optimización: la estructura de la consulta (tablas, columnas) debe ser fija. SQL dinámico de identificadores exige construir el texto (con listas blancas)."},
{"c":"jd","s":"P","w":4,"q":"¿Qué imprime?","k":"System.out.println(conn.getTransactionIsolation() ==\n    Connection.TRANSACTION_READ_COMMITTED);","o":["false siempre, sin importar la configuración","Depende del ResultSet abierto en ese momento","SQLException al consultar el nivel de aislamiento","true en Oracle con configuración por defecto"],"a":3,"f":"Oracle opera por defecto en READ COMMITTED (y solo soporta además SERIALIZABLE); el driver refleja ese nivel."},
{"c":"jd","s":"T","w":3,"q":"¿Qué significa que el driver Oracle 'thin' sea tipo 4?","o":["Es 100% Java y habla directamente el protocolo de red de la BD, sin librerías nativas","Requiere tener instalado un cliente OCI nativo","Usa el puente ODBC para comunicarse con la BD","Solo funciona en sistemas operativos Linux"],"a":0,"f":"Los drivers tipo 4 (pure Java, direct-to-database) simplifican el despliegue; el tipo 2 (OCI) necesita bibliotecas nativas del cliente Oracle."},
{"c":"jd","s":"P","w":4,"q":"¿Qué patrón muestra este código y qué previene?","k":"var sql = \"UPDATE emp SET sal = ? WHERE id = ? AND version = ?\";\nps.setDouble(1, newSal);\nps.setInt(2, id);\nps.setInt(3, expectedVersion);\nif (ps.executeUpdate() == 0)\n    throw new OptimisticLockException();","o":["Un patrón de cache de segundo nivel para lecturas","Bloqueo pesimista: bloquea la fila desde el inicio","Bloqueo optimista: detecta modificaciones concurrentes comparando versión, sin mantener locks","Un mecanismo de auditoría de cambios en la tabla"],"a":2,"f":"Si otro proceso cambió la fila, la versión ya no coincide y el UPDATE afecta 0 filas: la colisión se detecta sin bloquear lecturas."},
{"c":"jd","s":"T","w":2,"q":"¿Qué paquete contiene las interfaces principales de JDBC?","o":["java.db","oracle.sql","java.sql","javax.jdbc"],"a":2,"f":"java.sql define Connection, Statement, ResultSet, etc.; javax.sql agrega DataSource, RowSet y pooling."}

{"c":"sql","s":"T","w":2,"q":"¿En qué orden lógico procesa Oracle las cláusulas de un SELECT?","o":["WHERE, FROM, SELECT, ORDER BY","FROM, WHERE, GROUP BY, HAVING, SELECT, ORDER BY","SELECT, FROM, WHERE, GROUP BY","FROM, SELECT, WHERE, HAVING"],"a":1,"f":"El orden lógico explica por qué los alias del SELECT no son visibles en WHERE (se evalúa antes) pero sí en ORDER BY (se evalúa después)."},
{"c":"sql","s":"P","w":3,"q":"¿Por qué falla esta consulta?","k":"SELECT ename, sal * 12 AS annual\nFROM emp\nWHERE annual > 50000;","o":["La columna sal no puede multiplicarse por un número","Falta agregar una cláusula GROUP BY a la consulta","No falla, la consulta se ejecuta con normalidad","El alias annual no existe aún cuando se evalúa WHERE"],"a":3,"f":"WHERE se procesa antes que la lista SELECT; hay que repetir la expresión (WHERE sal * 12 > 50000) o usar una subconsulta/CTE."},
{"c":"sql","s":"P","w":3,"q":"¿Qué devuelve?","k":"SELECT NVL(comm, 0) + sal FROM emp WHERE empno = 7369;\n-- comm es NULL, sal = 800","o":["800","Error","NULL","0"],"a":0,"f":"NVL sustituye NULL por 0; sin NVL, NULL + 800 sería NULL porque cualquier aritmética con NULL da NULL."},
{"c":"sql","s":"T","w":3,"q":"¿Qué diferencia a NVL2(expr, a, b) de NVL(expr, a)?","o":["NVL2 solo acepta argumentos numéricos","NVL2 devuelve a si expr NO es NULL y b si es NULL","Son completamente iguales en comportamiento","NVL2 compara dos expresiones entre sí"],"a":1,"f":"NVL2 elige entre dos valores según la nulidad; NVL solo reemplaza el caso NULL. COALESCE es la variante estándar de N argumentos."},
{"c":"sql","s":"P","w":4,"q":"¿Qué filas devuelve?","k":"SELECT ename FROM emp\nWHERE comm != NULL;","o":["Ninguna: la comparación con NULL nunca es verdadera","Las filas que sí tienen una comisión asignada","Error de sintaxis por comparar con NULL","Las filas que no tienen ninguna comisión asignada"],"a":0,"f":"NULL no es comparable con = o !=: el resultado es UNKNOWN y la fila se descarta. Lo correcto es IS NULL / IS NOT NULL."},
{"c":"sql","s":"P","w":4,"q":"Si dept 40 no tiene empleados, ¿qué devuelve?","k":"SELECT d.dname, COUNT(e.empno)\nFROM dept d LEFT JOIN emp e ON d.deptno = e.deptno\nGROUP BY d.dname;","o":["Incluye dept 40 con COUNT = 0","Incluye dept 40 con COUNT = NULL","Error","Omite el dept 40"],"a":0,"f":"El outer join produce la fila con e.empno NULL, y COUNT(columna) no cuenta NULLs: 0. Con COUNT(*) contaría 1, error sutil frecuente."},
{"c":"sql","s":"T","w":3,"q":"¿Qué diferencia hay entre COUNT(*) y COUNT(columna)?","o":["COUNT(*) es más lento siempre","COUNT(*) cuenta filas","COUNT(columna) incluye NULLs","Ninguna"],"a":1,"f":"COUNT(comm) sobre emp con 4 comisiones no nulas devuelve 4 aunque haya 14 filas; COUNT(*) devuelve 14."},
{"c":"sql","s":"P","w":3,"q":"¿Qué devuelve con sal de 800 a 5000?","k":"SELECT COUNT(*) FROM emp\nWHERE sal BETWEEN 800 AND 1000;\n-- salarios: 800, 950, 1000, 1100","o":["4","1","2","3"],"a":3,"f":"BETWEEN es inclusivo en ambos extremos: 800, 950 y 1000 cuentan; 1100 no."},
{"c":"sql","s":"P","w":4,"q":"¿Qué error tiene esta consulta?","k":"SELECT deptno, ename, AVG(sal)\nFROM emp\nGROUP BY deptno;","o":["Falta agregar una cláusula HAVING a la consulta","AVG no acepta la columna sal como argumento","ename no está en el GROUP BY ni es agregada: ORA-00979","Ninguno, la consulta es válida tal cual"],"a":2,"f":"Toda columna del SELECT debe estar agrupada o agregada; ename varía dentro de cada grupo y Oracle rechaza la ambigüedad con ORA-00979."},
{"c":"sql","s":"T","w":3,"q":"¿Cuál es la diferencia entre WHERE y HAVING?","o":["HAVING es más rápido que WHERE en general","WHERE solo admite el operador AND","Son sinónimos intercambiables en Oracle","WHERE filtra filas antes de agrupar"],"a":3,"f":"Filtrar en WHERE lo que no requiere agregación reduce filas antes de agrupar y es más eficiente; HAVING AVG(sal) > x solo es posible tras agrupar."},
{"c":"sql","s":"P","w":4,"q":"¿Qué devuelve?","k":"SELECT deptno, MAX(sal)\nFROM emp\nGROUP BY deptno\nHAVING MAX(sal) > 2900\nORDER BY 2 DESC;","o":["Solo los departamentos cuyo salario máximo supera 2900, del mayor al menor","Error: ORDER BY 2 no es una cláusula válida","Los empleados individuales con salario mayor a 2900","Todos los departamentos, sin excepción alguna"],"a":0,"f":"HAVING filtra grupos por la agregada; ORDER BY 2 ordena por la segunda columna de la lista SELECT (posicional, válido)."},
{"c":"sql","s":"P","w":4,"q":"¿Qué devuelve UNION frente a UNION ALL aquí?","k":"SELECT deptno FROM emp      -- 14 filas, depts 10,20,30\nUNION\nSELECT deptno FROM dept;    -- 4 filas, depts 10,20,30,40","o":["4 filas (elimina duplicados)","Error de tipos al combinar ambas consultas","14 filas, sin considerar los duplicados","18 filas, sumando ambos orígenes"],"a":0,"f":"UNION deduplica (con costo de sort/hash); UNION ALL concatena sin eliminar repetidos y es más barato cuando los duplicados no importan."},
{"c":"sql","s":"T","w":3,"q":"¿Qué operador devuelve las filas de la primera consulta que NO están en la segunda?","o":["INTERSECT","DIFFERENCE","EXCEPT DISTINCT","MINUS"],"a":3,"f":"MINUS es el operador propio de Oracle (EXCEPT llegó como sinónimo en 21c); INTERSECT devuelve las comunes."},
{"c":"sql","s":"P","w":4,"q":"¿Qué empleados devuelve?","k":"SELECT ename FROM emp e\nWHERE EXISTS (\n    SELECT 1 FROM emp m\n    WHERE m.mgr = e.empno);","o":["Los que tienen un jefe asignado","Ninguno, la subconsulta nunca es verdadera","Los que SON jefes de alguien","Todos los empleados de la tabla"],"a":2,"f":"EXISTS es verdadero si la subconsulta correlacionada halla al menos una fila: empleados cuyo empno aparece como mgr de otro."},
{"c":"sql","s":"P","w":5,"q":"¿Qué devuelve si algún deptno de la subconsulta es NULL?","k":"SELECT ename FROM emp\nWHERE deptno NOT IN (\n    SELECT deptno FROM dept_cerrados);","o":["Ignora silenciosamente el valor NULL de la lista","Error de sintaxis por usar NOT IN con subconsulta","Los empleados de departamentos que no están cerrados","NINGUNA fila: NOT IN con un NULL en la lista siempre es UNKNOWN"],"a":3,"f":"NOT IN se traduce a deptno != v1 AND deptno != v2...; una comparación con NULL da UNKNOWN y anula todo el predicado. Use NOT EXISTS, que es null-safe."},
{"c":"sql","s":"T","w":3,"q":"¿Qué tipo de subconsulta puede referirse a columnas de la consulta externa?","o":["Inline view","Correlacionada","Ninguna","Escalar solamente"],"a":1,"f":"La subconsulta correlacionada se evalúa lógicamente por cada fila externa; las inline views del FROM son independientes."},
{"c":"sql","s":"P","w":4,"q":"¿Qué hace esta consulta?","k":"SELECT ename, sal, d.avg_sal\nFROM emp e\nJOIN (SELECT deptno, AVG(sal) avg_sal\n      FROM emp GROUP BY deptno) d\n  ON e.deptno = d.deptno\nWHERE e.sal > d.avg_sal;","o":["Empleados bajo el promedio global","Error: no se puede unir con subconsulta","Empleados que ganan más que el promedio de SU departamento","Promedios por departamento"],"a":2,"f":"La inline view precalcula el promedio por departamento y el join lo compara fila a fila: patrón clásico resoluble también con funciones analíticas."},
{"c":"sql","s":"P","w":4,"q":"¿Qué devuelve ROWNUM aquí?","k":"SELECT ename FROM (\n    SELECT ename FROM emp ORDER BY sal DESC)\nWHERE ROWNUM <= 3;","o":["Error","3 empleados aleatorios","Los 3 peor pagados","Los 3 mejor pagados"],"a":3,"f":"ROWNUM se asigna ANTES del ORDER BY en la misma consulta, por eso hay que ordenar en la subconsulta y filtrar afuera. Desde 12c: FETCH FIRST 3 ROWS ONLY."},
{"c":"sql","s":"T","w":3,"q":"¿Qué cláusula moderna de Oracle 12c+ reemplaza el patrón ROWNUM para paginación?","o":["TOP n, igual que en SQL Server","OFFSET n ROWS FETCH NEXT m ROWS ONLY","SAMPLE, pensada para muestreo aleatorio","LIMIT ... OFFSET, como en MySQL"],"a":1,"f":"La row limiting clause estándar se aplica después del ORDER BY: OFFSET 10 ROWS FETCH NEXT 10 ROWS ONLY pagina de forma legible."},

{"c":"sql","s":"P","w":4,"q":"¿Qué devuelve?","k":"SELECT TO_CHAR(1234.5, '00000.00') FROM dual;","o":["1234.50","#####","01234.50","1234.5"],"a":2,"f":"El modelo 0 fuerza dígitos con relleno de ceros; 9 dejaría espacios. Si el número no cabe en la máscara, Oracle muestra #."},

{"c":"sql","s":"T","w":3,"q":"¿Qué diferencia hay entre TRUNC(fecha, 'MM') y ROUND(fecha, 'MM')?","o":["ROUND siempre elimina la parte de la hora","Ninguna, ambas funciones truncan igual","TRUNC va al día 1 del mes actual","TRUNC redondea al mes más cercano"],"a":2,"f":"TRUNC(DATE '2024-05-20','MM') = 01-may; ROUND con día 20 salta al 01-jun. Ambas ponen la hora en 00:00."},

{"c":"sql","s":"P","w":4,"q":"¿Qué permite ON DELETE CASCADE en una FK?","k":"ALTER TABLE emp ADD CONSTRAINT fk_dept\nFOREIGN KEY (deptno) REFERENCES dept(deptno)\nON DELETE CASCADE;","o":["Borra el departamento al borrar el último empleado","Convierte los deptno en NULL","Impide borrar departamentos","Al borrar un departamento se borran automáticamente sus empleados"],"a":3,"f":"CASCADE propaga el DELETE a las filas hijas; ON DELETE SET NULL las conservaría anulando la FK. Sin cláusula, el borrado del padre con hijos falla (ORA-02292)."},
