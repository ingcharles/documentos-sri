{"c":"sql","s":"P","w":4,"q":"¿Qué calcula esta función analítica?","k":"SELECT ename, deptno, sal,\n  RANK() OVER (PARTITION BY deptno ORDER BY sal DESC) rk\nFROM emp;","o":["El ranking global de todos los salarios sin partición","Un número secuencial sin empates ni huecos","El ranking de salario DENTRO de cada departamento, con huecos ante empates","El promedio de salario calculado por departamento"],"a":2,"f":"PARTITION BY reinicia el ranking por departamento; RANK deja huecos tras empates (1,1,3). DENSE_RANK no los deja (1,1,2) y ROW_NUMBER nunca empata."},
{"c":"sql","s":"P","w":4,"q":"Con salarios 5000, 3000, 3000, 2975: ¿qué devuelve DENSE_RANK para 2975?","k":"SELECT sal, DENSE_RANK() OVER (ORDER BY sal DESC) dr FROM emp;","o":["1","4","2","3"],"a":3,"f":"DENSE_RANK: 5000→1, 3000→2 (ambos), 2975→3 sin salto. RANK habría dado 4."},
{"c":"sql","s":"P","w":4,"q":"¿Qué obtiene LAG aquí?","k":"SELECT ename, hiredate,\n  LAG(ename) OVER (ORDER BY hiredate) anterior\nFROM emp;","o":["Error, porque LAG requiere PARTITION BY","El empleado contratado inmediatamente antes","El siguiente empleado contratado después","El primer empleado contratado de todos"],"a":1,"f":"LAG accede a la fila previa según el orden de la ventana; LEAD mira hacia adelante. El tercer argumento define el default en los bordes."},
{"c":"sql","s":"P","w":5,"q":"¿Qué calcula esta ventana?","k":"SELECT ename, sal,\n  SUM(sal) OVER (ORDER BY hiredate\n    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) acum\nFROM emp;","o":["El total global repetido","La suma acumulada","El promedio móvil","La suma por departamento"],"a":1,"f":"El frame desde el inicio hasta la fila actual produce el acumulado clásico. Con solo ORDER BY el frame por defecto es RANGE ... CURRENT ROW, que agrupa empates: ROWS es más preciso."},
{"c":"sql","s":"T","w":3,"q":"¿Qué ventaja tienen las funciones analíticas sobre GROUP BY?","o":["Devuelven agregados SIN colapsar las filas: cada fila conserva su detalle junto al cálculo de ventana","No pueden combinarse con una cláusula WHERE en la misma consulta","Son más lentas de ejecutar, aunque producen resultados más exactos","Reemplazan por completo la necesidad de mantener índices"],"a":0,"f":"OVER() calcula sobre un conjunto de filas manteniendo la granularidad original: detalle y agregado en la misma fila, sin self-joins."},
{"c":"sql","s":"P","w":4,"q":"¿Por qué falla?","k":"SELECT ename, sal,\n  RANK() OVER (ORDER BY sal DESC) rk\nFROM emp\nWHERE rk <= 3;","o":["Falta agregar PARTITION BY a la función RANK","No falla, la consulta se ejecuta con normalidad","RANK no acepta la cláusula DESC en su ORDER BY","Las funciones analíticas se evalúan después del WHERE: rk no existe ahí"],"a":3,"f":"Las analíticas se calculan casi al final (tras WHERE/GROUP BY/HAVING); para filtrar por ellas hay que envolver en subconsulta o CTE."},
{"c":"sql","s":"T","w":3,"q":"¿Qué es una CTE (WITH clause) en Oracle?","o":["Una tabla temporal permanente","Una subconsulta nombrada","Un tipo de índice","Un sinónimo"],"a":1,"f":"WITH nombre AS (SELECT...) mejora legibilidad y permite reuso; el optimizador decide si la materializa (o con hints /*+ MATERIALIZE */)."},
{"c":"sql","s":"P","w":5,"q":"¿Qué genera esta consulta jerárquica?","k":"SELECT LPAD(' ', 2*(LEVEL-1)) || ename org\nFROM emp\nSTART WITH mgr IS NULL\nCONNECT BY PRIOR empno = mgr;","o":["El organigrama: árbol jefe→subordinados con indentación por nivel","Error de sintaxis por usar CONNECT BY PRIOR","Solo la lista de gerentes de la compañía","Una lista plana de todos los empleados sin orden"],"a":0,"f":"START WITH define la raíz (sin jefe); CONNECT BY PRIOR empno = mgr une cada padre con sus hijos; LEVEL es la profundidad. La alternativa estándar es la CTE recursiva."},
{"c":"sql","s":"P","w":4,"q":"¿Qué hace esta CTE recursiva?","k":"WITH nums (n) AS (\n  SELECT 1 FROM dual\n  UNION ALL\n  SELECT n + 1 FROM nums WHERE n < 5\n)\nSELECT SUM(n) FROM nums;","o":["15","10","5","Bucle infinito"],"a":0,"f":"El miembro ancla genera 1 y el recursivo agrega 2..5; la suma 1+2+3+4+5 = 15. La condición WHERE n < 5 detiene la recursión."},
{"c":"sql","s":"T","w":3,"q":"¿Qué diferencia hay entre una vista y una vista materializada?","o":["La vista es solo una consulta almacenada","La vista guarda físicamente los datos","Ninguna diferencia entre ambos conceptos","La materializada no puede indexarse nunca"],"a":0,"f":"Las vistas materializadas precalculan agregaciones/joins costosos y admiten índices y query rewrite; el costo es la gestión del refresco (COMPLETE/FAST/ON COMMIT)."},
{"c":"sql","s":"P","w":3,"q":"¿Qué devuelve?","k":"SELECT COALESCE(NULL, NULL, 'A', 'B') FROM dual;","o":["B","NULL","Error","A"],"a":3,"f":"COALESCE devuelve el primer argumento no NULL, con evaluación en cortocircuito: 'A'."},
{"c":"sql","s":"P","w":4,"q":"¿Qué devuelve?","k":"SELECT NULLIF(10, 10), NULLIF(10, 20) FROM dual;","o":["10 y NULL","NULL y NULL","NULL y 10","10 y 20"],"a":2,"f":"NULLIF(a, b) devuelve NULL si a = b, y a en caso contrario; útil para evitar divisiones por cero: x / NULLIF(y, 0)."},
{"c":"sql","s":"P","w":4,"q":"¿Cuántas filas devuelve un CROSS JOIN entre emp (14 filas) y dept (4 filas)?","k":"SELECT * FROM emp CROSS JOIN dept;","o":["56","4","14","18"],"a":0,"f":"El producto cartesiano multiplica: 14 × 4 = 56. Suele indicar un JOIN sin condición ON accidental."},
{"c":"sql","s":"T","w":3,"q":"¿Qué diferencia hay entre NATURAL JOIN y JOIN ... USING?","o":["NATURAL JOIN exige además una cláusula ON explícita","USING se aplica de forma implícita sin declararlo","Son sintácticamente idénticas en Oracle","NATURAL une por TODAS las columnas homónimas automáticamente"],"a":3,"f":"NATURAL JOIN es frágil: agregar una columna homónima cambia silenciosamente el join. USING(col) es explícito y en ambos la columna común no admite prefijo de tabla."},
{"c":"sql","s":"P","w":4,"q":"¿Qué empleados lista este self-join?","k":"SELECT e.ename, m.ename jefe\nFROM emp e JOIN emp m\n  ON e.mgr = m.empno;","o":["Cada empleado con su jefe","Solo los jefes","Todos, incluido el presidente","Error: no se puede unir una tabla consigo misma"],"a":0,"f":"El inner join descarta la fila con mgr NULL (no matchea); para incluir al presidente se necesita LEFT JOIN."},
{"c":"sql","s":"T","w":2,"q":"¿Qué comando revierte una transacción no confirmada?","o":["UNDO","CANCEL","ROLLBACK","REVERT"],"a":2,"f":"ROLLBACK deshace los cambios desde el último COMMIT (o hasta un SAVEPOINT). Recuerde que en Oracle todo DDL confirma implícitamente."},
{"c":"sql","s":"P","w":4,"q":"¿Qué ve la Sesión B?","k":"-- Sesión A:\nUPDATE emp SET sal = 9999 WHERE empno = 7369;\n-- (sin commit)\n-- Sesión B:\nSELECT sal FROM emp WHERE empno = 7369;","o":["Se bloquea esperando a que la Sesión A confirme","9999, el valor recién actualizado por la Sesión A","Error de lock al intentar leer la fila","El valor original: Oracle da consistencia de lectura sin bloquear lecturas"],"a":3,"f":"El modelo multiversión de Oracle (undo) reconstruye la versión confirmada: las lecturas nunca se bloquean por escrituras ni ven datos sucios."},
{"c":"sql","s":"P","w":4,"q":"¿Qué hace FOR UPDATE en un SELECT?","k":"SELECT * FROM emp\nWHERE deptno = 10\nFOR UPDATE NOWAIT;","o":["Actualiza directamente las filas seleccionadas","Crea un trigger temporal sobre la tabla","Bloquea las filas seleccionadas para la transacción","No hace nada especial en la sesión actual"],"a":2,"f":"FOR UPDATE toma locks de fila (bloqueo pesimista); NOWAIT evita esperar, y WAIT n o SKIP LOCKED son alternativas para colas de trabajo."},
{"c":"sql","s":"T","w":3,"q":"¿Qué tipo de dato de Oracle almacena texto de longitud variable hasta 4000 bytes (por defecto)?","o":["VARCHAR2","CHAR","CLOB solamente","STRING"],"a":0,"f":"VARCHAR2 es el estándar de facto; CHAR rellena con espacios a longitud fija y CLOB almacena hasta gigabytes para texto grande."},
{"c":"sql","s":"P","w":4,"q":"¿Qué diferencia práctica muestra esto?","k":"CREATE TABLE t (a CHAR(5), b VARCHAR2(5));\nINSERT INTO t VALUES ('ab', 'ab');\nSELECT LENGTH(a), LENGTH(b) FROM t;","o":["2 y 5, invirtiendo el comportamiento esperado","5 y 2: CHAR rellena con espacios hasta la longitud fija","Error de tipos al comparar CHAR con VARCHAR2","2 y 2, ya que ambos tipos truncan por igual"],"a":1,"f":"CHAR(5) almacena 'ab   ' (relleno); esto también afecta comparaciones con VARCHAR2 y joins. Prefiera VARCHAR2 salvo códigos de longitud fija real."},
{"c":"sql","s":"P","w":3,"q":"¿Qué devuelve?","k":"SELECT CEIL(10.1), FLOOR(10.9), ROUND(10.45, 1), TRUNC(10.45, 1)\nFROM dual;","o":["11, 10, 10.5, 10.4","11, 10, 10.4, 10.4","10, 11, 10.4, 10.5","11, 11, 10.5, 10.4"],"a":0,"f":"CEIL sube, FLOOR baja, ROUND(x,1) redondea al décimo (10.45→10.5 por redondeo del 5) y TRUNC corta sin redondear."},
{"c":"sql","s":"P","w":4,"q":"¿Qué logra esta expresión regular?","k":"SELECT ename FROM emp\nWHERE REGEXP_LIKE(ename, '^[AEIOU].*S$');","o":["Error de sintaxis","Nombres que contienen vocales","Nombres que EMPIEZAN con vocal y TERMINAN en S","Nombres con exactamente 2 letras"],"a":2,"f":"^ ancla el inicio, [AEIOU] exige vocal inicial, .* cualquier contenido y S$ ancla la S final: p. ej. ADAMS."},
{"c":"sql","s":"T","w":3,"q":"¿Qué hace GROUP BY ROLLUP(a, b)?","o":["El producto cartesiano de agrupaciones","Ordena los grupos","Solo agrupa por a y b","Genera los grupos"],"a":3,"f":"ROLLUP produce la jerarquía de subtotales de derecha a izquierda; CUBE generaría TODAS las combinaciones. GROUPING() distingue los NULL de subtotal."},
{"c":"sql","s":"P","w":5,"q":"¿Cuántas filas de agrupación genera CUBE(deptno, job) con 3 deptnos y 5 jobs (todas las combinaciones pobladas)?","k":"SELECT deptno, job, SUM(sal)\nFROM emp GROUP BY CUBE(deptno, job);","o":["16, una fila extra por cada valor de job","24: 15 combinaciones + 3 subtotales de dept + 5 de job + 1 total","8, contando únicamente los subtotales generados","15, solo las combinaciones de deptno y job"],"a":1,"f":"CUBE genera 2^n conjuntos de agrupación: (deptno,job)=15, (deptno)=3, (job)=5 y ()=1: 24 filas."},
{"c":"sql","s":"P","w":4,"q":"¿Qué hace esta sentencia?","k":"INSERT ALL\n  INTO ventas_2023 VALUES (id, monto)\n  INTO ventas_hist VALUES (id, monto)\nSELECT id, monto FROM ventas_staging;","o":["Crea las tablas","Inserta cada fila de la fuente en AMBAS tablas","Da error: INSERT no acepta dos INTO","Inserta solo en la primera tabla"],"a":1,"f":"INSERT ALL sin condiciones inserta en todas las tablas listadas; con WHEN...THEN se convierte en insert condicional multitabla."},
{"c":"sql","s":"T","w":3,"q":"¿Qué objeto genera valores numéricos únicos y secuenciales?","o":["INDEX","SYNONYM","TRIGGER","SEQUENCE"],"a":3,"f":"CREATE SEQUENCE con NEXTVAL/CURRVAL; desde 12c también columnas IDENTITY y DEFAULT seq.NEXTVAL."},
{"c":"sql","s":"P","w":4,"q":"¿Qué devuelve CURRVAL si en la sesión aún no se llamó NEXTVAL?","k":"SELECT seq_emp.CURRVAL FROM dual;","o":["NULL, sin lanzar ningún error","ORA-08002: CURRVAL aún no está definido en esta sesión","El último valor global usado por la secuencia","0, como valor inicial por defecto"],"a":1,"f":"CURRVAL es POR SESIÓN y requiere un NEXTVAL previo en la misma sesión; además las secuencias pueden tener huecos (cache, rollbacks) y no garantizan continuidad."},
{"c":"sql","s":"P","w":4,"q":"¿Qué muestra esta consulta de diccionario?","k":"SELECT table_name, num_rows\nFROM user_tables\nWHERE table_name = 'EMP';","o":["Error: user_tables no existe en el diccionario","Las columnas y tipos de datos de EMP","El conteo exacto y en tiempo real de filas","El número de filas según las ÚLTIMAS ESTADÍSTICAS recolectadas"],"a":3,"f":"num_rows proviene de DBMS_STATS, no de contar la tabla; USER_/ALL_/DBA_ son los tres niveles de vistas del diccionario según alcance de privilegios."},
{"c":"sql","s":"P","w":3,"q":"¿Qué privilegio necesita el usuario APP para leer la tabla HR.EMP?","k":"GRANT ??? ON hr.emp TO app;","o":["CONNECT","ALL PRIVILEGES obligatorio","INSERT","SELECT"],"a":3,"f":"SELECT sobre el objeto basta para consultar; WITH GRANT OPTION le permitiría además re-otorgarlo. CONNECT es un rol de sistema, no un privilegio de objeto."},
{"c":"sql","s":"P","w":4,"q":"¿Qué resultado produce?","k":"SELECT deptno,\n  LISTAGG(ename, ', ') WITHIN GROUP (ORDER BY ename) equipo\nFROM emp\nGROUP BY deptno;","o":["Error: LISTAGG no existe en Oracle SQL","Una fila individual por cada empleado listado","El conteo de empleados agrupado por departamento","Una fila por departamento con los nombres concatenados y ordenados"],"a":3,"f":"LISTAGG agrega cadenas dentro del grupo con separador y orden propios; desde 12.2 admite ON OVERFLOW TRUNCATE para resultados que exceden 4000 bytes."}
);

{"c":"pls","s":"T","w":2,"q":"¿Cuál es la estructura mínima de un bloque anónimo PL/SQL?","o":["DECLARE...END;","BEGIN...END;","BEGIN...EXCEPTION...END;","PROCEDURE...END;"],"a":1,"f":"Solo BEGIN...END; es obligatorio; DECLARE y EXCEPTION son secciones opcionales del bloque."},
{"c":"pls","s":"P","w":3,"q":"¿Qué imprime?","k":"DECLARE\n  v_num NUMBER := 10;\nBEGIN\n  v_num := v_num + 5;\n  DBMS_OUTPUT.PUT_LINE(v_num);\nEND;","o":["15","10","Error: falta SERVEROUTPUT","5"],"a":0,"f":"La asignación usa := (no =); PUT_LINE muestra 15 (visible con SET SERVEROUTPUT ON en el cliente, pero el bloque ejecuta igual)."},
{"c":"pls","s":"T","w":3,"q":"¿Qué declara v_sal emp.sal%TYPE?","o":["Una variable con el MISMO tipo de la columna emp.sal","Una constante cuyo valor no puede cambiar","Un cursor apuntando a la tabla emp","Una fila completa con todas las columnas de emp"],"a":0,"f":"%TYPE ancla el tipo a la columna; %ROWTYPE anclaría un registro a la estructura completa de la tabla o cursor. Reduce mantenimiento."},
{"c":"pls","s":"P","w":3,"q":"¿Qué contiene v_emp tras el fetch?","k":"DECLARE\n  v_emp emp%ROWTYPE;\nBEGIN\n  SELECT * INTO v_emp FROM emp WHERE empno = 7369;\n  DBMS_OUTPUT.PUT_LINE(v_emp.ename);\nEND;","o":["Error de tipos al usar %ROWTYPE con SELECT INTO","Un registro con TODAS las columnas de la fila","Solo el nombre del empleado consultado","Un cursor abierto listo para hacer FETCH"],"a":1,"f":"%ROWTYPE crea un record espejo de la tabla; SELECT INTO llena todos los campos de la fila única recuperada."},
{"c":"pls","s":"P","w":4,"q":"¿Qué excepción lanza si el empno no existe?","k":"SELECT sal INTO v_sal FROM emp WHERE empno = -1;","o":["Ninguna: v_sal queda NULL","NO_DATA_FOUND","TOO_MANY_ROWS","INVALID_NUMBER"],"a":1,"f":"SELECT INTO exige exactamente una fila: cero filas lanza NO_DATA_FOUND y más de una TOO_MANY_ROWS. No deja la variable en NULL."},
{"c":"pls","s":"P","w":4,"q":"¿Qué imprime?","k":"BEGIN\n  BEGIN\n    RAISE VALUE_ERROR;\n  EXCEPTION\n    WHEN NO_DATA_FOUND THEN\n      DBMS_OUTPUT.PUT_LINE('interno');\n  END;\n  DBMS_OUTPUT.PUT_LINE('sigue');\nEXCEPTION\n  WHEN OTHERS THEN\n    DBMS_OUTPUT.PUT_LINE('externo');\nEND;","o":["interno y sigue","interno y externo","sigue","externo"],"a":3,"f":"El bloque interno no maneja VALUE_ERROR; la excepción se propaga al bloque externo (saltándose 'sigue') donde WHEN OTHERS la captura."},
{"c":"pls","s":"T","w":3,"q":"¿Qué regla aplica a WHEN OTHERS en un manejador de excepciones?","o":["Debe ser el ÚLTIMO manejador del bloque","Puede ir en cualquier posición","Debe ser el primero","Es obligatorio"],"a":0,"f":"WHEN OTHERS captura cualquier excepción no manejada antes, por eso el compilador exige que sea el último (PLS-00370 si no)."},
{"c":"pls","s":"P","w":4,"q":"¿Qué hacen SQLCODE y SQLERRM dentro de un manejador?","k":"EXCEPTION\n  WHEN OTHERS THEN\n    log_error(SQLCODE, SQLERRM);\n    RAISE;","o":["Limpian el error para que no se propague más","Hacen un rollback automático de la transacción","Devuelven el código numérico y el mensaje del error actual","Detienen la ejecución del bloque PL/SQL inmediatamente"],"a":2,"f":"Registrar y relanzar es el patrón correcto: WHEN OTHERS que 'traga' errores sin relanzar oculta fallos (y el warning PLW-06009 lo advierte)."},
{"c":"pls","s":"P","w":4,"q":"¿Qué logra RAISE_APPLICATION_ERROR?","k":"IF v_sal < 0 THEN\n  RAISE_APPLICATION_ERROR(-20001, 'Salario inválido');\nEND IF;","o":["Lanza una excepción personalizada con código entre -20000 y -20999 que llega al cliente con ese mensaje","Solo escribe el error en una tabla de log interna de la aplicación","Reinicia por completo la sesión actual de la base de datos","Lanza solamente un warning visible en el log de la sesión"],"a":0,"f":"Es la vía estándar para errores de negocio: el rango -20000..-20999 está reservado a aplicaciones y el mensaje viaja como ORA-20001 al llamador (visible en SQLException de JDBC)."},
{"c":"pls","s":"T","w":4,"q":"¿Qué hace PRAGMA EXCEPTION_INIT?","o":["Crea una excepción completamente nueva en Oracle","Desactiva el manejo de excepciones en el bloque","Inicializa variables antes de lanzar la excepción","Asocia una excepción declarada por el usuario a un código de error Oracle"],"a":3,"f":"Ejemplo: e_fk EXCEPTION; PRAGMA EXCEPTION_INIT(e_fk, -2292); permite WHEN e_fk THEN en lugar de comparar SQLCODE dentro de WHEN OTHERS."},
{"c":"pls","s":"P","w":3,"q":"¿Cuántas iteraciones ejecuta?","k":"BEGIN\n  FOR i IN REVERSE 1..3 LOOP\n    DBMS_OUTPUT.PUT_LINE(i);\n  END LOOP;\nEND;","o":["3, imprimiendo 1, 2, 3","3, imprimiendo 3, 2, 1","Infinitas","0: REVERSE invierte los límites"],"a":1,"f":"REVERSE itera del límite superior al inferior; los límites se escriben SIEMPRE menor..mayor. El contador i es implícito y de solo lectura."},
{"c":"pls","s":"P","w":4,"q":"¿Qué imprime?","k":"DECLARE\n  v_i NUMBER := 0;\nBEGIN\n  LOOP\n    v_i := v_i + 1;\n    EXIT WHEN v_i >= 3;\n  END LOOP;\n  DBMS_OUTPUT.PUT_LINE(v_i);\nEND;","o":["2","Bucle infinito","3","4"],"a":2,"f":"El LOOP básico requiere EXIT explícito; la condición se cumple cuando v_i llega a 3 y el bucle termina con ese valor."},
{"c":"pls","s":"T","w":3,"q":"¿Qué diferencia hay entre un cursor implícito y uno explícito?","o":["Ninguna diferencia real entre ambos tipos","El explícito es siempre más rápido de ejecutar","El implícito lo gestiona Oracle para cada SELECT INTO/DML","El implícito no existe como concepto en PL/SQL"],"a":2,"f":"SQL%ROWCOUNT, SQL%FOUND informan del último implícito; los explícitos dan control fino y sus propios atributos (cur%FOUND, cur%ROWCOUNT)."},
{"c":"pls","s":"P","w":4,"q":"¿Qué imprime tras un UPDATE que afectó 3 filas?","k":"UPDATE emp SET sal = sal * 1.05 WHERE deptno = 20;\nDBMS_OUTPUT.PUT_LINE(SQL%ROWCOUNT);\nIF SQL%NOTFOUND THEN\n  DBMS_OUTPUT.PUT_LINE('sin cambios');\nEND IF;","o":["NULL","3","0","3 y sin cambios"],"a":1,"f":"SQL%ROWCOUNT reporta las filas del último DML (3); SQL%NOTFOUND es false porque hubo filas afectadas."},
{"c":"pls","s":"P","w":3,"q":"¿Cuál es la secuencia correcta con un cursor explícito?","k":"CURSOR c_emp IS SELECT ename FROM emp;","o":["DECLARE, CLOSE, FETCH","OPEN, FETCH","FETCH, OPEN, CLOSE","EXECUTE, READ, END"],"a":1,"f":"OPEN ejecuta la consulta y posiciona; cada FETCH trae una fila; CLOSE libera recursos. Fetch sin open lanza INVALID_CURSOR."},
{"c":"pls","s":"P","w":4,"q":"¿Qué ventaja tiene este cursor FOR loop?","k":"FOR r IN (SELECT ename, sal FROM emp WHERE deptno = 10) LOOP\n  DBMS_OUTPUT.PUT_LINE(r.ename || ': ' || r.sal);\nEND LOOP;","o":["Es más lento que un cursor explícito tradicional","Requiere declarar %ROWTYPE manualmente antes de usarlo","Permite ejecutar UPDATE directamente sobre el cursor","OPEN, FETCH, EXIT y CLOSE son implícitos, y el registro r se declara automáticamente"],"a":3,"f":"El cursor FOR loop elimina el código repetitivo y cierra el cursor incluso ante excepciones: la forma idiomática de recorrer consultas."},
{"c":"pls","s":"P","w":4,"q":"¿Qué hace WHERE CURRENT OF?","k":"CURSOR c IS SELECT * FROM emp FOR UPDATE;\n...\nUPDATE emp SET sal = sal + 100\nWHERE CURRENT OF c;","o":["Actualiza exactamente la fila que el cursor acaba de recuperar","Actualiza únicamente la primera fila del cursor","Error de sintaxis al combinarlo con FOR UPDATE","Actualiza todas las filas de la tabla completa"],"a":0,"f":"FOR UPDATE bloquea las filas del cursor y WHERE CURRENT OF referencia la fila actual por ROWID: actualización posicionada segura."},
{"c":"pls","s":"T","w":3,"q":"¿Qué diferencia un procedimiento de una función en PL/SQL?","o":["Las funciones no pueden aceptar parámetros de entrada","Ninguna diferencia real entre ambos en PL/SQL","La función DEBE devolver un valor con RETURN y puede usarse en SQL","El procedimiento se ejecuta más rápido siempre"],"a":2,"f":"Solo las funciones (con restricciones de pureza) son invocables dentro de un SELECT; los procedimientos se llaman como sentencias."},
{"c":"pls","s":"P","w":4,"q":"¿Qué imprime?","k":"CREATE PROCEDURE swap(a IN OUT NUMBER, b IN OUT NUMBER) IS\n  t NUMBER;\nBEGIN\n  t := a; a := b; b := t;\nEND;\n-- llamada:\nDECLARE x NUMBER := 1; y NUMBER := 2;\nBEGIN swap(x, y); DBMS_OUTPUT.PUT_LINE(x || ',' || y); END;","o":["1,1","Error: IN OUT no existe","2,1","1,2"],"a":2,"f":"IN OUT permite leer y modificar el argumento: los valores se intercambian y la llamada refleja 2,1."},
{"c":"pls","s":"T","w":4,"q":"¿Qué característica tiene un parámetro OUT al entrar al procedimiento?","o":["Conserva el valor del llamador","Es una constante","Es de solo lectura","Entra como NULL"],"a":3,"f":"OUT inicializa en NULL dentro del procedimiento; IN OUT sí trae el valor original. Con NOCOPY se pasa por referencia (sin copia), con implicaciones ante excepciones."},
{"c":"pls","s":"P","w":4,"q":"¿Se puede llamar así en SQL?","k":"CREATE FUNCTION tax(p_sal NUMBER) RETURN NUMBER IS\nBEGIN\n  RETURN p_sal * 0.16;\nEND;\n-- luego:\nSELECT ename, tax(sal) FROM emp;","o":["Sí: las funciones almacenadas que cumplen las reglas de pureza son invocables por fila en SELECT","No: las funciones PL/SQL nunca se invocan desde SQL","Solo es posible dentro de una cláusula WHERE","Solo es posible usando PRAGMA RESTRICT_REFERENCES"],"a":0,"f":"Es un patrón común, con costo: el cambio de contexto SQL↔PL/SQL por fila. DETERMINISTIC o la cláusula WITH FUNCTION pueden mitigar."},
{"c":"pls","s":"T","w":3,"q":"¿Qué contiene la especificación (spec) de un package frente a su body?","o":["Solo comentarios","Los triggers","El código completo","La interfaz pública"],"a":3,"f":"Separar spec y body permite recompilar implementaciones sin invalidar dependientes, y ocultar procedimientos privados declarados solo en el body."},
{"c":"pls","s":"P","w":4,"q":"¿Qué particularidad tienen las variables declaradas en la spec de un package?","k":"CREATE PACKAGE cfg IS\n  g_contador NUMBER := 0;\nEND;","o":["Son compartidas entre sesiones","Se reinician en cada llamada","No se permiten variables en packages","Mantienen su estado durante TODA la sesión"],"a":3,"f":"El estado de package persiste entre llamadas de la misma sesión (útil como caché); recompilar el package puede invalidarlo (ORA-04068)."},
{"c":"pls","s":"P","w":4,"q":"¿Cuándo se dispara este trigger?","k":"CREATE TRIGGER trg_emp\nBEFORE INSERT OR UPDATE OF sal ON emp\nFOR EACH ROW\nBEGIN\n  :NEW.sal := ROUND(:NEW.sal, 2);\nEND;","o":["Se dispara una sola vez por cada sentencia ejecutada","Después de confirmarse la transacción con COMMIT","Antes de cada FILA insertada o cuya columna sal se actualice","Únicamente cuando se ejecuta un DELETE sobre emp"],"a":2,"f":"FOR EACH ROW lo hace de nivel fila; solo los triggers BEFORE de fila pueden modificar :NEW. En DELETE solo existe :OLD."},
{"c":"pls","s":"T","w":4,"q":"¿Qué provoca el error ORA-04091 (mutating table)?","o":["Un trigger de fila que consulta o modifica LA MISMA tabla que disparó el trigger","Un cursor que quedó abierto sin cerrarse","Un interbloqueo entre dos sesiones concurrentes","Falta de permisos suficientes sobre la tabla"],"a":0,"f":"La tabla está en estado inconsistente durante el DML; soluciones: compound trigger, mover la lógica a nivel de sentencia, o rediseñar."},
{"c":"pls","s":"T","w":3,"q":"¿Qué son :OLD y :NEW en un trigger de fila?","o":["Variables globales del paquete que las declara","Savepoints creados automáticamente por el trigger","Pseudoregistros con los valores previos y nuevos de la fila","Cursores abiertos implícitamente por Oracle"],"a":2,"f":"En INSERT solo :NEW tiene datos; en DELETE solo :OLD; en UPDATE ambos. Se referencian sin ':' dentro de la cláusula WHEN."},
{"c":"pls","s":"P","w":5,"q":"¿Qué hace este bulk processing?","k":"DECLARE\n  TYPE t_ids IS TABLE OF emp.empno%TYPE;\n  v_ids t_ids;\nBEGIN\n  SELECT empno BULK COLLECT INTO v_ids FROM emp;\n  FORALL i IN v_ids.FIRST .. v_ids.LAST\n    UPDATE emp SET sal = sal * 1.1 WHERE empno = v_ids(i);\nEND;","o":["Procesa cada fila de forma individual y completamente secuencial","Da error de compilación: FORALL no admite sentencias UPDATE","Es equivalente en rendimiento a recorrer un cursor con un FOR loop","Carga todos los IDs en UNA operación y ejecuta los UPDATE en UN solo envío al motor SQL: minimiza cambios de contexto"],"a":3,"f":"BULK COLLECT y FORALL reducen los context switches PL/SQL↔SQL: en volúmenes grandes puede ser un orden de magnitud más rápido que el bucle fila a fila."},
{"c":"pls","s":"T","w":4,"q":"¿Qué hace la cláusula LIMIT en BULK COLLECT?","o":["Ordena los resultados antes de recolectarlos","No tiene ningún efecto sobre el rendimiento","Controla cuántas filas se traen por FETCH, acotando el consumo de memoria PGA","Limita el total de filas que la consulta puede procesar"],"a":2,"f":"FETCH c BULK COLLECT INTO v LIMIT 1000 en un bucle procesa por lotes: sin LIMIT, una tabla enorme puede agotar memoria."},
{"c":"pls","s":"P","w":4,"q":"¿Qué diferencia hay entre estas colecciones?","k":"TYPE t1 IS TABLE OF NUMBER;                    -- nested table\nTYPE t2 IS TABLE OF NUMBER INDEX BY PLS_INTEGER; -- ?\nTYPE t3 IS VARRAY(10) OF NUMBER;","o":["t1 solo acepta 10 elementos","t2 es un associative array","Son idénticas","t3 es ilimitado"],"a":1,"f":"Associative arrays viven solo en memoria PL/SQL y admiten índices no consecutivos (o VARCHAR2); nested tables y varrays son tipos SQL almacenables."},
{"c":"pls","s":"P","w":4,"q":"¿Qué imprime?","k":"DECLARE\n  TYPE t_tab IS TABLE OF VARCHAR2(10) INDEX BY PLS_INTEGER;\n  v t_tab;\nBEGIN\n  v(1) := 'a';\n  v(5) := 'b';\n  DBMS_OUTPUT.PUT_LINE(v.COUNT || ' ' || v.LAST);\nEND;","o":["2 2","5 5","Error de índice","2 5"],"a":3,"f":"El array asociativo es disperso: COUNT cuenta elementos existentes (2) y LAST devuelve el mayor índice usado (5)."}
);

{"c":"pls","s":"P","w":4,"q":"¿Qué hace SAVE EXCEPTIONS en FORALL?","k":"FORALL i IN 1..v.COUNT SAVE EXCEPTIONS\n  INSERT INTO destino VALUES v(i);\nEXCEPTION\n  WHEN OTHERS THEN\n    FOR j IN 1..SQL%BULK_EXCEPTIONS.COUNT LOOP ... END LOOP;","o":["Continúa procesando pese a errores individuales y los acumula en SQL%BULK_EXCEPTIONS","Guarda las excepciones en una tabla de auditoría","Detiene el FORALL apenas ocurre el primer error","Ignora silenciosamente todos los errores del lote"],"a":0,"f":"Sin SAVE EXCEPTIONS el primer fallo aborta el lote; con ella se completa lo posible y luego se lanza ORA-24381 con el detalle por índice."},
{"c":"pls","s":"T","w":3,"q":"¿Qué es un REF CURSOR y para qué se usa?","o":["Un tipo especial de índice sobre la tabla","Un cursor estático que apunta a una sola consulta","Un puntero a un cursor que puede abrirse con distintas consultas y pasarse entre programas","Una vista materializada sobre el resultado"],"a":2,"f":"SYS_REFCURSOR es el tipo débil predefinido; es el mecanismo estándar para devolver conjuntos de resultados desde procedimientos a JDBC u otros lenguajes."},
{"c":"pls","s":"P","w":4,"q":"¿Cómo consume Java este procedimiento?","k":"CREATE PROCEDURE get_emps(p_cur OUT SYS_REFCURSOR) IS\nBEGIN\n  OPEN p_cur FOR SELECT * FROM emp;\nEND;","o":["Registrando el parámetro como OracleTypes.CURSOR y leyendo el resultado como ResultSet","Con un executeQuery directo sobre el procedimiento","Con el método getGeneratedKeys del Statement","No es posible consumir cursores desde Java"],"a":0,"f":"CallableStatement + registerOutParameter(1, OracleTypes.CURSOR) permite castear el OUT a ResultSet: puente clásico PL/SQL→JDBC."},
{"c":"pls","s":"P","w":4,"q":"¿Qué riesgo tiene este SQL dinámico?","k":"EXECUTE IMMEDIATE\n  'DELETE FROM logs WHERE origen = ''' || p_origen || '''';","o":["Falta hacer commit tras el DELETE dinámico","EXECUTE IMMEDIATE no admite sentencias DELETE","Inyección SQL: p_origen se concatena","Ninguno, el patrón es seguro tal cual"],"a":2,"f":"Igual que en JDBC: concatenar datos en SQL dinámico permite inyección y fuerza hard parses; USING liga variables de forma segura y eficiente."},
{"c":"pls","s":"P","w":4,"q":"¿Qué imprime?","k":"DECLARE\n  v_cnt NUMBER;\nBEGIN\n  EXECUTE IMMEDIATE\n    'SELECT COUNT(*) FROM emp WHERE deptno = :d'\n    INTO v_cnt USING 10;\n  DBMS_OUTPUT.PUT_LINE(v_cnt);\nEND;","o":["El número de empleados del dept 10","NULL","0 siempre","Error: INTO no se usa con EXECUTE IMMEDIATE"],"a":0,"f":"EXECUTE IMMEDIATE admite INTO para consultas de una fila y USING para binds posicionales: SQL dinámico con parámetros seguros."},
{"c":"pls","s":"T","w":4,"q":"¿Qué hace PRAGMA AUTONOMOUS_TRANSACTION?","o":["Desactiva por completo la generación de redo en el bloque actual","Ejecuta el bloque en una transacción independiente que puede hacer COMMIT sin afectar la transacción principal","Acelera la ejecución de la transacción actual reduciendo el I/O","Impide que se pueda hacer rollback en el resto de la sesión"],"a":1,"f":"Típico en logging de errores: el log se confirma aunque la transacción principal haga rollback. Debe terminar en COMMIT o ROLLBACK propio o lanza ORA-06519."},
{"c":"pls","s":"P","w":4,"q":"¿Qué imprime?","k":"DECLARE\n  v VARCHAR2(3);\nBEGIN\n  v := 'ABCD';\n  DBMS_OUTPUT.PUT_LINE(v);\nEXCEPTION\n  WHEN VALUE_ERROR THEN\n    DBMS_OUTPUT.PUT_LINE('muy largo');\nEND;","o":["muy largo","Error de compilación","ABCD","ABC (truncado)"],"a":0,"f":"Asignar 4 caracteres a VARCHAR2(3) lanza ORA-06502 (VALUE_ERROR) en runtime; PL/SQL no trunca implícitamente en asignaciones."},
{"c":"pls","s":"T","w":3,"q":"¿Qué diferencia hay entre NUMBER y PLS_INTEGER para contadores?","o":["Ninguna diferencia relevante entre ambos tipos","PLS_INTEGER acepta valores decimales igual que NUMBER","NUMBER siempre es más rápido en cualquier operación","PLS_INTEGER usa aritmética de hardware y menos memoria: más rápido en bucles"],"a":3,"f":"PLS_INTEGER (y SIMPLE_INTEGER con NOT NULL y wrap) opera en registros de máquina; NUMBER está optimizado para exactitud, no velocidad."},
{"c":"pls","s":"P","w":4,"q":"¿Qué valor tiene v tras el bloque?","k":"DECLARE\n  v NUMBER;\nBEGIN\n  IF NULL = NULL THEN v := 1;\n  ELSIF NULL IS NULL THEN v := 2;\n  ELSE v := 3;\n  END IF;\nEND;","o":["NULL","1","3","2"],"a":3,"f":"NULL = NULL evalúa a UNKNOWN (no verdadero); la rama correcta es IS NULL: v = 2. La lógica trivaluada aplica igual en PL/SQL."},
{"c":"pls","s":"P","w":3,"q":"¿Qué imprime?","k":"DECLARE\n  v_estado VARCHAR2(10) := 'B';\nBEGIN\n  CASE v_estado\n    WHEN 'A' THEN DBMS_OUTPUT.PUT_LINE('Activo');\n    WHEN 'B' THEN DBMS_OUTPUT.PUT_LINE('Baja');\n    ELSE DBMS_OUTPUT.PUT_LINE('Otro');\n  END CASE;\nEND;","o":["Baja","Activo","Otro","CASE_NOT_FOUND"],"a":0,"f":"El CASE sentencia (simple) compara contra cada WHEN; sin ELSE y sin coincidencia lanzaría CASE_NOT_FOUND (ORA-06592), a diferencia de la expresión CASE que daría NULL."},
{"c":"pls","s":"T","w":3,"q":"¿Cuándo cambia un objeto PL/SQL a estado INVALID?","o":["Al hacer rollback de la transacción actual","Solo si el objeto se borra explícitamente","Cuando cambia un objeto del que depende","Nunca, una vez compilado permanece válido"],"a":2,"f":"La invalidación en cascada es normal tras ALTER TABLE o recompilar dependencias; USER_OBJECTS.status y USER_ERRORS muestran el estado y los errores."},
{"c":"pls","s":"P","w":4,"q":"¿Qué muestra este código para depurar errores de compilación?","k":"SELECT line, text\nFROM user_errors\nWHERE name = 'MI_PROC'\nORDER BY sequence;","o":["El plan de ejecución de la última consulta","Muestra el código fuente completo del procedimiento","Los errores de compilación del procedimiento con su línea","Los datos almacenados en la tabla relacionada"],"a":2,"f":"USER_ERRORS es el equivalente a SHOW ERRORS: línea, posición y mensaje de cada error del objeto almacenado."},
{"c":"pls","s":"P","w":4,"q":"¿Qué hace DETERMINISTIC en una función?","k":"CREATE FUNCTION area(r NUMBER)\nRETURN NUMBER DETERMINISTIC IS\nBEGIN\n  RETURN 3.14159 * r * r;\nEND;","o":["Declara que con las mismas entradas devuelve siempre lo mismo: habilita cachear resultados y usarla en índices basados en función","Hace que la función se ejecute de forma autónoma en una transacción separada, sin afectar a la principal","No tiene ningún efecto real sobre la función más allá de documentar su intención","Impide que la función se use dentro de una sentencia SQL, solo permite llamadas PL/SQL"],"a":0,"f":"Es un contrato del programador (Oracle no lo verifica): permite function-based indexes y evita reevaluaciones. Mentir en él produce resultados incorrectos."},
{"c":"pls","s":"T","w":4,"q":"¿Qué aporta RESULT_CACHE a una función?","o":["Solo funciona si además la función está marcada como DETERMINISTIC","Duplica el tamaño de memoria PGA asignada a la sesión actual","Un cache local válido únicamente dentro de la sesión que lo generó","Oracle guarda los resultados en la shared pool y los comparte ENTRE sesiones, invalidando al cambiar las tablas dependientes"],"a":3,"f":"El result cache de funciones acelera lookups repetidos de datos casi estáticos; RELIES_ON se detecta automáticamente desde 11gR2."},
{"c":"pls","s":"P","w":5,"q":"¿Qué patrón muestra este compound trigger?","k":"CREATE TRIGGER trg_audit\nFOR UPDATE ON emp\nCOMPOUND TRIGGER\n  TYPE t_ids IS TABLE OF NUMBER;\n  g_ids t_ids := t_ids();\n  AFTER EACH ROW IS BEGIN\n    g_ids.EXTEND; g_ids(g_ids.COUNT) := :NEW.empno;\n  END AFTER EACH ROW;\n  AFTER STATEMENT IS BEGIN\n    audit_pkg.log_bulk(g_ids);\n  END AFTER STATEMENT;\nEND;","o":["Acumula IDs por fila y procesa en bloque al final de la sentencia: evita mutating table y N llamadas de log","Error: no se pueden mezclar distintos timings en un mismo trigger","Se comporta exactamente igual que un trigger de fila normal","Declara en realidad dos triggers independientes sobre la tabla"],"a":0,"f":"El compound trigger comparte estado entre los timing points de UNA sentencia: patrón estándar contra ORA-04091 y para auditoría eficiente."},
{"c":"pls","s":"P","w":3,"q":"¿Qué imprime?","k":"DECLARE\n  v BOOLEAN := TRUE;\nBEGIN\n  IF v THEN\n    DBMS_OUTPUT.PUT_LINE('sí');\n  END IF;\nEND;","o":["Error: BOOLEAN no existe en PL/SQL","sí","Nada","TRUE"],"a":1,"f":"BOOLEAN existe en PL/SQL (no como tipo de columna SQL hasta 23c); el IF lo evalúa directamente."},
{"c":"pls","s":"T","w":3,"q":"¿Puede una columna de tabla ser BOOLEAN en Oracle 19c?","o":["No: BOOLEAN es solo de PL/SQL en esa versión","Solo puede usarse en tablas temporales","Solo es posible declarándolo con un CHECK","Sí, desde la versión 19c está disponible"],"a":0,"f":"El tipo BOOLEAN en SQL llegó en Oracle 23c; en 19c y anteriores se usa la convención 'Y'/'N' o 0/1 con CHECK."},
{"c":"pls","s":"P","w":4,"q":"¿Qué hace este código de paquete UTL?","k":"DBMS_OUTPUT.PUT_LINE(\n  UTL_RAW.CAST_TO_VARCHAR2(\n    UTL_RAW.CAST_TO_RAW('AB')));","o":["Imprime AB (ida y vuelta de conversión)","Imprime el valor hexadecimal 4142","Error al convertir la cadena a bytes crudos","Imprime BA, invirtiendo el orden original"],"a":0,"f":"CAST_TO_RAW convierte a bytes (4142 hex) y CAST_TO_VARCHAR2 los reinterpreta como texto: la ida y vuelta restaura 'AB'."},
{"c":"pls","s":"P","w":4,"q":"¿Cuándo se ejecuta realmente el DML de este bloque?","k":"BEGIN\n  INSERT INTO t VALUES (1);\n  -- sin COMMIT\nEND;\n/","o":["El insert está hecho pero NO confirmado: otra sesión no lo ve hasta COMMIT","El insert queda confirmado apenas termina el bloque","Se revierte automáticamente al salir del bloque","El bloque completo falla si no hay COMMIT explícito"],"a":0,"f":"Los bloques PL/SQL no confirman automáticamente; la transacción sigue abierta en la sesión. Salir del cliente puede confirmar o revertir según la herramienta."},
{"c":"pls","s":"T","w":3,"q":"¿Qué hace el paquete DBMS_SCHEDULER?","o":["Genera secuencias","Administra memoria","Programa y gestiona trabajos","Optimiza consultas"],"a":2,"f":"CREATE_JOB con repeat_interval (sintaxis calendario: FREQ=DAILY;BYHOUR=2) reemplaza al antiguo DBMS_JOB."},
{"c":"pls","s":"P","w":4,"q":"¿Qué devuelve v?","k":"DECLARE\n  v NUMBER;\n  FUNCTION f RETURN NUMBER IS\n  BEGIN\n    RETURN 10;\n    v := 99; -- línea X\n  END;\nBEGIN\n  v := f;\n  DBMS_OUTPUT.PUT_LINE(v);\nEND;","o":["10: el código tras RETURN es inalcanzable","Error de compilación por el código tras la línea X","99, porque la asignación sí llega a ejecutarse","NULL, ya que la función nunca retorna valor"],"a":0,"f":"RETURN termina la función inmediatamente; la asignación posterior nunca se ejecuta (PL/SQL puede advertirlo con PLW-06002 pero compila)."},
{"c":"pls","s":"T","w":4,"q":"¿Qué significan los niveles de PRAGMA en funciones para SQL: WNDS, RNDS?","o":["Definen distintos tipos de trigger disponibles en Oracle","Son simplemente nombres alternativos de índices del diccionario","Restricciones de pureza históricas: Write/Read No Database State, usadas con RESTRICT_REFERENCES en packages","Controlan los distintos modos de apertura de un cursor explícito"],"a":2,"f":"RESTRICT_REFERENCES declaraba garantías de pureza (hoy Oracle las verifica automáticamente en la mayoría de casos); WNDS es obligatoria para funciones llamadas desde SQL."},
{"c":"pls","s":"P","w":4,"q":"¿Qué logra este uso de MERGE dentro de PL/SQL?","k":"MERGE INTO stock s\nUSING (SELECT :id id, :qty qty FROM dual) src\nON (s.prod_id = src.id)\nWHEN MATCHED THEN UPDATE SET s.qty = s.qty + src.qty\nWHEN NOT MATCHED THEN INSERT VALUES (src.id, src.qty);","o":["Solo inserta filas nuevas, sin actualizar las que ya existen en la tabla destino","Error: MERGE no admite una subconsulta USING basada en dual","Upsert atómico de una fila: suma stock si existe, la crea si no, en una sola sentencia sin condición de carrera de SELECT previo","Borra la fila existente e inserta una nueva en su lugar, perdiendo el historial"],"a":2,"f":"El patrón SELECT-luego-INSERT/UPDATE tiene ventana de carrera; MERGE resuelve la decisión dentro del motor en una sentencia."},
{"c":"pls","s":"P","w":3,"q":"¿Qué imprime?","k":"BEGIN\n  FOR i IN 1..3 LOOP\n    CONTINUE WHEN i = 2;\n    DBMS_OUTPUT.PUT_LINE(i);\n  END LOOP;\nEND;","o":["1 2 3","3","1 3","1 2"],"a":2,"f":"CONTINUE WHEN (11g+) salta a la siguiente iteración cuando la condición se cumple: omite el 2."},
{"c":"pls","s":"T","w":3,"q":"¿Qué privilegio se necesita para ejecutar un procedimiento de otro esquema?","o":["SELECT sobre el procedimiento del otro esquema","EXECUTE sobre el procedimiento","DBA, el rol administrativo completo","CREATE PROCEDURE en el esquema propio"],"a":1,"f":"GRANT EXECUTE ON hr.mi_proc TO app; por defecto el procedimiento corre con los derechos del DEFINIDOR (definer's rights) salvo AUTHID CURRENT_USER."},
{"c":"pls","s":"T","w":4,"q":"¿Qué cambia AUTHID CURRENT_USER en un procedimiento?","o":["No cambia nada respecto al comportamiento por defecto","Se ejecuta con los privilegios y resolución de nombres del INVOCADOR, no del dueño","Convierte automáticamente al procedimiento en autónomo","Requiere privilegios de DBA para poder compilarse"],"a":1,"f":"Invoker's rights: el mismo código opera sobre los objetos del usuario que lo llama; el default (DEFINER) usa los del propietario, útil para encapsular seguridad."},
{"c":"pls","s":"P","w":4,"q":"¿Qué imprime?","k":"DECLARE\n  x NUMBER := 5;\nBEGIN\n  DECLARE\n    x NUMBER := 10;\n  BEGIN\n    DBMS_OUTPUT.PUT_LINE(x);\n  END;\n  DBMS_OUTPUT.PUT_LINE(x);\nEND;","o":["10 y 5","10 y 10","5 y 10","Error: x duplicada"],"a":0,"f":"La declaración interna oculta (shadowing) a la externa dentro de su bloque; al salir, la x externa recupera visibilidad. Un label <<outer>> permitiría outer.x."},
{"c":"pls","s":"P","w":4,"q":"¿Qué evalúa correctamente cadenas nulas en Oracle?","k":"DECLARE\n  v VARCHAR2(10) := '';\nBEGIN\n  IF v IS NULL THEN DBMS_OUTPUT.PUT_LINE('nula');\n  ELSE DBMS_OUTPUT.PUT_LINE('vacía');\n  END IF;\nEND;","o":["Lanza un error al comparar la cadena vacía con NULL","Devuelve 'vacía', distinguiéndola claramente de NULL","No hace nada, la condición nunca se evalúa","nula: en Oracle la cadena vacía '' ES NULL"],"a":3,"f":"Peculiaridad de Oracle: '' y NULL son indistinguibles en VARCHAR2 (a diferencia del estándar SQL y de otras BD). Afecta comparaciones y constraints."},
{"c":"pls","s":"T","w":3,"q":"¿Para qué sirve DBMS_UTILITY.FORMAT_ERROR_BACKTRACE?","o":["Formatea números dentro de un bloque PL/SQL","Reintenta automáticamente la operación fallida","Cambia el idioma en que se muestran los errores","Obtener la LÍNEA exacta donde se originó la excepción, complementando SQLERRM"],"a":3,"f":"SQLERRM da el mensaje pero no el origen; FORMAT_ERROR_BACKTRACE reconstruye la pila de líneas: esencial en manejadores WHEN OTHERS de bloques grandes."},
{"c":"pls","s":"P","w":5,"q":"¿Qué problema de rendimiento tiene este código?","k":"FOR r IN (SELECT empno FROM emp) LOOP  -- 1M filas\n  UPDATE emp SET sal = sal * 1.1\n  WHERE empno = r.empno;\nEND LOOP;\nCOMMIT;","o":["Falta índice en sal","Ninguno","Procesamiento fila a fila","El COMMIT está mal ubicado"],"a":2,"f":"Regla de oro: si se puede hacer en un solo SQL, hágalo en SQL. El bucle genera 1M de round-trips lógicos; UPDATE emp SET sal = sal*1.1 lo hace en una operación."}

{"c":"opt","s":"T","w":3,"q":"¿Por qué esta condición impide usar el índice sobre hiredate?","o":["Aplicar una función a la columna indexada","Los índices no funcionan con fechas","El índice solo sirve en PKs","Falta un hint"],"a":0,"f":"El índice almacena hiredate, no TRUNC(hiredate). Soluciones: reescribir como rango (hiredate >= x AND hiredate < y) o crear un function-based index."},
{"c":"opt","s":"P","w":4,"q":"¿Cuál reescritura permite usar el índice de hiredate?","k":"-- original:\nSELECT * FROM emp\nWHERE TO_CHAR(hiredate,'YYYY') = '2024';","o":["WHERE EXTRACT(YEAR FROM hiredate) = 2024","WHERE TRUNC(hiredate,'YYYY') = DATE '2024-01-01'","No hay forma de reescribir esta condición","WHERE hiredate >= DATE '2024-01-01' AND hiredate < DATE '2025-01-01'"],"a":3,"f":"El predicado de rango (sargable) sobre la columna desnuda habilita un INDEX RANGE SCAN; las tres variantes con función sobre la columna lo impiden."},
{"c":"opt","s":"T","w":3,"q":"¿Qué muestra EXPLAIN PLAN / DBMS_XPLAN.DISPLAY?","o":["El tiempo real que tardó la consulta en ejecutarse","Los locks que están activos sobre la tabla","El plan de ejecución ESTIMADO: operaciones, orden, cardinalidades y costos previstos","Muestra los datos reales devueltos por la consulta"],"a":2,"f":"Es una estimación del optimizador; para el plan REAL con estadísticas de ejecución use DBMS_XPLAN.DISPLAY_CURSOR con el hint GATHER_PLAN_STATISTICS."},
{"c":"opt","s":"T","w":4,"q":"¿Cuándo un FULL TABLE SCAN es MEJOR que un acceso por índice?","o":["Solo cuando la tabla es muy pequeña y cabe entera en el buffer cache, únicamente entonces","Cuando existe un índice único sobre la columna filtrada en el WHERE","Cuando la consulta lee un porcentaje alto de la tabla: las lecturas multibloque secuenciales superan a millones de accesos aleatorios por rowid","Nunca es mejor que un acceso indexado, sin importar cuántas filas se devuelvan"],"a":2,"f":"El índice implica lectura del índice + salto a la tabla por fila; con alta selectividad de filas devueltas, el escaneo completo con multiblock reads es más barato. El optimizador decide por costo."},
{"c":"opt","s":"P","w":4,"q":"¿Qué operación del plan indica un problema probable aquí?","k":"SELECT e.*, d.*\nFROM emp e, dept d\nWHERE e.sal > 1000;\n-- Plan: MERGE JOIN CARTESIAN","o":["El filtro sobre la columna sal en el WHERE","El producto cartesiano: falta la condición de join e.deptno = d.deptno","El acceso por índice a la tabla dept","Ninguno, el plan es completamente normal"],"a":1,"f":"MERGE JOIN CARTESIAN con tablas medianas suele delatar un join olvidado: el resultado crece multiplicativamente. A veces es legítimo con tablas diminutas."},
{"c":"opt","s":"T","w":4,"q":"¿Qué método de join conviene para unir dos tablas GRANDES sin índices útiles por una igualdad?","o":["HASH JOIN","NESTED LOOPS","MERGE JOIN CARTESIAN","Cualquiera da igual"],"a":0,"f":"HASH JOIN construye una tabla hash con la entrada menor y sondea con la mayor: ideal para equijoins masivos. NESTED LOOPS brilla con pocas filas dirigidas por índice."},
{"c":"opt","s":"T","w":3,"q":"¿Qué recolecta DBMS_STATS.GATHER_TABLE_STATS y por qué importa?","o":["Privilegios","Estadísticas","Backups","Índices nuevos"],"a":1,"f":"El optimizador basado en costos decide TODO a partir de estadísticas; tras cargas masivas, recolectarlas evita estimaciones erróneas de cardinalidad."},
{"c":"opt","s":"P","w":4,"q":"¿Por qué esta consulta con bind podría usar un plan subóptimo para 'RARO'?","k":"SELECT * FROM pedidos WHERE estado = :b;\n-- 99% de filas 'PROCESADO', 1% 'RARO', histograma presente","o":["Los binds no usan índices","El histograma rompe la consulta","Bind peeking: el plan se fijó con el primer valor visto","Los literales son siempre mejores"],"a":2,"f":"Con datos sesgados, el plan óptimo depende del valor: Oracle 'espía' el primer bind y desde 11g el adaptive cursor sharing genera planes por rango de selectividad."},
{"c":"opt","s":"T","w":3,"q":"¿Qué índice soporta esta consulta: WHERE deptno = 10 ORDER BY sal?","o":["Dos índices separados siempre","Índice en (sal, deptno)","Índice compuesto en","Índice en (sal)"],"a":2,"f":"La columna de igualdad primero y la de orden después permiten INDEX RANGE SCAN que ya entrega el orden requerido, eliminando el paso de ordenación."},
{"c":"opt","s":"T","w":4,"q":"¿Puede usarse un índice en (a, b) para WHERE b = 5 sin condición sobre a?","o":["Solo con hint FULL","No con range scan normal","Nunca","Sí, igual que con a"],"a":1,"f":"El skip scan recorre el índice por cada valor de la columna líder: viable con baja cardinalidad de a, pero raramente óptimo. El orden de columnas del índice compuesto importa."},
{"c":"opt","s":"P","w":4,"q":"¿Qué problema tiene SELECT * en esta consulta de reporte?","k":"SELECT * FROM ventas v JOIN clientes c ON ...\n-- solo se usan 3 columnas de 40","o":["Bloquea la tabla mientras se ejecuta la consulta","SELECT * simplemente no compila en Oracle","Transfiere y procesa columnas innecesarias, impide índices covering y aumenta memoria/red","Ninguno, SELECT * es igual de eficiente siempre"],"a":2,"f":"Si las columnas pedidas están todas en un índice, Oracle resuelve sin tocar la tabla (index-only). SELECT * lo imposibilita y acopla el código a cambios de esquema."},
{"c":"opt","s":"T","w":4,"q":"¿Qué es un índice bitmap y dónde conviene?","o":["Mapas de bits por valor: eficiente en columnas de BAJA cardinalidad en entornos de LECTURA (DWH); pésimo con DML concurrente","El tipo de índice que Oracle crea por defecto al declarar una clave primaria","Un índice pensado específicamente para almacenar imágenes y archivos binarios","Solo puede usarse sobre claves primarias declaradas como UNIQUE"],"a":0,"f":"Los bitmaps se combinan con AND/OR a nivel de bits (estrella de DWH), pero un UPDATE bloquea rangos de filas: contraindicados en OLTP concurrente."},
{"c":"opt","s":"P","w":5,"q":"¿Cuál de estas consultas evita la subconsulta correlacionada por fila?","k":"-- original (lenta con emp grande):\nSELECT e.ename FROM emp e\nWHERE e.sal > (SELECT AVG(sal) FROM emp e2\n               WHERE e2.deptno = e.deptno);","o":["No se puede mejorar","Convertirla en NOT IN","SELECT ename FROM","Agregar ROWNUM"],"a":2,"f":"La función analítica calcula el promedio por departamento en UNA pasada; la correlacionada lógicamente re-agrega por cada fila (aunque el optimizador a veces la reescribe solo)."},
{"c":"opt","s":"T","w":3,"q":"¿Qué diferencia EXISTS de IN en subconsultas, en términos de optimización?","o":["El optimizador moderno suele transformarlas al mismo plan","IN nunca puede aprovechar un índice disponible","EXISTS bloquea las filas que va evaluando","EXISTS siempre supera en rendimiento a IN"],"a":0,"f":"Oracle convierte ambas en semi-joins cuando puede. La regla práctica: prefiera NOT EXISTS sobre NOT IN por el comportamiento con NULLs, no por velocidad."},
{"c":"opt","s":"P","w":4,"q":"¿Qué delata este plan sobre el índice?","k":"WHERE UPPER(ename) = 'SMITH'\n-- Plan: TABLE ACCESS FULL en EMP (existe índice en ename)","o":["Falta hacer commit tras crear el índice","SMITH no existe en la tabla EMP","UPPER() sobre la columna impide el índice normal","El índice está corrupto y debe reconstruirse"],"a":2,"f":"CREATE INDEX ix ON emp(UPPER(ename)) materializa la expresión y el mismo predicado pasa a usar INDEX RANGE SCAN."},
{"c":"opt","s":"T","w":4,"q":"¿Qué logra el particionamiento por rango de fechas en una tabla de millones de filas?","o":["Partition pruning: las consultas por fecha leen SOLO las particiones relevantes, y el mantenimiento se hace por partición","Comprime automáticamente los datos de todas las particiones sin configuración","Genera índices más pequeños únicamente, sin cambiar el plan de acceso","Duplica los datos entre las distintas particiones para redundancia"],"a":0,"f":"WHERE fecha >= ... permite podar particiones enteras del plan; DROP PARTITION purga meses antiguos en segundos frente a un DELETE masivo."},
{"c":"opt","s":"P","w":4,"q":"¿Cuál es el problema de rendimiento en Java?","k":"for (Order o : orders) {          // 10.000 pedidos\n    var ps = conn.prepareStatement(\n        \"SELECT * FROM items WHERE order_id = \" + o.id());\n    ...\n}","o":["La lista de pedidos es demasiado grande para Java","Solo el riesgo de inyección SQL en la consulta","Nada, el patrón es aceptable en producción","Problema N+1 + SQL literal: 10.000 consultas y hard parses en vez de un solo JOIN"],"a":3,"f":"El patrón N+1 multiplica la latencia de red; además cada literal distinto genera un hard parse que contamina la shared pool. Un JOIN único resuelve en un round-trip."},
{"c":"opt","s":"T","w":3,"q":"¿Qué mide la 'selectividad' de un predicado?","o":["El número total de columnas de la tabla","La cantidad de memoria usada por la consulta","La velocidad de lectura del disco duro","La fracción de filas que devuelve: predicados muy selectivos favorecen índices"],"a":3,"f":"El optimizador estima la selectividad con estadísticas para elegir índice vs full scan y el orden de joins; por eso los histogramas importan en datos sesgados."},
{"c":"opt","s":"P","w":4,"q":"¿Por qué es mala idea COMMIT dentro del bucle?","k":"FOR r IN c LOOP\n  UPDATE ...;\n  COMMIT;  -- cada fila\nEND LOOP;","o":["El commit simplemente falla dentro de un bucle","Es obligatorio hacerlo tras cada fila procesada","Solo consume más CPU, sin otro efecto","Cada commit fuerza escritura síncrona de redo"],"a":3,"f":"Commits masivos por fila degradan el rendimiento y arriesgan snapshot too old sobre el cursor abierto. Confirme por lotes o al final de la unidad lógica."},
{"c":"opt","s":"T","w":4,"q":"¿Qué es un covering index (índice cubridor)?","o":["Un índice que contiene TODAS las columnas que la consulta necesita: se responde sin acceder a la tabla","Un índice que cifra el contenido de sus columnas por seguridad","Un tipo particular de índice bitmap orientado a lectura masiva","Un índice construido sobre absolutamente todas las columnas de la tabla"],"a":0,"f":"Eliminar el TABLE ACCESS BY INDEX ROWID ahorra los accesos aleatorios a la tabla; se logra agregando al índice las columnas del SELECT."},
{"c":"opt","s":"P","w":4,"q":"¿Qué mejora aporta el fetch size aquí?","k":"st.setFetchSize(500);\nvar rs = st.executeQuery(\"SELECT ... 100000 filas\");","o":["Nada medible","Aumenta el paralelismo del servidor","Limita a 500 filas","Reduce los round-trips de red de ~10.000"],"a":3,"f":"Cada viaje de red tiene latencia fija; traer 500 filas por viaje amortiza ese costo. El valor óptimo balancea memoria y latencia."},
{"c":"opt","s":"T","w":3,"q":"¿Qué caracteriza a una consulta 'sargable'?","o":["Que sus predicados permiten aprovechar índices: columna limpia comparada con expresión, sin funciones sobre la columna","Que la consulta use SELECT * en vez de listar columnas específicas","Que la consulta incluya hints de optimización explícitos en el texto","Que la consulta incluya obligatoriamente una cláusula GROUP BY"],"a":0,"f":"Search ARGument ABLE: col = valor, col > valor, col LIKE 'x%' son sargables; NVL(col,0) = 0, col + 1 = 10 y LIKE '%x' no lo son."},
{"c":"opt","s":"P","w":4,"q":"¿Cuál LIKE puede usar un índice normal sobre ename?","k":"A) WHERE ename LIKE '%SON'\nB) WHERE ename LIKE 'JO%'\nC) WHERE ename LIKE '%MI%'","o":["Ninguno de los tres puede usar un índice normal","El patrón C: '%MI%', buscando en cualquier posición","El patrón A: '%SON', buscando un sufijo fijo","El patrón B: el prefijo fijo 'JO%' permite un range scan"],"a":3,"f":"El índice B-tree ordena por el inicio de la cadena: solo el patrón con prefijo literal delimita un rango. Para sufijos: índice sobre REVERSE(ename) o Oracle Text."},
{"c":"opt","s":"T","w":4,"q":"¿Qué indica una espera alta en 'db file sequential read'?","o":["Lecturas de UN bloque","Lecturas multibloque de full scans","Bloqueos de filas","Problemas de red"],"a":0,"f":"Contraintuitivo: sequential read = single block (índices); scattered read = multiblock (full scans). Son los eventos base del diagnóstico de I/O en AWR."},
{"c":"opt","s":"P","w":5,"q":"¿Qué transformación reduce este DELETE masivo de horas a minutos?","k":"DELETE FROM logs WHERE fecha < ADD_MONTHS(SYSDATE, -12);\n-- borra 200M de 250M filas","o":["CTAS: crear tabla nueva con el 20% a conservar, índices, y reemplazar (o particionar y hacer DROP PARTITION)","Aumentar el tamaño del tablespace de undo para soportar la transacción","Agregar un índice sobre la columna fecha antes de ejecutar el DELETE","Ejecutarlo de noche, fuera del horario laboral, sin cambiar la estrategia"],"a":0,"f":"Borrar el 80% genera undo/redo gigantescos; recrear con CREATE TABLE AS SELECT lo que se conserva (o particionar y soltar particiones) es el enfoque estándar para purgas masivas."},
{"c":"opt","s":"T","w":3,"q":"¿Qué hace el hint /*+ INDEX(e ix_emp_dept) */?","o":["Sugiere (fuerza si es válido) al optimizador usar ese índice para esa tabla","Recolecta estadísticas actualizadas de la tabla","Crea físicamente el índice mencionado en la tabla","Solo documenta la intención de la consulta"],"a":0,"f":"Un hint parchea un plan puntual pero congela decisiones: si los datos cambian, puede volverse dañino. Primero: estadísticas correctas, predicados sargables e índices adecuados."},
{"c":"opt","s":"T","w":4,"q":"¿Qué causa el error ORA-01555 (snapshot too old)?","o":["Demasiados índices creados sobre la tabla consultada","Una consulta larga necesita versiones de undo ya sobrescritas para mantener su lectura consistente","Una clave foránea que quedó en estado inválido tras un ALTER","Falta de espacio disponible en el disco para el tablespace"],"a":1,"f":"La lectura consistente reconstruye datos desde undo; si la consulta dura más que la retención de undo (o hay commits en su propio bucle), las versiones desaparecen. Solución: undo_retention adecuado y evitar fetch-across-commit."},
{"c":"opt","s":"P","w":4,"q":"¿Qué patrón de caché muestra y qué riesgo tiene?","k":"// Java\nMap<Integer, Product> cache = new ConcurrentHashMap<>();\nProduct get(int id) {\n    return cache.computeIfAbsent(id, this::loadFromDb);\n}","o":["Es incorrecto: computeIfAbsent no es atómico","Cache-aside thread-safe","Write-through sin riesgos","No es un caché"],"a":1,"f":"computeIfAbsent es atómico por clave en ConcurrentHashMap. El riesgo real es de consistencia: sin TTL o invalidación, el caché sirve datos viejos."},
{"c":"opt","s":"T","w":3,"q":"¿Por qué conviene paginar resultados grandes hacia la aplicación?","o":["Oracle exige por configuración paginar toda consulta que sea grande","Los ResultSet de JDBC tienen un límite fijo de 1000 filas por diseño","Es una cuestión puramente estética que no afecta el rendimiento real","Limita memoria en cliente y servidor, reduce latencia percibida y evita transferir filas que el usuario nunca verá"],"a":3,"f":"Con OFFSET/FETCH (o mejor, paginación por keyset: WHERE id > :ultimo ORDER BY id) la aplicación consume solo lo necesario por página."},
{"c":"opt","s":"P","w":5,"q":"¿Por qué la versión B es preferible para paginación profunda?","k":"-- A:\nOFFSET 100000 ROWS FETCH NEXT 20 ROWS ONLY\n-- B (keyset):\nWHERE id > :ultimo_id ORDER BY id\nFETCH FIRST 20 ROWS ONLY","o":["B ordena los resultados de forma incorrecta","No hay diferencia real entre ambos enfoques","A debe LEER y descartar 100.000 filas antes de llegar a la página deseada","A usa menos memoria que la versión con keyset"],"a":2,"f":"El OFFSET grande escala linealmente con la profundidad; la paginación por keyset (seek method) usa el índice para posicionarse y cada página cuesta lo mismo."}
);

</script>
<script>
const CATS = {
  jb:  "Java básico",
  oop: "OOP",
  st:  "Streams",
  jd:  "JDBC",
  sql: "Oracle SQL",
  pls: "PL/SQL",
  opt: "Optimización"
};
const CAT_ORDER = ["jb","oop","st","jd","sql","pls","opt"];

let state = {
  screen: "setup",
  selectedCats: new Set(CAT_ORDER),
  selectedSections: new Set(["T","P"]),
  qty: 20,
  pool: [],
  current: 0,
  answers: {},
  answered: false
};

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function countAvailable(){
  return window.QB.filter(q =>
    state.selectedCats.has(q.c) && state.selectedSections.has(q.s)
  ).length;
}

function escapeHtml(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function renderSetup(){
  const app = document.getElementById("app");
  const available = countAvailable();
  const catCounts = {};
  CAT_ORDER.forEach(c => {
    catCounts[c] = window.QB.filter(q => q.c === c && state.selectedSections.has(q.s)).length;
  });

  app.innerHTML = `
    <h1>Cuestionario <span>OCP Java SE 17</span> + Oracle SQL/PL-SQL</h1>
    <p class="subtitle">Banco de 500 preguntas — configura tu evaluación y comienza</p>

    <div class="card">
      <h2>1. Secciones <span class="badge">${state.selectedSections.size} de 2</span></h2>
      <div class="row">
        <div class="chip">
          <input type="checkbox" id="sec-T" ${state.selectedSections.has("T") ? "checked" : ""}>
          <label for="sec-T">Teoría</label>
        </div>
        <div class="chip">
          <input type="checkbox" id="sec-P" ${state.selectedSections.has("P") ? "checked" : ""}>
          <label for="sec-P">Práctica (código)</label>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>2. Categorías <span class="badge">${state.selectedCats.size} de ${CAT_ORDER.length}</span></h2>
      <div class="row" style="margin-bottom:14px">
        <button class="pillbtn" id="btn-all-cats">Seleccionar todas</button>
        <button class="pillbtn" id="btn-none-cats">Ninguna</button>
      </div>
      <div class="grid">
        ${CAT_ORDER.map(c => `
          <div class="chip">
            <input type="checkbox" id="cat-${c}" ${state.selectedCats.has(c) ? "checked" : ""}>
            <label for="cat-${c}">${CATS[c]} <span class="cnt">${catCounts[c]}</span></label>
          </div>
        `).join("")}
      </div>
    </div>

    <div class="card">
      <h2>3. Cantidad de preguntas <span class="badge">${available} disponibles</span></h2>
      <div class="row" style="margin-bottom:12px">
        ${[10,20,30,50,100,150].map(n => `
          <button class="pillbtn qtybtn" data-n="${n}">${n}</button>
        `).join("")}
      </div>
      <div class="row">
        <label class="small" for="qty-custom">Cantidad personalizada:</label>
        <input type="number" id="qty-custom" class="qty-input" min="1" max="${available || 1}" value="${state.qty}">
        <span class="small">(máx. ${available})</span>
      </div>
    </div>

    <button class="startbtn" id="btn-start" ${available === 0 ? "disabled" : ""}>
      Comenzar evaluación (${Math.min(state.qty, available)} preguntas)
    </button>
  `;

  document.getElementById("sec-T").onchange = e => toggleSection("T", e.target.checked);
  document.getElementById("sec-P").onchange = e => toggleSection("P", e.target.checked);
  document.getElementById("btn-all-cats").onclick = () => { state.selectedCats = new Set(CAT_ORDER); renderSetup(); };
  document.getElementById("btn-none-cats").onclick = () => { state.selectedCats = new Set(); renderSetup(); };
  CAT_ORDER.forEach(c => {
    document.getElementById(`cat-${c}`).onchange = e => toggleCat(c, e.target.checked);
  });
  document.querySelectorAll(".qtybtn").forEach(btn => {
    btn.onclick = () => {
      state.qty = parseInt(btn.dataset.n);
      renderSetup();
    };
  });
  const qtyInput = document.getElementById("qty-custom");
  qtyInput.oninput = () => {
    let v = parseInt(qtyInput.value) || 1;
    v = Math.max(1, Math.min(v, available || 1));
    state.qty = v;
    document.getElementById("btn-start").textContent =
      `Comenzar evaluación (${Math.min(state.qty, available)} preguntas)`;
  };
  document.getElementById("btn-start").onclick = startQuiz;
}

function toggleSection(s, checked){
  if (checked) state.selectedSections.add(s); else state.selectedSections.delete(s);
  renderSetup();
}
function toggleCat(c, checked){
  if (checked) state.selectedCats.add(c); else state.selectedCats.delete(c);
  renderSetup();
}

function startQuiz(){
  const available = window.QB.filter(q =>
    state.selectedCats.has(q.c) && state.selectedSections.has(q.s)
  );
  const n = Math.min(state.qty, available.length);
  state.pool = shuffle(available).slice(0, n).map(q => ({...q, shuffledOpts: null}));
  state.pool.forEach(q => {
    const idx = q.o.map((opt, i) => i);
    const shuffled = shuffle(idx);
    q.shuffledOpts = shuffled;
    q.correctShuffledIndex = shuffled.indexOf(q.a);
  });
  state.current = 0;
  state.answers = {};
  state.answered = false;
  state.screen = "quiz";
  renderQuiz();
}

function renderQuiz(){
  const app = document.getElementById("app");
  const q = state.pool[state.current];
  const total = state.pool.length;
  const idx = state.current;
  const prevAnswer = state.answers[idx];
  const answered = prevAnswer !== undefined;

  const pct = Math.round((idx / total) * 100);

  app.innerHTML = `
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    <div class="qmeta">
      <span>Pregunta ${idx + 1} de ${total}</span>
      <span class="catlabel">${CATS[q.c]} · ${q.s === "T" ? "Teoría" : "Práctica"} · peso ${q.w}</span>
    </div>
    <div class="card">
      <p class="qtext">${escapeHtml(q.q)}</p>
      ${q.k ? `<pre class="code">${escapeHtml(q.k)}</pre>` : ""}
      <div class="opts" id="opts-container">
        ${q.shuffledOpts.map((origIdx, i) => {
          const letter = String.fromCharCode(65 + i);
          return `
          <div class="opt" data-i="${i}">
            <input type="radio" name="opt" id="opt-${i}" ${answered && prevAnswer === i ? "checked" : ""} ${answered ? "disabled" : ""}>
            <label for="opt-${i}"><span class="letter">${letter}</span><span>${escapeHtml(q.o[origIdx])}</span></label>
          </div>`;
        }).join("")}
      </div>
      <div id="feedback-area"></div>
    </div>
    <div class="navrow">
      <button class="navbtn" id="btn-prev" ${idx === 0 ? "disabled" : ""}>Anterior</button>
      <button class="navbtn" id="btn-finish">Finalizar y ver resultados</button>
      <button class="navbtn primary" id="btn-next" ${idx === total - 1 ? "disabled" : ""}>Siguiente</button>
    </div>
  `;

  if (answered) showFeedback(q, prevAnswer);

  document.querySelectorAll(".opt").forEach(optEl => {
    optEl.querySelector("input").onclick = () => {
      if (state.answers[idx] !== undefined) return;
      const chosen = parseInt(optEl.dataset.i);
      state.answers[idx] = chosen;
      renderQuiz();
    };
    optEl.querySelector("label").onclick = (e) => {
      if (state.answers[idx] !== undefined) { e.preventDefault(); return; }
    };
  });

  document.getElementById("btn-prev").onclick = () => { state.current--; renderQuiz(); };
  document.getElementById("btn-next").onclick = () => { state.current++; renderQuiz(); };
  document.getElementById("btn-finish").onclick = showResults;
}

function showFeedback(q, chosenShuffledIdx){
  const isCorrect = chosenShuffledIdx === q.correctShuffledIndex;
  document.querySelectorAll(".opt").forEach(optEl => {
    const i = parseInt(optEl.dataset.i);
    optEl.classList.add("disabled");
    if (i === q.correctShuffledIndex) optEl.classList.add("correct");
    else if (i === chosenShuffledIdx) optEl.classList.add("incorrect");
  });
  const area = document.getElementById("feedback-area");
  area.innerHTML = `
    <div class="feedback ${isCorrect ? "ok" : "bad"}">
      <strong>${isCorrect ? "Correcto" : "Incorrecto"}.</strong> ${escapeHtml(q.f)}
    </div>
  `;
}

function computeScore(){
  let earned = 0, maxPossible = 0, correctCount = 0;
  state.pool.forEach((q, i) => {
    maxPossible += q.w;
    if (state.answers[i] !== undefined) {
      if (state.answers[i] === q.correctShuffledIndex) {
        earned += q.w;
        correctCount++;
      }
    }
  });
  return { earned, maxPossible, correctCount, total: state.pool.length };
}

function showResults(){
  state.screen = "results";
  const { earned, maxPossible, correctCount, total } = computeScore();
  const pct = maxPossible > 0 ? Math.round((earned / maxPossible) * 100) : 0;
  const answeredCount = Object.keys(state.answers).length;

  const bySection = { T: {c:0,t:0}, P: {c:0,t:0} };
  const byCat = {};
  state.pool.forEach((q, i) => {
    bySection[q.s].t++;
    if (!byCat[q.c]) byCat[q.c] = {c:0,t:0};
    byCat[q.c].t++;
    if (state.answers[i] === q.correctShuffledIndex) {
      bySection[q.s].c++;
      byCat[q.c].c++;
    }
  });

  const app = document.getElementById("app");
  app.innerHTML = `
    <h1>Resultado final</h1>
    <p class="subtitle">${answeredCount} de ${total} preguntas respondidas</p>

    <div class="card">
      <div class="scoregrid">
        <div class="scorecard">
          <div class="num" style="color:${pct>=70?'var(--good)':pct>=50?'var(--warn)':'var(--bad)'}">${pct}%</div>
          <div class="lbl">Puntuación ponderada</div>
        </div>
        <div class="scorecard">
          <div class="num">${earned}<span style="font-size:14px;color:var(--muted)">/${maxPossible}</span></div>
          <div class="lbl">Puntos obtenidos</div>
        </div>
        <div class="scorecard">
          <div class="num">${correctCount}<span style="font-size:14px;color:var(--muted)">/${total}</span></div>
          <div class="lbl">Respuestas correctas</div>
        </div>
      </div>
      <div class="row" style="margin-top:6px">
        <span class="badge">Teoría: ${bySection.T.c}/${bySection.T.t}</span>
        <span class="badge">Práctica: ${bySection.P.c}/${bySection.P.t}</span>
        ${CAT_ORDER.filter(c=>byCat[c]).map(c=>`<span class="badge">${CATS[c]}: ${byCat[c].c}/${byCat[c].t}</span>`).join("")}
      </div>
    </div>

    <div class="card">
      <h2>Repaso de respuestas <a class="linkbtn" id="toggle-review">mostrar/ocultar</a></h2>
      <div id="review-list" class="hidden"></div>
    </div>

    <div class="row" style="margin-top:6px">
      <button class="navbtn primary" id="btn-retry" style="flex:1">Repetir (preguntas y opciones nuevas)</button>
      <button class="navbtn" id="btn-restart" style="flex:1">Cambiar configuración</button>
    </div>
  `;

  document.getElementById("toggle-review").onclick = () => {
    const el = document.getElementById("review-list");
    if (el.classList.contains("hidden")) {
      el.classList.remove("hidden");
      el.innerHTML = state.pool.map((q, i) => {
        const chosen = state.answers[i];
        const correct = chosen === q.correctShuffledIndex;
        const chosenText = chosen !== undefined ? escapeHtml(q.o[q.shuffledOpts[chosen]]) : "(sin responder)";
        const correctText = escapeHtml(q.o[q.a]);
        return `
          <div class="reviewitem ${chosen === undefined ? '' : (correct ? 'right' : 'wrong')}">
            <div class="small" style="margin-bottom:4px">${CATS[q.c]} · ${q.s === "T" ? "Teoría" : "Práctica"} · peso ${q.w}</div>
            <div style="font-weight:500;margin-bottom:6px">${escapeHtml(q.q)}</div>
            ${q.k ? `<pre class="code">${escapeHtml(q.k)}</pre>` : ""}
            <div class="small">Tu respuesta: <strong>${chosenText}</strong></div>
            ${!correct ? `<div class="small">Correcta: <strong style="color:var(--good)">${correctText}</strong></div>` : ""}
            <div class="small" style="margin-top:6px;color:var(--muted)">${escapeHtml(q.f)}</div>
          </div>
        `;
      }).join("");
    } else {
      el.classList.add("hidden");
    }
  };

  document.getElementById("btn-retry").onclick = () => {
    startQuiz();
  };
  document.getElementById("btn-restart").onclick = () => {
    state.screen = "setup";
    renderSetup();
  };
}

renderSetup();
</script>
</body>
</html>
